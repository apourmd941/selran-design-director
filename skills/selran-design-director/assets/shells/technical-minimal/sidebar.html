<style>
  .c-tm-sidebar {
    --sb-w: 248px;
    --sb-w-collapsed: 60px;
    width: var(--sb-w);
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-right: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
    transition: width 200ms cubic-bezier(0.2, 0, 0, 1);
    box-sizing: border-box;
  }
  .c-tm-sidebar[data-mode="collapsed"] { width: var(--sb-w-collapsed); }
  .c-tm-sidebar__brand {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 20px;
    height: 64px;
    box-sizing: border-box;
    border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.01em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-tm-sidebar__mark {
    flex: 0 0 auto;
    width: 20px; height: 20px;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 0, 100% 40%, 60% 40%, 60% 100%, 0 100%);
  }
  .c-tm-sidebar__brand-label { transition: opacity 200ms cubic-bezier(0.2, 0, 0, 1); }
  .c-tm-sidebar[data-mode="collapsed"] .c-tm-sidebar__brand-label { opacity: 0; pointer-events: none; }
  .c-tm-sidebar__nav {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 18px 12px;
  }
  .c-tm-sidebar__section { margin-bottom: 22px; }
  .c-tm-sidebar__section:last-child { margin-bottom: 0; }
  .c-tm-sidebar__section-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    padding: 0 10px 8px;
    margin: 0;
  }
  .c-tm-sidebar[data-mode="collapsed"] .c-tm-sidebar__section-label { opacity: 0; height: 0; padding: 0; overflow: hidden; }
  .c-tm-sidebar__list { list-style: none; margin: 0; padding: 0; display: grid; gap: 1px; }
  .c-tm-sidebar__link {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    min-height: 36px;
    font-size: 14px;
    color: var(--fg-muted);
    text-decoration: none;
    border-radius: 6px;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                color 200ms cubic-bezier(0.2, 0, 0, 1);
    box-sizing: border-box;
  }
  .c-tm-sidebar__link:hover { background: var(--bg-2); color: var(--fg); }
  .c-tm-sidebar__link[aria-current="page"] {
    background: var(--bg-2);
    color: var(--fg);
    font-weight: 500;
    position: relative;
  }
  .c-tm-sidebar__link[aria-current="page"]::before {
    content: "";
    position: absolute;
    left: -12px; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .c-tm-sidebar__link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-tm-sidebar__icon {
    flex: 0 0 auto;
    width: 16px; height: 16px;
    display: inline-flex;
    color: inherit;
  }
  .c-tm-sidebar__label { transition: opacity 150ms cubic-bezier(0.2, 0, 0, 1); white-space: nowrap; }
  .c-tm-sidebar[data-mode="collapsed"] .c-tm-sidebar__label { opacity: 0; pointer-events: none; }
  .c-tm-sidebar__badge {
    margin-left: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--fg-muted);
    padding: 1px 6px;
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-variant-numeric: tabular-nums;
  }
  .c-tm-sidebar[data-mode="collapsed"] .c-tm-sidebar__badge { display: none; }
  .c-tm-sidebar__foot {
    flex: 0 0 auto;
    border-top: 1px solid var(--border);
    padding: 12px;
  }
  .c-tm-sidebar__collapse {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    width: 100%;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    box-sizing: border-box;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-sidebar__collapse:hover { background: var(--bg-2); color: var(--fg); }
  .c-tm-sidebar__collapse:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-tm-sidebar__collapse svg { transition: transform 200ms cubic-bezier(0.2, 0, 0, 1); }
  .c-tm-sidebar[data-mode="collapsed"] .c-tm-sidebar__collapse svg { transform: rotate(180deg); }
  .c-tm-sidebar[data-mode="collapsed"] .c-tm-sidebar__collapse-label { display: none; }

  @media (max-width: 1100px) {
    .c-tm-sidebar { width: var(--sb-w-collapsed); }
    .c-tm-sidebar .c-tm-sidebar__brand-label,
    .c-tm-sidebar .c-tm-sidebar__section-label,
    .c-tm-sidebar .c-tm-sidebar__label,
    .c-tm-sidebar .c-tm-sidebar__badge,
    .c-tm-sidebar .c-tm-sidebar__collapse-label { opacity: 0; pointer-events: none; }
  }
  @media (max-width: 900px) {
    .c-tm-sidebar {
      position: fixed; inset: 0 auto 0 0;
      width: 280px;
      z-index: 40;
      transform: translateX(-100%);
      transition: transform 200ms cubic-bezier(0.2, 0, 0, 1);
    }
    .c-tm-sidebar[data-mode="drawer-open"] { transform: translateX(0); }
    .c-tm-sidebar .c-tm-sidebar__brand-label,
    .c-tm-sidebar .c-tm-sidebar__section-label,
    .c-tm-sidebar .c-tm-sidebar__label,
    .c-tm-sidebar .c-tm-sidebar__badge,
    .c-tm-sidebar .c-tm-sidebar__collapse-label { opacity: 1; pointer-events: auto; }
  }
</style>

        <li><a class="c-tm-sidebar__link" href="#">

  <div class="c-tm-sidebar__foot">
