<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: editorial
  use: empty state (no data yet)
  variables: var(fg) (ink), var(bg) (parchment), var(accent)
  notes: an empty engraving plate — ornamental frame around blank parchment; hatch texture in margins
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Empty plate">
  <style>
    .ed-ink    { stroke: var(--fg, currentColor); fill: none; stroke-width: 1.25; vector-effect: non-scaling-stroke; }
    .ed-bold   { stroke: var(--fg, currentColor); fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
    .ed-fine   { stroke: var(--fg, currentColor); fill: none; stroke-width: .6; opacity: .6; vector-effect: non-scaling-stroke; }
    .ed-accent { fill: var(--accent, #7A1F1F); }
    .ed-meta   { font-family: "Söhne", "Work Sans", ui-sans-serif, sans-serif; font-size: 9px; fill: var(--fg, currentColor); letter-spacing: .24em; text-transform: uppercase; }
    .ed-serif-it { font-family: "Fraunces", "EB Garamond", Georgia, serif; font-style: italic; font-size: 14px; fill: var(--fg, currentColor); opacity: .7; }
  </style>

  <defs>
    <pattern id="ed-empty-hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="var(--fg, currentColor)" stroke-width=".4" opacity=".4"/>
    </pattern>
  </defs>

  <!-- outer double-rule frame -->
  <rect class="ed-bold" x="60" y="60" width="280" height="280"/>
  <rect class="ed-fine" x="68" y="68" width="264" height="264"/>

  <!-- corner fleurons -->
  <g stroke="var(--fg, currentColor)" fill="none" stroke-width="1">
    <!-- top-left -->
    <path d="M60 80 Q70 70 80 60"/>
    <circle cx="70" cy="70" r="1.5" class="ed-accent" stroke="none"/>
    <!-- top-right -->
    <path d="M320 60 Q330 70 340 80"/>
    <circle cx="330" cy="70" r="1.5" class="ed-accent" stroke="none"/>
    <!-- bottom-left -->
    <path d="M60 320 Q70 330 80 340"/>
    <circle cx="70" cy="330" r="1.5" class="ed-accent" stroke="none"/>
    <!-- bottom-right -->
    <path d="M320 340 Q330 330 340 320"/>
    <circle cx="330" cy="330" r="1.5" class="ed-accent" stroke="none"/>
  </g>

  <!-- hatched corner triangles for ornament -->
  <path d="M60 60 L100 60 L60 100 Z" fill="url(#ed-empty-hatch)"/>
  <path d="M340 340 L300 340 L340 300 Z" fill="url(#ed-empty-hatch)"/>

  <!-- center italic legend -->
  <text x="200" y="195" text-anchor="middle" class="ed-serif-it">nothing here</text>
  <text x="200" y="215" text-anchor="middle" class="ed-serif-it" font-style="italic">yet.</text>

  <!-- rule lines flanking the text -->
  <line class="ed-fine" x1="110" y1="205" x2="165" y2="205"/>
  <line class="ed-fine" x1="235" y1="205" x2="290" y2="205"/>

  <!-- bottom caption -->
  <text x="200" y="368" text-anchor="middle" class="ed-meta">Plate · Awaiting Impression</text>
</svg>
