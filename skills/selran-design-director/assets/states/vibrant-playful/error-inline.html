<style>
  .c-vp-errin {
    --ease: cubic-bezier(0.34, 1.1, 0.64, 1);
    --tone: var(--p1, var(--accent));
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    background: color-mix(in oklab, var(--tone) 10%, var(--bg));
    border: 1px solid color-mix(in oklab, var(--tone) 30%, var(--border));
    border-radius: 16px;
    font-family: inherit;
    color: var(--fg);
  }
  .c-vp-errin[data-tone="warn"] { --tone: var(--p3, var(--accent)); }

  .c-vp-errin__icon {
    flex: 0 0 auto;
    width: 34px; height: 34px;
    border-radius: 12px;
    background: color-mix(in oklab, var(--tone) 20%, var(--bg));
    color: var(--tone);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .c-vp-errin__icon svg { width: 18px; height: 18px; }

  .c-vp-errin__body { flex: 1 1 auto; min-width: 0; }
  .c-vp-errin__title {
    font-size: 15px;
    font-weight: 500;
    color: var(--fg);
    margin: 0 0 4px;
    letter-spacing: -0.005em;
  }
  .c-vp-errin__detail {
    font-size: 13px;
    line-height: 1.5;
    color: var(--fg-muted);
    margin: 0;
  }
  .c-vp-errin__detail code {
    font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
    font-size: 12px;
    padding: 1px 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg);
  }

  .c-vp-errin__actions {
    display: inline-flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .c-vp-errin__btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform 220ms var(--ease),
                background-color 220ms var(--ease),
                box-shadow 220ms var(--ease);
  }
  .c-vp-errin__btn--primary {
    background: var(--tone);
    color: var(--bg);
  }
  .c-vp-errin__btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px color-mix(in oklab, var(--tone) 40%, transparent);
  }
  .c-vp-errin__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: color-mix(in oklab, var(--tone) 26%, var(--border));
  }
  .c-vp-errin__btn--ghost:hover {
    background: color-mix(in oklab, var(--tone) 8%, var(--bg));
  }
  .c-vp-errin__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--tone);
  }
  .c-vp-errin__btn svg { width: 13px; height: 13px; }

  .c-vp-errin__close {
    flex: 0 0 auto;
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background-color 220ms var(--ease);
  }
  .c-vp-errin__close:hover { background: var(--bg-2); color: var(--fg); }
  .c-vp-errin__close:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--tone);
  }
  .c-vp-errin__close svg { width: 14px; height: 14px; }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-errin__btn, .c-vp-errin__close { transition: none; }
  }

  @media (max-width: 900px) {
    .c-vp-errin { padding: 14px; border-radius: 14px; }
  }
</style>

<div class="c-vp-errin" role="alert" aria-live="assertive">
  <span class="c-vp-errin__icon" aria-hidden="true">
    <svg viewBox="0 0 20 20" fill="none">
      <path d="M10 3l7.5 13h-15L10 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M10 8v4M10 14v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </span>
  <div class="c-vp-errin__body">
    <p class="c-vp-errin__title">Hm, that didn&rsquo;t work.</p>
    <p class="c-vp-errin__detail">We couldn&rsquo;t publish your canvas &mdash; the server hiccupped. Your changes are safe in your drafts.</p>
    <div class="c-vp-errin__actions">
      <button class="c-vp-errin__btn c-vp-errin__btn--primary" type="button">
        <svg viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M3 7a4 4 0 1 1 1.2 2.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 4v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Try again
      </button>
      <button class="c-vp-errin__btn c-vp-errin__btn--ghost" type="button">Save as draft</button>
    </div>
  </div>
  <button class="c-vp-errin__close" type="button" aria-label="Dismiss">
    <svg viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M4 4l6 6M10 4l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
</div>
