<style>
  .c-vp-skel {
    max-width: 1200px;
    margin: 0 auto;
    padding: 56px 32px;
  }
  .c-vp-skel__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .c-vp-skel__chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 9999px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
  }
  .c-vp-skel__chip::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--p0, var(--accent));
    animation: c-vp-skel-dot 1.6s ease-in-out infinite;
  }
  .c-vp-skel__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .c-vp-skel__card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md, 12px);
    padding: 20px;
    border-top: 4px solid var(--p0, var(--accent));
  }
  .c-vp-skel__card:nth-child(2) { border-top-color: var(--p1, var(--accent)); }
  .c-vp-skel__card:nth-child(3) { border-top-color: var(--p2, var(--accent)); }
  .c-vp-skel__card:nth-child(4) { border-top-color: var(--p3, var(--accent)); }
  .c-vp-skel__card:nth-child(5) { border-top-color: var(--p4, var(--accent)); }
  .c-vp-skel__card:nth-child(6) { border-top-color: var(--p0, var(--accent)); }

  .c-vp-skel__bar {
    height: 12px;
    border-radius: 8px;
    background: var(--p0, var(--accent));
    animation: c-vp-skel-hue 2.8s ease-in-out infinite;
  }
  .c-vp-skel__card:nth-child(2) .c-vp-skel__bar { background: var(--p1, var(--accent)); animation-delay: 140ms; }
  .c-vp-skel__card:nth-child(3) .c-vp-skel__bar { background: var(--p2, var(--accent)); animation-delay: 280ms; }
  .c-vp-skel__card:nth-child(4) .c-vp-skel__bar { background: var(--p3, var(--accent)); animation-delay: 420ms; }
  .c-vp-skel__card:nth-child(5) .c-vp-skel__bar { background: var(--p4, var(--accent)); animation-delay: 560ms; }
  .c-vp-skel__card:nth-child(6) .c-vp-skel__bar { background: var(--p0, var(--accent)); animation-delay: 700ms; }
  .c-vp-skel__bar + .c-vp-skel__bar { margin-top: 10px; }
  .c-vp-skel__bar--title { height: 16px; width: 62%; margin-bottom: 16px; border-radius: 8px; }
  .c-vp-skel__bar--long  { width: 100%; }
  .c-vp-skel__bar--mid   { width: 78%; }
  .c-vp-skel__bar--short { width: 42%; }
  .c-vp-skel__row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .c-vp-skel__avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--p0, var(--accent));
    animation: c-vp-skel-hue 2.8s ease-in-out infinite;
  }
  .c-vp-skel__card:nth-child(2) .c-vp-skel__avatar { background: var(--p1, var(--accent)); animation-delay: 140ms; }
  .c-vp-skel__card:nth-child(3) .c-vp-skel__avatar { background: var(--p2, var(--accent)); animation-delay: 280ms; }
  .c-vp-skel__card:nth-child(4) .c-vp-skel__avatar { background: var(--p3, var(--accent)); animation-delay: 420ms; }
  .c-vp-skel__card:nth-child(5) .c-vp-skel__avatar { background: var(--p4, var(--accent)); animation-delay: 560ms; }
  .c-vp-skel__card:nth-child(6) .c-vp-skel__avatar { background: var(--p0, var(--accent)); animation-delay: 700ms; }
  .c-vp-skel__pill {
    width: 64px; height: 20px;
    border-radius: 9999px;
    background: color-mix(in oklab, var(--p0, var(--accent)) 22%, var(--bg-2));
    animation: c-vp-skel-soft 2.8s ease-in-out infinite;
  }
  .c-vp-skel__card:nth-child(2) .c-vp-skel__pill { background: color-mix(in oklab, var(--p1, var(--accent)) 22%, var(--bg-2)); animation-delay: 140ms; }
  .c-vp-skel__card:nth-child(3) .c-vp-skel__pill { background: color-mix(in oklab, var(--p2, var(--accent)) 22%, var(--bg-2)); animation-delay: 280ms; }
  .c-vp-skel__card:nth-child(4) .c-vp-skel__pill { background: color-mix(in oklab, var(--p3, var(--accent)) 22%, var(--bg-2)); animation-delay: 420ms; }
  .c-vp-skel__card:nth-child(5) .c-vp-skel__pill { background: color-mix(in oklab, var(--p4, var(--accent)) 22%, var(--bg-2)); animation-delay: 560ms; }
  .c-vp-skel__card:nth-child(6) .c-vp-skel__pill { background: color-mix(in oklab, var(--p0, var(--accent)) 22%, var(--bg-2)); animation-delay: 700ms; }

  @keyframes c-vp-skel-hue {
    0%, 100% { filter: hue-rotate(0deg) brightness(1); opacity: 0.32; }
    50%      { filter: hue-rotate(20deg) brightness(1.1); opacity: 0.55; }
  }
  @keyframes c-vp-skel-soft {
    0%, 100% { opacity: 0.8; }
    50%      { opacity: 0.4; }
  }
  @keyframes c-vp-skel-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.3); opacity: 0.6; }
  }

  @media (max-width: 900px) {
    .c-vp-skel__grid { grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-skel__bar,
    .c-vp-skel__avatar,
    .c-vp-skel__pill,
    .c-vp-skel__chip::before { animation: none; }
    .c-vp-skel__bar,
    .c-vp-skel__avatar { opacity: 0.35; filter: none; }
  }
</style>

<section class="c-vp-skel" aria-busy="true" aria-label="Loading canvases">

    <span class="c-vp-skel__chip">Fetching your canvases&hellip;</span>
  </div>
  <div class="c-vp-skel__grid">
    <div class="c-vp-skel__card" data-cat="0">
      <div class="c-vp-skel__bar c-vp-skel__bar--title"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--long"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--mid"></div>
      <div class="c-vp-skel__row"><div class="c-vp-skel__avatar"></div><div class="c-vp-skel__pill"></div></div>
    </div>
    <div class="c-vp-skel__card" data-cat="1">
      <div class="c-vp-skel__bar c-vp-skel__bar--title"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--long"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--short"></div>
      <div class="c-vp-skel__row"><div class="c-vp-skel__avatar"></div><div class="c-vp-skel__pill"></div></div>
    </div>
    <div class="c-vp-skel__card" data-cat="2">
      <div class="c-vp-skel__bar c-vp-skel__bar--title"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--mid"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--long"></div>
      <div class="c-vp-skel__row"><div class="c-vp-skel__avatar"></div><div class="c-vp-skel__pill"></div></div>
    </div>
    <div class="c-vp-skel__card" data-cat="3">
      <div class="c-vp-skel__bar c-vp-skel__bar--title"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--long"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--mid"></div>
      <div class="c-vp-skel__row"><div class="c-vp-skel__avatar"></div><div class="c-vp-skel__pill"></div></div>
    </div>
    <div class="c-vp-skel__card" data-cat="4">
      <div class="c-vp-skel__bar c-vp-skel__bar--title"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--short"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--long"></div>
      <div class="c-vp-skel__row"><div class="c-vp-skel__avatar"></div><div class="c-vp-skel__pill"></div></div>
    </div>
    <div class="c-vp-skel__card" data-cat="0">
      <div class="c-vp-skel__bar c-vp-skel__bar--title"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--mid"></div>
      <div class="c-vp-skel__bar c-vp-skel__bar--short"></div>
      <div class="c-vp-skel__row"><div class="c-vp-skel__avatar"></div><div class="c-vp-skel__pill"></div></div>
    </div>
  </div>
</section>
