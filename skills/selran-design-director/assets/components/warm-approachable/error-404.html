<style>
  .c-wa-404 {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .c-wa-404::before,
  .c-wa-404::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.08;
    pointer-events: none;
  }
  .c-wa-404::before {
    width: 360px; height: 360px;
    top: -120px; right: -80px;
  }
  .c-wa-404::after {
    width: 260px; height: 260px;
    bottom: -80px; left: -40px;
    opacity: 0.06;
  }
  .c-wa-404__inner {
    max-width: 620px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .c-wa-404__eyebrow {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 17px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .c-wa-404__code {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: clamp(120px, 20vw, 220px);
    line-height: 0.9;
    letter-spacing: -0.02em;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    margin: 0 0 8px;
  }
  .c-wa-404__headline {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: clamp(26px, 3vw, 34px);
    line-height: 1.2;
    font-weight: 500;
    color: var(--fg);
    margin: 8px 0 16px;
  }
  .c-wa-404__headline em {
    font-style: italic;
    color: var(--accent);
  }
  .c-wa-404__body {
    font-size: 17px;
    line-height: 1.65;
    color: var(--fg-muted);
    margin: 0 auto 36px;
    max-width: 52ch;
  }
  .c-wa-404__cta {
    display: inline-flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .c-wa-404__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 26px;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-lg, 24px);
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-404__btn--primary {
    background: var(--accent);
    color: var(--bg);
  }
  .c-wa-404__btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(61, 40, 23, 0.14);
  }
  .c-wa-404__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border-strong, var(--border));
  }
  .c-wa-404__btn--ghost:hover { background: var(--bg-2); }

  @media (max-width: 900px) {
    .c-wa-404 { padding: 56px 24px; }
    .c-wa-404__headline { font-size: 22px; }
  }
</style>

<main class="c-wa-404">
  <div class="c-wa-404__inner">
    <span class="c-wa-404__eyebrow">A small detour</span>
    <h1 class="c-wa-404__code">404</h1>
    <h2 class="c-wa-404__headline">We couldn't find <em>that one.</em></h2>
    <p class="c-wa-404__body">The page may have been retired, or the link gathered a little dust along the way. Come back to the shop &mdash; there's a new batch of linen and Hojicha waiting.</p>
    <div class="c-wa-404__cta">
      <a href="/" class="c-wa-404__btn c-wa-404__btn--primary">Back to the shop</a>
      <a href="/journal" class="c-wa-404__btn c-wa-404__btn--ghost">Read the journal</a>
    </div>
  </div>
</main>
