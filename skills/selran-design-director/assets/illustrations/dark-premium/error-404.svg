<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: dark-premium
  use: 404 page-not-found
  variables: var(fg), var(bg), var(accent)
  notes: single broken-circle gesture; gilded small-caps 404; sparse
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="404">
  <style>
    .dp-bg     { fill: var(--bg, #0A0A0B); }
    .dp-stroke { stroke: var(--fg, #F4F4F5); fill: none; stroke-width: 1; opacity: .5; vector-effect: non-scaling-stroke; }
    .dp-thin   { stroke: var(--fg, #F4F4F5); fill: none; stroke-width: 1; opacity: .18; vector-effect: non-scaling-stroke; }
    .dp-accent-stroke { stroke: var(--accent, #D4AF37); fill: none; stroke-width: 1.25; vector-effect: non-scaling-stroke; }
    .dp-accent-fill   { fill: var(--accent, #D4AF37); }
    .dp-label  { font-family: "Söhne", "Inter", ui-sans-serif, sans-serif; font-size: 9px; fill: var(--fg, #F4F4F5); opacity: .5; letter-spacing: .32em; text-transform: uppercase; text-anchor: middle; }
  </style>

  <defs>
    <radialGradient id="dp-404-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent, #D4AF37)" stop-opacity=".1"/>
      <stop offset="100%" stop-color="var(--accent, #D4AF37)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect class="dp-bg" width="400" height="400"/>
  <circle cx="200" cy="200" r="140" fill="url(#dp-404-glow)"/>

  <!-- broken circle: two arc segments with a visible gap -->
  <path class="dp-stroke" d="M 200 110 A 90 90 0 0 1 278 200"/>
  <path class="dp-stroke" d="M 200 290 A 90 90 0 0 1 122 200"/>

  <!-- the gap: two accent terminal dots -->
  <circle cx="278" cy="200" r="3" class="dp-accent-fill"/>
  <circle cx="122" cy="200" r="3" class="dp-accent-fill"/>
  <path class="dp-accent-stroke" d="M 270 200 L 278 200 M 122 200 L 130 200" stroke-dasharray="2 2" opacity=".7"/>

  <!-- serif 404, small, inside the ring -->
  <text x="200" y="212"
        text-anchor="middle"
        font-family="Tiempos Headline, Canela, Georgia, serif"
        font-size="36"
        font-weight="500"
        letter-spacing="4"
        fill="var(--fg, #F4F4F5)"
        opacity=".85">404</text>

  <text x="200" y="360" class="dp-label">Signal · Lost</text>
</svg>
