<style>
  .c-br-nav {
    background: var(--bg);
    border-bottom: 2px solid var(--border, var(--fg));
    position: sticky; top: 0; z-index: 10;
    font-family: var(--ff-mono, 'Space Mono', 'Courier New', monospace);
  }
  .c-br-nav__inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex; align-items: stretch;
  }
  .c-br-nav__brand {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 24px 16px 0;
    border-right: 2px solid var(--border, var(--fg));
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-br-nav__mark {
    width: 20px; height: 20px;
    background: var(--fg);
    display: inline-block;
  }
  .c-br-nav__links {
    display: flex; align-items: stretch;
    flex: 1;
  }
  .c-br-nav__links a {
    padding: 16px 20px;
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-transform: uppercase;
    font-size: 14px;
    letter-spacing: 0.04em;
    display: flex; align-items: center;
    border-right: 2px solid var(--border, var(--fg));
  }
  .c-br-nav__links a:hover {
    background: var(--fg);
    color: var(--bg);
  }
  .c-br-nav__meta {
    margin-left: auto;
    display: flex; align-items: center;
    padding: 16px 20px;
    font-size: 12px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-right: 2px solid var(--border, var(--fg));
  }
  .c-br-nav__btn {
    padding: 16px 24px;
    background: var(--accent);
    color: var(--bg);
    font-family: inherit;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 14px;
    text-decoration: none;
    display: flex; align-items: center;
    cursor: pointer;
  }
  .c-br-nav__btn:hover {
    background: var(--fg);
    color: var(--accent);
  }

  @media (max-width: 900px) {
    .c-br-nav__inner { padding: 0 16px; }
    .c-br-nav__links a:not(.c-br-nav__btn) { display: none; }
    .c-br-nav__meta { display: none; }
  }
</style>

<nav class="c-br-nav">
  <div class="c-br-nav__inner">
    <a class="c-br-nav__brand" href="#">
      <span class="c-br-nav__mark"></span>{Brand}
    </a>
    <div class="c-br-nav__links">
      <a href="#catalog">Catalog</a>
      <a href="#artists">Artists</a>
      <a href="#zine">Zine</a>
      <a href="#shows">Shows</a>
      <span class="c-br-nav__meta">EST. 2014 / 142 RELEASES</span>
      <a href="#" class="c-br-nav__btn">Mail order →</a>
    </div>
  </div>
</nav>
