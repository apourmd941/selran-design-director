<style>
  .c-ed-step {
    display: flex;
    align-items: stretch;
    gap: 0;
    list-style: none;
    margin: 0;
    padding: 0;
    font-family: inherit;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .c-ed-step__item {
    flex: 1;
    min-width: 0;
    padding: 18px 20px 16px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    color: var(--fg-muted);
    position: relative;
    transition: color 250ms ease;
  }
  .c-ed-step__item + .c-ed-step__item {
    border-left: 1px solid var(--border);
  }
  .c-ed-step__item[data-state="done"] {
    color: var(--fg);
  }
  .c-ed-step__item[aria-current="step"] {
    color: var(--accent);
  }
  .c-ed-step__item[aria-current="step"]::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--accent);
  }
  .c-ed-step__item[data-state="pending"] {
    color: var(--fg-muted);
    opacity: 0.55;
  }

  .c-ed-step__roman {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-size: 28px;
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: currentColor;
    flex: none;
  }
  .c-ed-step__item[aria-current="step"] .c-ed-step__roman {
    font-style: italic;
  }

  .c-ed-step__body {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .c-ed-step__kicker {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 10px;
    color: var(--fg-muted);
  }
  .c-ed-step__label {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-size: 15px;
    line-height: 1.3;
    color: currentColor;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .c-ed-step__item[aria-current="step"] .c-ed-step__label {
    font-style: italic;
  }

  @media (max-width: 900px) {
    .c-ed-step { overflow-x: auto; }
    .c-ed-step__item { padding: 14px 16px; min-width: 160px; }
    .c-ed-step__roman { font-size: 22px; }
    .c-ed-step__label { font-size: 14px; }
  }
</style>

<ol class="c-ed-step" role="list" aria-label="Subscription progress">
  <li class="c-ed-step__item" data-state="done" aria-label="Step I of IV, Reader, complete">
    <span class="c-ed-step__roman" aria-hidden="true">I</span>
    <span class="c-ed-step__body">
      <span class="c-ed-step__kicker">Step I</span>
      <span class="c-ed-step__label">Reader</span>
    </span>
  </li>
  <li class="c-ed-step__item" aria-current="step" aria-label="Step II of IV, Delivery, current">
    <span class="c-ed-step__roman" aria-hidden="true">II</span>
    <span class="c-ed-step__body">
      <span class="c-ed-step__kicker">Step II</span>
      <span class="c-ed-step__label">Delivery</span>
    </span>
  </li>
  <li class="c-ed-step__item" data-state="pending" aria-label="Step III of IV, Rhythm">
    <span class="c-ed-step__roman" aria-hidden="true">III</span>
    <span class="c-ed-step__body">
      <span class="c-ed-step__kicker">Step III</span>
      <span class="c-ed-step__label">Rhythm</span>
    </span>
  </li>
  <li class="c-ed-step__item" data-state="pending" aria-label="Step IV of IV, Review">
    <span class="c-ed-step__roman" aria-hidden="true">IV</span>
    <span class="c-ed-step__body">
      <span class="c-ed-step__kicker">Step IV</span>
      <span class="c-ed-step__label">Review</span>
    </span>
  </li>
</ol>
