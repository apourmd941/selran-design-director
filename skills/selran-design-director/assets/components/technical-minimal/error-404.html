<style>
  .c-tm-404 {
    min-height: 100vh;
    padding: 40px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }
  .c-tm-404__inner {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .c-tm-404__label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-muted);
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .c-tm-404__code {
    font-size: clamp(96px, 16vw, 168px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    font-weight: 600;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    margin: 0 0 8px;
  }
  .c-tm-404__code span { color: var(--accent); }
  .c-tm-404__headline {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin: 16px 0 10px;
    line-height: 1.3;
  }
  .c-tm-404__body {
    font-size: 15px;
    line-height: 1.6;
    color: var(--fg-muted);
    margin: 0 auto 32px;
    max-width: 48ch;
  }
  .c-tm-404__actions {
    display: inline-flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .c-tm-404__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-404__btn--primary { background: var(--accent); color: #fff; }
  .c-tm-404__btn--primary:hover { filter: brightness(0.92); }
  .c-tm-404__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .c-tm-404__btn--ghost:hover { background: var(--bg-2); }
  .c-tm-404__path {
    margin-top: 28px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-2);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    color: var(--fg-muted);
    display: inline-block;
  }
  .c-tm-404__path code { color: var(--fg); }

  @media (max-width: 900px) {
    .c-tm-404__headline { font-size: 19px; }
  }
</style>

<main class="c-tm-404">
  <div class="c-tm-404__inner">
    <div class="c-tm-404__label">404 · route not resolved</div>
    <div class="c-tm-404__code">4<span>0</span>4</div>
    <h1 class="c-tm-404__headline">That URL didn't match a workspace.</h1>
    <p class="c-tm-404__body">The link may be stale, or the resource may have been moved after a rename. Head back to the dashboard or search for what you were looking for.</p>
    <div class="c-tm-404__actions">
      <a href="/" class="c-tm-404__btn c-tm-404__btn--primary">Back to dashboard</a>
      <a href="/search" class="c-tm-404__btn c-tm-404__btn--ghost">Search workspaces</a>
    </div>
    <div class="c-tm-404__path">requested <code>/ledgers/q1-2026-draft</code></div>
  </div>
</main>
