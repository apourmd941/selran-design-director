<style>
  .c-bd-spinner {
    font-family: inherit;
    color: var(--fg);
  }

  /* Variant: full */
  .c-bd-spinner--full {
    min-height: 72vh;
    display: grid;
    place-items: center;
    padding: 80px 40px;
    background: var(--bg);
    border-top: 2px solid var(--fg);
    border-bottom: 2px solid var(--fg);
  }
  .c-bd-spinner__stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    text-align: center;
    max-width: 560px;
  }
  .c-bd-spinner__ring {
    width: 72px;
    height: 72px;
    position: relative;
  }
  .c-bd-spinner__ring::before,
  .c-bd-spinner__ring::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 6px solid transparent;
    border-top-color: var(--accent);
    border-radius: 50%;
  }
  .c-bd-spinner__ring::before {
    border-top-color: var(--fg);
    border-right-color: var(--fg);
    opacity: 0.12;
    border-radius: 50%;
  }
  .c-bd-spinner__ring::after {
    animation: c-bd-spinner-rotate 900ms cubic-bezier(0.2, 0, 0, 1) infinite;
  }
  @keyframes c-bd-spinner-rotate {
    to { transform: rotate(360deg); }
  }

  .c-bd-spinner__label {
    font-family: var(--ff-display, 'PP Editorial New', 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: clamp(32px, 4.5vw, 56px);
    line-height: 1;
    letter-spacing: -0.02em;
    font-weight: 500;
    color: var(--fg);
    margin: 0;
  }
  .c-bd-spinner__label::after {
    content: "\2026";
    color: var(--accent);
  }
  .c-bd-spinner__meta {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  /* Variant: inline */
  .c-bd-spinner--inline {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
  }
  .c-bd-spinner--inline .c-bd-spinner__ring {
    width: 20px; height: 20px;
  }
  .c-bd-spinner--inline .c-bd-spinner__ring::before,
  .c-bd-spinner--inline .c-bd-spinner__ring::after {
    border-width: 2.5px;
  }
  .c-bd-spinner--inline .c-bd-spinner__label {
    font-size: 18px;
    letter-spacing: -0.01em;
  }

  @media (prefers-reduced-motion: reduce) {
    .c-bd-spinner__ring::after { animation: none; border-top-color: var(--accent); }
    .c-bd-spinner__ring { width: 0; height: 0; display: none; }
  }

  @media (max-width: 900px) {
    .c-bd-spinner--full { padding: 56px 20px; min-height: 56vh; }
  }
</style>

<!-- Full-viewport loading -->
<section class="c-bd-spinner c-bd-spinner--full" role="status" aria-live="polite">
  <div class="c-bd-spinner__stage">
    <div class="c-bd-spinner__ring" aria-hidden="true"></div>
    <p class="c-bd-spinner__label">Loading</p>
    <p class="c-bd-spinner__meta">Issue 07 &middot; Fetching 32 essays</p>
  </div>
</section>

<!-- Inline loading (for buttons, rows, sections) -->
<span class="c-bd-spinner c-bd-spinner--inline" role="status" aria-live="polite">
  <span class="c-bd-spinner__ring" aria-hidden="true"></span>
  <span class="c-bd-spinner__label">Loading</span>
</span>
