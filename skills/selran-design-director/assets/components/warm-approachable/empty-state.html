<style>
  .c-wa-empty {
    max-width: 560px;
    margin: 0 auto;
    padding: 96px 32px;
    text-align: center;
  }
  .c-wa-empty__blob {
    width: 128px;
    height: 128px;
    margin: 0 auto 32px;
    background: var(--bg-2);
    border-radius: 42% 58% 55% 45% / 48% 42% 58% 52%;
    box-shadow: 0 12px 36px rgba(61, 40, 23, 0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    position: relative;
  }
  .c-wa-empty__blob svg { display: block; }
  .c-wa-empty__eyebrow {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .c-wa-empty__headline {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: clamp(28px, 3.6vw, 40px);
    line-height: 1.15;
    letter-spacing: -0.01em;
    font-weight: 500;
    color: var(--fg);
    margin: 0 0 16px;
  }
  .c-wa-empty__headline em {
    font-style: italic;
    color: var(--accent);
  }
  .c-wa-empty__body {
    font-size: 17px;
    line-height: 1.65;
    color: var(--fg-muted);
    margin: 0 auto 32px;
    max-width: 50ch;
  }
  .c-wa-empty__cta {
    display: inline-flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .c-wa-empty__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-lg, 24px);
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-empty__btn--primary {
    background: var(--accent);
    color: var(--bg);
  }
  .c-wa-empty__btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(61, 40, 23, 0.14);
  }
  .c-wa-empty__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border-strong, var(--border));
  }
  .c-wa-empty__btn--ghost:hover { background: var(--bg-2); }

  @media (max-width: 900px) {
    .c-wa-empty { padding: 64px 24px; }
  }
</style>

<section class="c-wa-empty">
  <div class="c-wa-empty__blob" aria-hidden="true">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
      <path d="M10 22c0-8 6-14 16-14s16 6 16 14v10c0 4-3 7-7 7H17c-4 0-7-3-7-7V22Z"
            stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
      <path d="M18 30c2 2 4 3 8 3s6-1 8-3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
      <circle cx="20" cy="22" r="1.25" fill="currentColor"/>
      <circle cx="32" cy="22" r="1.25" fill="currentColor"/>
    </svg>
  </div>
  <span class="c-wa-empty__eyebrow">A quiet shelf, for now</span>
  <h2 class="c-wa-empty__headline">No orders <em>quite yet.</em></h2>
  <p class="c-wa-empty__body">Your cupboard is still empty &mdash; browse the current season, or save a favorite for later. We'll send a note when your first order ships, mender's letter and all.</p>
  <div class="c-wa-empty__cta">
    <a href="#" class="c-wa-empty__btn c-wa-empty__btn--primary">Shop the season</a>
    <a href="#" class="c-wa-empty__btn c-wa-empty__btn--ghost">Read the journal</a>
  </div>
</section>
