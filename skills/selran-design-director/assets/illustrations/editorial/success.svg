<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: editorial
  use: success / completion moment
  variables: var(fg), var(accent)
  notes: engraved laurel wreath with accent seal at center; classical, symmetric; no checkmark
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Completion">
  <style>
    .ed-ink   { stroke: var(--fg, currentColor); fill: none; stroke-width: 1.25; vector-effect: non-scaling-stroke; }
    .ed-bold  { stroke: var(--fg, currentColor); fill: none; stroke-width: 2;    vector-effect: non-scaling-stroke; }
    .ed-fine  { stroke: var(--fg, currentColor); fill: none; stroke-width: .6; opacity: .65; vector-effect: non-scaling-stroke; }
    .ed-accent-fill { fill: var(--accent, #7A1F1F); }
    .ed-accent-st   { stroke: var(--accent, #7A1F1F); fill: none; stroke-width: 1.5; vector-effect: non-scaling-stroke; }
    .ed-meta  { font-family: "Söhne", "Work Sans", ui-sans-serif, sans-serif; font-size: 9px; fill: var(--fg, currentColor); letter-spacing: .24em; text-transform: uppercase; }
    .ed-serif { font-family: "Fraunces", "EB Garamond", Georgia, serif; fill: var(--fg, currentColor); }
  </style>

  <defs>
    <pattern id="ed-seal-hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="var(--accent, #7A1F1F)" stroke-width=".5" opacity=".8"/>
    </pattern>
    <symbol id="ed-leaf" viewBox="-8 -4 16 8">
      <path d="M-8 0 Q-4 -4 0 -3 Q4 -2 8 0 Q4 2 0 3 Q-4 4 -8 0 Z" fill="none" stroke="var(--fg, currentColor)" stroke-width=".9"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="var(--fg, currentColor)" stroke-width=".5" opacity=".7"/>
    </symbol>
  </defs>

  <!-- laurel wreath: two arcs of leaves, symmetric -->
  <g transform="translate(200 200)">
    <!-- left arc -->
    <g>
      <use href="#ed-leaf" x="-110" y="-60" width="16" height="8" transform="rotate(-60 -110 -60)"/>
      <use href="#ed-leaf" x="-128" y="-20" width="16" height="8" transform="rotate(-85 -128 -20)"/>
      <use href="#ed-leaf" x="-132" y="20"  width="16" height="8" transform="rotate(-105 -132 20)"/>
      <use href="#ed-leaf" x="-118" y="60"  width="16" height="8" transform="rotate(-130 -118 60)"/>
      <use href="#ed-leaf" x="-90"  y="92"  width="16" height="8" transform="rotate(-155 -90 92)"/>
    </g>
    <!-- right arc -->
    <g>
      <use href="#ed-leaf" x="110" y="-60" width="16" height="8" transform="rotate(60 110 -60)"/>
      <use href="#ed-leaf" x="128" y="-20" width="16" height="8" transform="rotate(85 128 -20)"/>
      <use href="#ed-leaf" x="132" y="20"  width="16" height="8" transform="rotate(105 132 20)"/>
      <use href="#ed-leaf" x="118" y="60"  width="16" height="8" transform="rotate(130 118 60)"/>
      <use href="#ed-leaf" x="90"  y="92"  width="16" height="8" transform="rotate(155 90 92)"/>
    </g>

    <!-- inner thin ring -->
    <circle class="ed-fine" r="80"/>

    <!-- central seal -->
    <circle class="ed-bold" r="50" fill="var(--bg, none)"/>
    <circle class="ed-fine" r="42"/>
    <circle fill="url(#ed-seal-hatch)" r="42"/>

    <!-- serif initial at center -->
    <text x="0" y="12" text-anchor="middle" class="ed-serif" font-size="42" font-weight="600" font-style="italic">&#10033;</text>

    <!-- ribbon ends at bottom of wreath -->
    <path class="ed-bold" d="M-24 112 L-8 100 L0 108 L8 100 L24 112 L10 118 L0 114 L-10 118 Z" fill="var(--bg, none)"/>
  </g>

  <!-- caption -->
  <line class="ed-fine" x1="100" y1="348" x2="300" y2="348"/>
  <text x="200" y="370" text-anchor="middle" class="ed-meta">Complete · Nihil Obstat</text>
</svg>
