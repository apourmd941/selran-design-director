<style>
  .c-tm-empty {
    max-width: 520px;
    margin: 0 auto;
    padding: 96px 32px;
    text-align: center;
  }
  .c-tm-empty__visual {
    width: 72px;
    height: 72px;
    margin: 0 auto 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-2);
  }
  .c-tm-empty__visual svg { display: block; }
  .c-tm-empty__label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    margin-bottom: 16px;
  }
  .c-tm-empty__headline {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin: 0 0 10px;
    line-height: 1.25;
  }
  .c-tm-empty__body {
    font-size: 15px;
    line-height: 1.55;
    color: var(--fg-muted);
    margin: 0 auto 28px;
    max-width: 44ch;
  }
  .c-tm-empty__actions {
    display: inline-flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .c-tm-empty__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                border-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-empty__btn--primary {
    background: var(--accent);
    color: #fff;
  }
  .c-tm-empty__btn--primary:hover { filter: brightness(0.92); }
  .c-tm-empty__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .c-tm-empty__btn--ghost:hover { background: var(--bg-2); }
  .c-tm-empty__hint {
    margin-top: 20px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.06em;
  }
  .c-tm-empty__hint kbd {
    font: inherit;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-2);
    color: var(--fg);
  }

  @media (max-width: 900px) {
    .c-tm-empty { padding: 64px 24px; }
  }
</style>

<div class="c-tm-empty">
  <div class="c-tm-empty__visual">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <rect x="4.5" y="6.5" width="19" height="15" rx="1.5" stroke="currentColor" stroke-width="1.25" style="color: var(--fg-muted);"/>
      <path d="M4.5 11.5h19" stroke="currentColor" stroke-width="1.25" style="color: var(--fg-muted);"/>
      <path d="M10 15.5h8" stroke="currentColor" stroke-width="1.25" style="color: var(--accent);"/>
    </svg>
  </div>
  <div class="c-tm-empty__label">No workspaces</div>
  <h2 class="c-tm-empty__headline">Start with your first workspace.</h2>
  <p class="c-tm-empty__body">Workspaces group ledgers, accounts, and members under one close. Create one to begin tracking.</p>
  <div class="c-tm-empty__actions">
    <a href="#" class="c-tm-empty__btn c-tm-empty__btn--primary">Create workspace</a>
    <a href="#" class="c-tm-empty__btn c-tm-empty__btn--ghost">Read the quickstart</a>
  </div>
  <div class="c-tm-empty__hint">Or press <kbd>N</kbd> to create from anywhere.</div>
</div>
