<style>
  .c-dp-cta {
    position: relative;
    padding: 140px 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    overflow: hidden;
    isolation: isolate;
  }
  .c-dp-cta::before {
    content: '';
    position: absolute;
    inset: auto -10% -50% -10%;
    height: 100%;
    background: radial-gradient(
      50% 60% at 50% 100%,
      color-mix(in oklab, var(--accent) 22%, transparent) 0%,
      transparent 65%
    );
    z-index: -1;
    pointer-events: none;
  }
  .c-dp-cta__inner {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 40px;
    text-align: center;
  }
  .c-dp-cta__rule {
    display: block;
    width: 64px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 32px;
  }
  .c-dp-cta__eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 11px;
    color: var(--fg-muted);
    margin-bottom: 28px;
  }
  .c-dp-cta__headline {
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.05;
    letter-spacing: -0.025em;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: 24px;
  }
  .c-dp-cta__headline em {
    font-style: normal;
    color: var(--accent);
  }
  .c-dp-cta__lead {
    font-size: 19px;
    line-height: 1.55;
    color: var(--fg-muted);
    max-width: 560px;
    margin: 0 auto 48px;
  }
  .c-dp-cta__actions {
    display: inline-flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .c-dp-cta__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    transition: transform 350ms cubic-bezier(0.19, 1, 0.22, 1),
                box-shadow 350ms cubic-bezier(0.19, 1, 0.22, 1),
                background-color 350ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-cta__btn--primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .c-dp-cta__btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 36px -10px color-mix(in oklab, var(--accent) 60%, transparent);
  }
  .c-dp-cta__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .c-dp-cta__btn--ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 700px) {
    .c-dp-cta { padding: 96px 0; }
    .c-dp-cta__lead { font-size: 16px; }
  }
</style>

<section class="c-dp-cta">
  <div class="c-dp-cta__inner">
    <span class="c-dp-cta__rule" aria-hidden="true"></span>
    <div class="c-dp-cta__eyebrow">{BRAND} · FOR OPERATORS</div>
    <h2 class="c-dp-cta__headline">
      Your books, <em>correct</em> by Monday morning.
    </h2>
    <p class="c-dp-cta__lead">
      Join 3,240 operators who stopped waiting for month-end to know where they stand.
    </p>
    <div class="c-dp-cta__actions">
      <a href="#" class="c-dp-cta__btn c-dp-cta__btn--primary">Open account →</a>
      <a href="#" class="c-dp-cta__btn c-dp-cta__btn--ghost">Book a walkthrough</a>
    </div>
  </div>
</section>
