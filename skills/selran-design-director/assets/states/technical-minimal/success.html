<style>

    color: #fff;

  .c-tm-ok__hint kbd {

    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg-2);
    color: var(--fg);
  }

  @media (max-width: 900px) {
    .c-tm-ok { padding: 48px 20px; }
    .c-tm-ok__headline { font-size: 22px; }

      animation: c-tm-ok-draw 450ms cubic-bezier(0.2, 0, 0, 1) 100ms forwards;
