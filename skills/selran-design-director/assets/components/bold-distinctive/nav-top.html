<style>
  .c-bd-nav {
    background: var(--bg);
    border-bottom: 2px solid var(--fg);
    padding: 18px 0;
    position: sticky; top: 0; z-index: 10;
  }
  .c-bd-nav__inner {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .c-bd-nav__brand {
    font-family: var(--ff-display, 'PP Editorial New', 'Fraunces', Georgia, serif);
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .c-bd-nav__brand em {
    font-style: italic;
    color: var(--accent);
  }
  .c-bd-nav__links {
    display: flex;
    gap: 36px;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .c-bd-nav__links a {
    color: var(--fg);
    text-decoration: none;
    position: relative;
    padding: 4px 0;
    transition: color 150ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-bd-nav__links a::after {
    content: '';
    position: absolute;
    left: 0; right: 100%;
    bottom: -2px;
    height: 2px;
    background: var(--accent);
    transition: right 250ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-bd-nav__links a:hover { color: var(--accent); }
  .c-bd-nav__links a:hover::after { right: 0; }

  .c-bd-nav__btn {
    padding: 12px 22px;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: var(--fg);
    color: var(--bg);
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    border: 2px solid var(--fg);
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-bd-nav__btn:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  @media (max-width: 900px) {
    .c-bd-nav__inner { padding: 0 24px; }
    .c-bd-nav__brand { font-size: 22px; }
    .c-bd-nav__links { gap: 18px; font-size: 12px; }
    .c-bd-nav__links a:not(.c-bd-nav__btn) { display: none; }
  }
</style>

<nav class="c-bd-nav">
  <div class="c-bd-nav__inner">
    <a class="c-bd-nav__brand" href="#">{Bra<em>nd</em>}</a>
    <div class="c-bd-nav__links">
      <a href="#essays">Essays</a>
      <a href="#dispatches">Dispatches</a>
      <a href="#print">The Annual</a>
      <a href="#about">About</a>
      <a href="#" class="c-bd-nav__btn">Subscribe →</a>
    </div>
  </div>
</nav>
