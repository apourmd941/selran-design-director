<style>
  .c-br-topbar {
    background: var(--bg);
    color: var(--fg);
    border-bottom: 2px solid var(--border, var(--fg));
    font-family: var(--ff-mono, 'Space Mono', 'Courier New', ui-monospace, monospace);
    font-size: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .c-br-topbar__inner {
    display: flex; align-items: stretch;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0;
    min-height: 60px;
  }
  .c-br-topbar__brand {
    display: flex; align-items: center; gap: 10px;
    padding: 0 20px;
    font-weight: 700;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg);
    text-decoration: none;
    border-right: 2px solid var(--border, var(--fg));
  }
  .c-br-topbar__mark {
    width: 18px; height: 18px;
    background: var(--fg);
    display: inline-block;
  }
  .c-br-topbar__workspace {
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-muted);
    background: var(--bg);
    border: 0;
    border-right: 2px solid var(--border, var(--fg));
    cursor: pointer;
    font-family: inherit;
  }
  .c-br-topbar__workspace:hover { background: var(--fg); color: var(--bg); }
  .c-br-topbar__workspace-glyph { font-weight: 700; }

  .c-br-topbar__search {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px;
    border-right: 2px solid var(--border, var(--fg));
  }
  .c-br-topbar__search-prefix {
    font-weight: 700;
    color: var(--fg-muted);
    font-size: 13px;
  }
  .c-br-topbar__input {
    flex: 1;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--fg);
    background: var(--bg);
    border: 2px solid var(--border, var(--fg));
    outline: none;
    min-width: 0;
  }
  .c-br-topbar__input::placeholder {
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .c-br-topbar__input:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
  .c-br-topbar__kbd {
    font-size: 11px;
    padding: 3px 6px;
    border: 2px solid var(--border, var(--fg));
    color: var(--fg-muted);
    white-space: nowrap;
  }

  .c-br-topbar__actions {
    display: flex; align-items: stretch;
  }
  .c-br-topbar__iconbtn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0 14px;
    min-width: 48px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    color: var(--fg);
    background: var(--bg);
    border: 0;
    border-left: 2px solid var(--border, var(--fg));
    cursor: pointer;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .c-br-topbar__iconbtn:hover { background: var(--fg); color: var(--bg); }
  .c-br-topbar__iconbtn:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
  .c-br-topbar__badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 5px;
    font-size: 10px;
    border: 2px solid currentColor;
    line-height: 1;
  }

  .c-br-topbar__user {
    display: flex; align-items: center; gap: 10px;
    padding: 0 14px;
    border-left: 2px solid var(--border, var(--fg));
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    font-family: inherit;
    border-top: 0; border-right: 0; border-bottom: 0;
  }
  .c-br-topbar__user:hover { background: var(--fg); color: var(--bg); }
  .c-br-topbar__user:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
  .c-br-topbar__avatar {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 2px solid currentColor;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
  }
  .c-br-topbar__avatar::before { content: "[\25CF] "; margin-right: 2px; font-size: 10px; }
  .c-br-topbar__user-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  @media (max-width: 900px) {
    .c-br-topbar__workspace { display: none; }
    .c-br-topbar__input::placeholder { content: ""; }
    .c-br-topbar__kbd { display: none; }
    .c-br-topbar__user-label { display: none; }
    .c-br-topbar__iconbtn { padding: 0 10px; min-width: 44px; font-size: 12px; }
    .c-br-topbar__iconbtn-label { display: none; }
  }
</style>

<header class="c-br-topbar" role="banner">
  <div class="c-br-topbar__inner">
    <a class="c-br-topbar__brand" href="#" aria-label="{BRAND} home">
      <span class="c-br-topbar__mark" aria-hidden="true"></span>
      <span>{BRAND}</span>
    </a>

    <button class="c-br-topbar__workspace" type="button" aria-haspopup="menu" aria-label="Switch workspace">
      <span class="c-br-topbar__workspace-glyph" aria-hidden="true">[&#x25A0;]</span>
      <span>NORTH PRESS / MAIN</span>
      <span aria-hidden="true">&#x25BE;</span>
    </button>

    <form class="c-br-topbar__search" role="search" onsubmit="return false;">
      <label class="c-br-topbar__search-prefix" for="c-br-topbar-q" aria-hidden="true">[Q]</label>
      <input class="c-br-topbar__input" id="c-br-topbar-q" type="search" placeholder="SEARCH CATALOG, ARTISTS, SKU..." aria-label="Search">
      <span class="c-br-topbar__kbd" aria-hidden="true">[ &#8984; K ]</span>
    </form>

    <div class="c-br-topbar__actions">
      <a class="c-br-topbar__iconbtn" href="#" aria-label="Inbox">
        <span aria-hidden="true">[!]</span>
        <span class="c-br-topbar__iconbtn-label" style="margin-left:6px;">INBOX</span>
        <span class="c-br-topbar__badge" aria-label="3 unread">3</span>
      </a>
      <a class="c-br-topbar__iconbtn" href="#" aria-label="New release">
        <span aria-hidden="true">[+]</span>
        <span class="c-br-topbar__iconbtn-label" style="margin-left:6px;">NEW</span>
      </a>
      <button class="c-br-topbar__user" type="button" aria-haspopup="menu" aria-label="User menu">
        <span class="c-br-topbar__avatar" aria-hidden="true">A</span>
        <span class="c-br-topbar__user-label">A. KRUPNIK</span>
      </button>
    </div>
  </div>
</header>
