<style>
  .c-wa-stats {
    padding: 72px 0;
  }
  .c-wa-stats__inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .c-wa-stats__item {
    background: var(--bg-2);
    border-radius: var(--radius-lg, 24px);
    padding: 32px 28px;
    text-align: left;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-stats__item:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(61, 40, 23, 0.08);
  }
  .c-wa-stats__num {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: 52px;
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--accent);
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }
  .c-wa-stats__label {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 17px;
    color: var(--fg);
    margin-bottom: 6px;
  }
  .c-wa-stats__caption {
    font-size: 14px;
    color: var(--fg-muted);
    line-height: 1.5;
  }

  @media (max-width: 900px) {
    .c-wa-stats { padding: 48px 0; }
    .c-wa-stats__inner { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 560px) {
    .c-wa-stats__inner { grid-template-columns: 1fr; }
  }
</style>

<section class="c-wa-stats">
  <div class="c-wa-stats__inner">
    <div class="c-wa-stats__item">
      <div class="c-wa-stats__num">34</div>
      <div class="c-wa-stats__label">small workshops</div>
      <div class="c-wa-stats__caption">across 12 countries, all visited in person</div>
    </div>
    <div class="c-wa-stats__item">
      <div class="c-wa-stats__num">18k</div>
      <div class="c-wa-stats__label">homes served</div>
      <div class="c-wa-stats__caption">with an open line to our care team</div>
    </div>
    <div class="c-wa-stats__item">
      <div class="c-wa-stats__num">10yr</div>
      <div class="c-wa-stats__label">mender's promise</div>
      <div class="c-wa-stats__caption">we'll repair anything we made, for a decade</div>
    </div>
    <div class="c-wa-stats__item">
      <div class="c-wa-stats__num">92%</div>
      <div class="c-wa-stats__label">stay with us</div>
      <div class="c-wa-stats__caption">of members renew their annual box</div>
    </div>
  </div>
</section>
