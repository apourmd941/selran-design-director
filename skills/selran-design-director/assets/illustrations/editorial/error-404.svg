<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: editorial
  use: 404 page-not-found
  variables: var(fg), var(accent)
  notes: classical engraving of a torn manuscript page; rule-line typography; serif 404
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Page not found">
  <style>
    .ed-ink    { stroke: var(--fg, currentColor); fill: none; stroke-width: 1.25; vector-effect: non-scaling-stroke; }
    .ed-bold   { stroke: var(--fg, currentColor); fill: none; stroke-width: 2;    vector-effect: non-scaling-stroke; }
    .ed-fine   { stroke: var(--fg, currentColor); fill: none; stroke-width: .6; opacity: .6; vector-effect: non-scaling-stroke; }
    .ed-rule   { stroke: var(--fg, currentColor); fill: none; stroke-width: 1; vector-effect: non-scaling-stroke; }
    .ed-meta   { font-family: "Söhne", "Work Sans", ui-sans-serif, sans-serif; font-size: 9px; fill: var(--fg, currentColor); letter-spacing: .22em; text-transform: uppercase; }
    .ed-accent-st { stroke: var(--accent, #7A1F1F); fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
    .ed-accent { fill: var(--accent, #7A1F1F); }
  </style>

  <defs>
    <pattern id="ed-page-hatch" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="var(--fg, currentColor)" stroke-width=".45" opacity=".35"/>
    </pattern>
  </defs>

  <!-- torn manuscript page -->
  <g transform="translate(200 210)">
    <!-- jagged torn right edge -->
    <path fill="var(--bg, none)" class="ed-bold"
          d="M-110 -130 L60 -130 L70 -118 L55 -100 L75 -80 L55 -60 L68 -40 L58 -20 L72 0 L56 20 L70 40 L58 60 L74 80 L60 100 L70 120 L-110 120 Z"/>
    <!-- rule lines inside the page (text placeholder) -->
    <line class="ed-fine" x1="-95" y1="-105" x2="40" y2="-105"/>
    <line class="ed-fine" x1="-95" y1="-85"  x2="30" y2="-85"/>
    <line class="ed-fine" x1="-95" y1="-65"  x2="45" y2="-65"/>
    <line class="ed-fine" x1="-95" y1="-45"  x2="20" y2="-45"/>

    <!-- hatched shading along torn edge -->
    <path fill="url(#ed-page-hatch)"
          d="M40 -130 L60 -130 L70 -118 L55 -100 L75 -80 L55 -60 L68 -40 L58 -20 L72 0 L56 20 L70 40 L58 60 L74 80 L60 100 L70 120 L40 120 Z"/>

    <!-- Roman numeral 404 in serif, inside page -->
    <text x="-28" y="30"
          font-family="Fraunces, EB Garamond, Georgia, serif"
          font-size="64"
          font-weight="600"
          letter-spacing="-2"
          fill="var(--fg, currentColor)">404</text>

    <!-- small accent blot near the tear (ink spill) -->
    <circle cx="60" cy="48" r="4" class="ed-accent"/>
    <circle cx="68" cy="55" r="2" class="ed-accent"/>
    <circle cx="55" cy="58" r="1.5" class="ed-accent"/>
  </g>

  <!-- caption -->
  <line class="ed-rule" x1="60" y1="350" x2="340" y2="350"/>
  <text x="60"  y="370" class="ed-meta">No.&#160;404</text>
  <text x="340" y="370" text-anchor="end" class="ed-meta">Folio · Lost to Time</text>
</svg>
