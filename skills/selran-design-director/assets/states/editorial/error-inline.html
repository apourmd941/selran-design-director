<style>
  .c-ed-errin {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 22px 24px;
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 2px;
    background: var(--bg);
    max-width: 640px;
    font-family: inherit;
    color: var(--fg);
  }
  .c-ed-errin__mark {
    flex: none;
    width: 28px;
    height: 28px;
    border-radius: 9999px;
    border: 1px solid var(--accent);
    display: grid;
    place-items: center;
    color: var(--accent);
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 16px;
    line-height: 1;
    margin-top: 2px;
  }
  .c-ed-errin__body { flex: 1; min-width: 0; }
  .c-ed-errin__eyebrow {
    display: block;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 11px;
    color: var(--fg-muted);
    margin-bottom: 6px;
  }
  .c-ed-errin__headline {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 20px;
    line-height: 1.25;
    font-weight: 500;
    margin: 0 0 8px;
    color: var(--fg);
  }
  .c-ed-errin__message {
    font-size: 15px;
    line-height: 1.6;
    color: var(--fg-muted);
    margin: 0 0 14px;
  }
  .c-ed-errin__actions {
    display: flex;
    gap: 18px;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .c-ed-errin__retry {
    background: transparent;
    border: 0;
    padding: 0;
    font-family: inherit;
    font-size: 14px;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 4px;
    cursor: pointer;
    font-weight: 500;
    transition: color 250ms ease;
  }
  .c-ed-errin__retry:hover { color: var(--fg); }
  .c-ed-errin__retry:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }
  .c-ed-errin__dismiss {
    background: transparent;
    border: 0;
    padding: 0;
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 14px;
    color: var(--fg-muted);
    cursor: pointer;
    transition: color 250ms ease;
  }
  .c-ed-errin__dismiss:hover { color: var(--fg); }

  @media (max-width: 900px) {
    .c-ed-errin { padding: 18px; gap: 14px; }
  }
</style>

<div class="c-ed-errin" role="alert" aria-live="assertive">
  <span class="c-ed-errin__mark" aria-hidden="true">!</span>
  <div class="c-ed-errin__body">
    <span class="c-ed-errin__eyebrow">Syncing error</span>
    <h3 class="c-ed-errin__headline">Something went wrong.</h3>
    <p class="c-ed-errin__message">We couldn't reach the archive. The essay is saved locally; you can try again in a moment or continue reading what's already loaded.</p>
    <div class="c-ed-errin__actions">
      <button class="c-ed-errin__retry" type="button">Try again</button>
      <button class="c-ed-errin__dismiss" type="button">Dismiss</button>
    </div>
  </div>
</div>
