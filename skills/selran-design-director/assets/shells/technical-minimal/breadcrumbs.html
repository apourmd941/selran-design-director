<style>
  .c-tm-crumb {
    font-family: inherit;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .c-tm-crumb__list {
    display: flex;
    align-items: center;
    flex-wrap: nowrap;
    gap: 6px;
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 13px;
    color: var(--fg-muted);
    overflow: hidden;
  }
  .c-tm-crumb__item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .c-tm-crumb__link {
    color: var(--fg-muted);
    text-decoration: none;
    padding: 2px 4px;
    margin: -2px -4px;
    border-radius: 4px;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 200ms cubic-bezier(0.2, 0, 0, 1),
                background-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-crumb__link:hover { color: var(--fg); background: var(--bg-2); }
  .c-tm-crumb__link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-tm-crumb__sep {
    color: var(--fg-muted);
    opacity: 0.6;
    font-size: 12px;
    user-select: none;
  }
  .c-tm-crumb__current {
    color: var(--fg);
    font-weight: 500;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .c-tm-crumb__ellipsis {
    display: none;
    align-items: center;
    gap: 6px;
  }
  .c-tm-crumb__ellipsis-btn {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    color: var(--fg-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1;
    letter-spacing: 0.1em;
  }
  .c-tm-crumb__ellipsis-btn:hover { background: var(--bg-2); color: var(--fg); }
  .c-tm-crumb__ellipsis-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  @media (max-width: 900px) {
    .c-tm-crumb { padding: 8px 12px; }
    .c-tm-crumb__item--mid { display: none; }
    .c-tm-crumb__ellipsis { display: inline-flex; }
    .c-tm-crumb__link { max-width: 100px; }
    .c-tm-crumb__current { max-width: 140px; }
  }
</style>

<nav class="c-tm-crumb" aria-label="Breadcrumb">
  <ol class="c-tm-crumb__list">
    <li class="c-tm-crumb__item">
      <a class="c-tm-crumb__link" href="#">Meridian Capital</a>
    </li>
    <li class="c-tm-crumb__sep" aria-hidden="true">›</li>
    <li class="c-tm-crumb__item c-tm-crumb__ellipsis">
      <button class="c-tm-crumb__ellipsis-btn" type="button" aria-label="Show hidden breadcrumbs">…</button>
      <span class="c-tm-crumb__sep" aria-hidden="true">›</span>
    </li>
    <li class="c-tm-crumb__item c-tm-crumb__item--mid">
      <a class="c-tm-crumb__link" href="#">Ledgers</a>
    </li>
    <li class="c-tm-crumb__sep c-tm-crumb__item--mid" aria-hidden="true">›</li>
    <li class="c-tm-crumb__item c-tm-crumb__item--mid">
      <a class="c-tm-crumb__link" href="#">Q1 operating</a>
    </li>
    <li class="c-tm-crumb__sep c-tm-crumb__item--mid" aria-hidden="true">›</li>
    <li class="c-tm-crumb__item">
      <span class="c-tm-crumb__current" aria-current="page">Transaction #4821</span>
    </li>
  </ol>
</nav>
