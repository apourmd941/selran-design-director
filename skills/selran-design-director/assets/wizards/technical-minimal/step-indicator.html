<style>
  .c-tm-step {
    font-family: inherit;
    padding: 20px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .c-tm-step__inner {
    max-width: 880px;
    margin: 0 auto;
  }
  .c-tm-step__meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .c-tm-step__position {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
  }
  .c-tm-step__position strong { color: var(--fg); font-weight: 500; }
  .c-tm-step__heading {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
  }
  .c-tm-step__list {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .c-tm-step__item {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .c-tm-step__bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-step__item[data-state="done"] .c-tm-step__bar,
  .c-tm-step__item[data-state="active"] .c-tm-step__bar {
    background: var(--accent);
  }
  .c-tm-step__item[data-state="active"] .c-tm-step__bar {
    position: relative;
    background: linear-gradient(to right, var(--accent) 50%, var(--border) 50%);
  }
  .c-tm-step__row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .c-tm-step__num {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
  }
  .c-tm-step__item[data-state="active"] .c-tm-step__num { color: var(--accent); }
  .c-tm-step__item[data-state="done"] .c-tm-step__num { color: var(--fg); }
  .c-tm-step__label {
    font-size: 13px;
    color: var(--fg-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 400;
    transition: color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-step__item[data-state="active"] .c-tm-step__label {
    color: var(--fg);
    font-weight: 500;
  }
  .c-tm-step__item[data-state="done"] .c-tm-step__label {
    color: var(--fg);
  }
  .c-tm-step__check {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .c-tm-step__item[data-state="done"] .c-tm-step__check { display: inline-flex; }

  @media (max-width: 900px) {
    .c-tm-step { padding: 16px 16px; }
    .c-tm-step__list { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .c-tm-step__label { display: none; }
    .c-tm-step__item[data-state="active"] .c-tm-step__label { display: inline-block; }
  }
</style>

<nav class="c-tm-step" aria-label="Progress">
  <div class="c-tm-step__inner">
    <div class="c-tm-step__meta">
      <span class="c-tm-step__position"><strong>Step 02</strong> / 04</span>
      <span class="c-tm-step__heading">Onboarding</span>
    </div>
    <ol class="c-tm-step__list" role="list">
      <li class="c-tm-step__item" data-state="done">
        <div class="c-tm-step__bar" aria-hidden="true"></div>
        <div class="c-tm-step__row">
          <span class="c-tm-step__num">01 / 04</span>
          <span class="c-tm-step__check" aria-hidden="true">
            <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M2 4l1.5 1.5L6.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="c-tm-step__label">Account</span>
        </div>
      </li>
      <li class="c-tm-step__item" data-state="active" aria-current="step">
        <div class="c-tm-step__bar" aria-hidden="true"></div>
        <div class="c-tm-step__row">
          <span class="c-tm-step__num">02 / 04</span>
          <span class="c-tm-step__label">Workspace</span>
        </div>
      </li>
      <li class="c-tm-step__item" data-state="pending">
        <div class="c-tm-step__bar" aria-hidden="true"></div>
        <div class="c-tm-step__row">
          <span class="c-tm-step__num">03 / 04</span>
          <span class="c-tm-step__label">Team</span>
        </div>
      </li>
      <li class="c-tm-step__item" data-state="pending">
        <div class="c-tm-step__bar" aria-hidden="true"></div>
        <div class="c-tm-step__row">
          <span class="c-tm-step__num">04 / 04</span>
          <span class="c-tm-step__label">Review</span>
        </div>
      </li>
    </ol>
  </div>
</nav>
