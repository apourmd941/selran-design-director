<style>
  .c-tm-bnav { display: none; }

  @media (max-width: 768px) {
    .c-tm-bnav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0));
      z-index: 30;
      font-family: inherit;
    }
    .c-tm-bnav__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-height: 52px;
      padding: 6px 4px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--fg-muted);
      font-size: 11px;
      font-weight: 500;
      transition: color 200ms cubic-bezier(0.2, 0, 0, 1),
                  background-color 200ms cubic-bezier(0.2, 0, 0, 1);
    }
    .c-tm-bnav__item:hover { color: var(--fg); }
    .c-tm-bnav__item[aria-current="page"] {
      color: var(--accent);
    }
    .c-tm-bnav__item[aria-current="page"] .c-tm-bnav__icon { color: var(--accent); }
    .c-tm-bnav__item:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
    }
    .c-tm-bnav__icon {
      width: 20px; height: 20px;
      display: inline-flex;
      color: inherit;
    }
    .c-tm-bnav__label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  }
</style>

<nav class="c-tm-bnav" aria-label="Primary">
  <a class="c-tm-bnav__item" href="#" aria-current="page">
    <svg class="c-tm-bnav__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3 9l7-6 7 6v8a1 1 0 0 1-1 1h-3v-5H7v5H4a1 1 0 0 1-1-1V9z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
    <span class="c-tm-bnav__label">Home</span>
  </a>
  <a class="c-tm-bnav__item" href="#">
    <svg class="c-tm-bnav__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="3" y="4" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.4"/></svg>
    <span class="c-tm-bnav__label">Ledgers</span>
  </a>
  <a class="c-tm-bnav__item" href="#">
    <svg class="c-tm-bnav__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3 16l4-6 3 3 7-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="c-tm-bnav__label">Reports</span>
  </a>
  <a class="c-tm-bnav__item" href="#">
    <svg class="c-tm-bnav__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M4 17c1-3 3.5-4.5 6-4.5s5 1.5 6 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>

</nav>
