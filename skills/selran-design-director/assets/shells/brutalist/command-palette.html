<style>
  .c-br-cmdk {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 80px 16px 16px;
    background: color-mix(in oklab, var(--fg) 55%, transparent);
    font-family: var(--ff-mono, 'Space Mono', 'Courier New', ui-monospace, monospace);
  }
  .c-br-cmdk__panel {
    width: 100%;
    max-width: 640px;
    background: var(--bg);
    color: var(--fg);
    border: 2px solid var(--border, var(--fg));
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 100px);
    box-sizing: border-box;
  }
  .c-br-cmdk__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--fg);
    color: var(--bg);
    border-bottom: 2px solid var(--border, var(--fg));
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
  }
  .c-br-cmdk__searchrow {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 2px solid var(--border, var(--fg));
  }
  .c-br-cmdk__searchlabel {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-muted);
    white-space: nowrap;
  }
  .c-br-cmdk__input {
    flex: 1;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 15px;
    color: var(--fg);
    background: var(--bg);
    border: 2px solid var(--border, var(--fg));
    outline: none;
  }
  .c-br-cmdk__input:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
  .c-br-cmdk__input::placeholder {
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .c-br-cmdk__body {
    overflow-y: auto;
    flex: 1;
  }
  .c-br-cmdk__group { border-bottom: 2px solid var(--border, var(--fg)); }
  .c-br-cmdk__group:last-child { border-bottom: 0; }
  .c-br-cmdk__grouphead {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-muted);
    padding: 8px 14px;
    background: var(--bg-2);
    border-bottom: 2px solid var(--border, var(--fg));
  }
  .c-br-cmdk__list { list-style: none; margin: 0; padding: 0; }
  .c-br-cmdk__item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--fg);
    background: var(--bg);
    text-decoration: none;
    border: 0;
    width: 100%;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    border-bottom: 2px solid var(--border, var(--fg));
  }
  .c-br-cmdk__list li:last-child .c-br-cmdk__item { border-bottom: 0; }
  .c-br-cmdk__tag {
    flex: 0 0 auto;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 2px 6px;
    border: 2px solid var(--border, var(--fg));
    color: var(--fg);
  }
  .c-br-cmdk__label { flex: 1; }
  .c-br-cmdk__shortcut {
    font-size: 11px;
    color: var(--fg-muted);
    padding: 2px 6px;
    border: 2px solid var(--border, var(--fg));
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .c-br-cmdk__item:hover,
  .c-br-cmdk__item[aria-selected="true"] {
    background: var(--fg);
    color: var(--bg);
  }
  .c-br-cmdk__item:hover .c-br-cmdk__tag,
  .c-br-cmdk__item[aria-selected="true"] .c-br-cmdk__tag,
  .c-br-cmdk__item:hover .c-br-cmdk__shortcut,
  .c-br-cmdk__item[aria-selected="true"] .c-br-cmdk__shortcut {
    border-color: var(--bg);
    color: var(--bg);
  }

  .c-br-cmdk__foot {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 14px;
    border-top: 2px solid var(--border, var(--fg));
    font-size: 11px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: var(--bg);
  }
  .c-br-cmdk__foot kbd {
    font-family: inherit;
    padding: 2px 5px;
    border: 2px solid var(--border, var(--fg));
    margin-right: 4px;
    color: var(--fg);
    background: var(--bg);
  }

  @media (max-width: 900px) {
    .c-br-cmdk { padding: 24px 12px 12px; }
  }
</style>

<div class="c-br-cmdk" role="dialog" aria-modal="true" aria-labelledby="c-br-cmdk-title">
  <div class="c-br-cmdk__panel">
    <div class="c-br-cmdk__head">
      <span id="c-br-cmdk-title">// COMMAND / CAT. #CMD-01</span>
      <span>{BRAND}</span>
    </div>

    <div class="c-br-cmdk__searchrow">
      <label class="c-br-cmdk__searchlabel" for="c-br-cmdk-q">[ SEARCH ]</label>
      <input class="c-br-cmdk__input" id="c-br-cmdk-q" type="search" placeholder="TYPE A COMMAND OR PASTE A CAT. #" autofocus aria-label="Search commands">
    </div>

    <div class="c-br-cmdk__body">
      <section class="c-br-cmdk__group">
        <div class="c-br-cmdk__grouphead">// NAVIGATION</div>
        <ul class="c-br-cmdk__list" role="listbox">
          <li>
            <button class="c-br-cmdk__item" role="option" aria-selected="true" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[NAV]</span>
              <span class="c-br-cmdk__label">Go to Catalog &rarr; Releases</span>
              <span class="c-br-cmdk__shortcut" aria-hidden="true">G C</span>
            </button>
          </li>
          <li>
            <button class="c-br-cmdk__item" role="option" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[NAV]</span>
              <span class="c-br-cmdk__label">Go to Mail Order &rarr; Pending</span>
              <span class="c-br-cmdk__shortcut" aria-hidden="true">G M</span>
            </button>
          </li>
          <li>
            <button class="c-br-cmdk__item" role="option" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[NAV]</span>
              <span class="c-br-cmdk__label">Go to Zine &rarr; Issue 14</span>
            </button>
          </li>
        </ul>
      </section>

      <section class="c-br-cmdk__group">
        <div class="c-br-cmdk__grouphead">// ACTIONS</div>
        <ul class="c-br-cmdk__list" role="listbox">
          <li>
            <button class="c-br-cmdk__item" role="option" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[ACT]</span>
              <span class="c-br-cmdk__label">New release intake</span>
              <span class="c-br-cmdk__shortcut" aria-hidden="true">N R</span>
            </button>
          </li>
          <li>
            <button class="c-br-cmdk__item" role="option" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[ACT]</span>
              <span class="c-br-cmdk__label">Print packing slip for SKU-0142</span>
            </button>
          </li>
          <li>
            <button class="c-br-cmdk__item" role="option" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[ACT]</span>
              <span class="c-br-cmdk__label">Export ledger as CSV</span>
              <span class="c-br-cmdk__shortcut" aria-hidden="true">E L</span>
            </button>
          </li>
        </ul>
      </section>

      <section class="c-br-cmdk__group">
        <div class="c-br-cmdk__grouphead">// RECENT</div>
        <ul class="c-br-cmdk__list" role="listbox">
          <li>
            <button class="c-br-cmdk__item" role="option" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[RCN]</span>
              <span class="c-br-cmdk__label">NP-142 / Seam Welder &mdash; "FERRIC"</span>
            </button>
          </li>
          <li>
            <button class="c-br-cmdk__item" role="option" type="button">
              <span class="c-br-cmdk__tag" aria-hidden="true">[RCN]</span>
              <span class="c-br-cmdk__label">NP-141 / Rout Index &mdash; "DAMP SIGNAL"</span>
            </button>
          </li>
        </ul>
      </section>
    </div>

    <div class="c-br-cmdk__foot">
      <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> MOVE &nbsp;&nbsp; <kbd>&crarr;</kbd> SELECT</span>
      <span><kbd>ESC</kbd> CLOSE</span>
    </div>
  </div>
</div>
