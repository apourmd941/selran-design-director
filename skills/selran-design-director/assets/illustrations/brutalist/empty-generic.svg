<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: brutalist
  use: empty state
  variables: var(fg), var(bg), var(accent)
  notes: an empty halftone box with hard edges, mono label, intentional registration offset
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Empty">
  <style>
    .br-fg-fill  { fill: var(--fg, #000000); }
    .br-fg-stroke{ stroke: var(--fg, #000000); fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
    .br-accent-fill { fill: var(--accent, #B84400); }
    .br-mono     { font-family: "Space Mono", "JetBrains Mono", "Courier New", ui-monospace, monospace; fill: var(--fg, #000000); }
  </style>

  <defs>
    <pattern id="bre-halftone" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.8" fill="var(--fg, #000000)"/>
    </pattern>
  </defs>

  <!-- heavy border frame -->
  <rect class="br-fg-stroke" stroke-width="4" x="30" y="30" width="340" height="340"/>

  <!-- top strip with mono label -->
  <rect class="br-fg-fill" x="30" y="30" width="340" height="30"/>
  <text x="42" y="51" class="br-mono" font-size="12" letter-spacing="0.18em" fill="var(--bg, #FFFFFF)">EMPTY.STATE</text>
  <text x="358" y="51" text-anchor="end" class="br-mono" font-size="12" letter-spacing="0.18em" fill="var(--bg, #FFFFFF)">0 KB</text>

  <!-- halftone rectangle (the "nothing" zone) -->
  <rect x="60" y="90" width="280" height="200" fill="url(#bre-halftone)"/>
  <rect x="60" y="90" width="280" height="200" class="br-fg-stroke"/>

  <!-- intentional registration-offset accent block -->
  <rect x="66" y="96" width="100" height="28" class="br-accent-fill"/>
  <rect x="62" y="92" width="100" height="28" class="br-fg-stroke"/>
  <text x="116" y="114" text-anchor="middle" class="br-mono" font-size="11" letter-spacing="0.2em" fill="var(--fg, #000000)">NO DATA</text>

  <!-- bottom strip -->
  <rect class="br-fg-fill" x="30" y="330" width="340" height="40"/>
  <text x="200" y="356" text-anchor="middle" class="br-mono" font-size="14" letter-spacing="0.24em" fill="var(--bg, #FFFFFF)">AWAITING&#160;INPUT</text>
</svg>
