<style>
  .c-vp-sidebar {
    --sb-w: 256px;
    --sb-w-collapsed: 68px;
    --ease: cubic-bezier(0.34, 1.1, 0.64, 1);
    width: var(--sb-w);
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-right: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
    transition: width 280ms var(--ease);
    box-sizing: border-box;
  }
  .c-vp-sidebar[data-mode="collapsed"] { width: var(--sb-w-collapsed); }

  .c-vp-sidebar__brand {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 20px;
    height: 68px;
    box-sizing: border-box;
    font-weight: 700; font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-vp-sidebar__mark {
    flex: 0 0 auto;
    width: 28px; height: 28px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--p1, var(--accent)), var(--p2, var(--accent)) 60%, var(--p3, var(--accent)));
    box-shadow: 0 6px 14px -6px color-mix(in oklab, var(--p1, var(--accent)) 55%, transparent);
  }
  .c-vp-sidebar__brand-label { transition: opacity 220ms var(--ease); }
  .c-vp-sidebar[data-mode="collapsed"] .c-vp-sidebar__brand-label { opacity: 0; pointer-events: none; }

  .c-vp-sidebar__nav {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 12px 12px;
  }
  .c-vp-sidebar__section { margin-bottom: 20px; }
  .c-vp-sidebar__section:last-child { margin-bottom: 0; }
  .c-vp-sidebar__section[data-cat="1"] { --cat: var(--p1, var(--accent)); }
  .c-vp-sidebar__section[data-cat="2"] { --cat: var(--p2, var(--accent)); }
  .c-vp-sidebar__section[data-cat="3"] { --cat: var(--p3, var(--accent)); }
  .c-vp-sidebar__section[data-cat="4"] { --cat: var(--p4, var(--accent)); }
  .c-vp-sidebar__section[data-cat="5"] { --cat: var(--p5, var(--accent)); }

  .c-vp-sidebar__section-label {
    font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cat, var(--fg-muted));
    padding: 0 12px 8px;
    margin: 0;
    font-weight: 500;
  }
  .c-vp-sidebar[data-mode="collapsed"] .c-vp-sidebar__section-label { opacity: 0; height: 0; padding: 0; overflow: hidden; }

  .c-vp-sidebar__list { list-style: none; margin: 0; padding: 0; display: grid; gap: 2px; }
  .c-vp-sidebar__link {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px;
    min-height: 40px;
    font-size: 14px;
    font-weight: 500;
    color: var(--fg-muted);
    text-decoration: none;
    border-radius: 12px;
    position: relative;
    transition: background-color 220ms var(--ease),
                color 220ms var(--ease),
                transform 220ms var(--ease);
    box-sizing: border-box;
  }
  .c-vp-sidebar__link:hover {
    background: color-mix(in oklab, var(--cat, var(--accent)) 10%, var(--bg));
    color: var(--fg);
    transform: translateX(1px);
  }
  .c-vp-sidebar__link[aria-current="page"] {
    background: color-mix(in oklab, var(--cat, var(--accent)) 14%, var(--bg));
    color: var(--fg);
    font-weight: 500;
  }
  .c-vp-sidebar__link[aria-current="page"]::before {
    content: "";
    position: absolute;
    left: -4px; top: 10px; bottom: 10px;
    width: 4px;
    background: var(--cat, var(--accent));
    border-radius: 0 4px 4px 0;
  }
  .c-vp-sidebar__link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--cat, var(--accent));
  }

  .c-vp-sidebar__icon {
    flex: 0 0 auto;
    width: 18px; height: 18px;
    display: inline-flex;
    color: inherit;
  }
  .c-vp-sidebar__link[aria-current="page"] .c-vp-sidebar__icon { color: var(--cat, var(--accent)); }
  .c-vp-sidebar__label { white-space: nowrap; transition: opacity 150ms var(--ease); }
  .c-vp-sidebar[data-mode="collapsed"] .c-vp-sidebar__label { opacity: 0; pointer-events: none; }

  .c-vp-sidebar__badge {
    margin-left: auto;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 9999px;
    background: color-mix(in oklab, var(--cat, var(--accent)) 18%, var(--bg));
    color: var(--cat, var(--accent));
    font-variant-numeric: tabular-nums;
  }
  .c-vp-sidebar[data-mode="collapsed"] .c-vp-sidebar__badge { display: none; }

  .c-vp-sidebar__foot {
    flex: 0 0 auto;
    border-top: 1px solid var(--border);
    padding: 12px;
  }
  .c-vp-sidebar__me {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 12px;
    text-decoration: none;
    color: var(--fg);
    transition: background-color 220ms var(--ease);
  }
  .c-vp-sidebar__me:hover { background: var(--bg-2); }
  .c-vp-sidebar__avatar {
    width: 30px; height: 30px;
    border-radius: 9999px;
    background: linear-gradient(135deg, var(--p4, var(--accent)), var(--p1, var(--accent)));
    color: var(--bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex: 0 0 auto;
  }
  .c-vp-sidebar__me-meta { display: flex; flex-direction: column; min-width: 0; }
  .c-vp-sidebar__me-name { font-size: 13px; font-weight: 500; }
  .c-vp-sidebar__me-plan { font-size: 11px; color: var(--fg-muted); }
  .c-vp-sidebar[data-mode="collapsed"] .c-vp-sidebar__me-meta { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-sidebar, .c-vp-sidebar__link, .c-vp-sidebar__me { transition: none; }
  }

  @media (max-width: 1100px) {
    .c-vp-sidebar { width: var(--sb-w-collapsed); }
    .c-vp-sidebar .c-vp-sidebar__brand-label,
    .c-vp-sidebar .c-vp-sidebar__section-label,
    .c-vp-sidebar .c-vp-sidebar__label,
    .c-vp-sidebar .c-vp-sidebar__badge,
    .c-vp-sidebar .c-vp-sidebar__me-meta { opacity: 0; pointer-events: none; }
    .c-vp-sidebar .c-vp-sidebar__badge { display: none; }
  }
  @media (max-width: 900px) {
    .c-vp-sidebar {
      position: fixed; inset: 0 auto 0 0;
      width: 288px;
      z-index: 40;
      transform: translateX(-100%);
      transition: transform 280ms var(--ease);
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.25);
    }
    .c-vp-sidebar[data-mode="drawer-open"] { transform: translateX(0); }
    .c-vp-sidebar .c-vp-sidebar__brand-label,
    .c-vp-sidebar .c-vp-sidebar__section-label,
    .c-vp-sidebar .c-vp-sidebar__label,
    .c-vp-sidebar .c-vp-sidebar__badge,
    .c-vp-sidebar .c-vp-sidebar__me-meta { opacity: 1; pointer-events: auto; }
    .c-vp-sidebar .c-vp-sidebar__badge { display: inline-flex; }
  }
</style>
