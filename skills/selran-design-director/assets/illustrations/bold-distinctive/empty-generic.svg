<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: bold-distinctive
  use: empty state
  variables: var(fg), var(bg), var(accent)
  notes: oversized "NIL" display numeral as the entire illustration; small-caps metadata; tiny accent bar
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Nil — empty">
  <style>
    .bd-bg { fill: var(--bg, #F5F0E8); }
    .bd-fg-fill { fill: var(--fg, #0A0A0B); }
    .bd-accent-fill { fill: var(--accent, #C72500); }
    .bd-display { font-family: "PP Editorial New", "Fraunces", "Tiempos Headline", Georgia, serif; font-weight: 900; }
    .bd-meta { font-family: "General Sans", "Söhne", "Inter", ui-sans-serif, sans-serif; font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; fill: var(--fg, #0A0A0B); }
    .bd-rule { stroke: var(--fg, #0A0A0B); stroke-width: 1; fill: none; vector-effect: non-scaling-stroke; }
  </style>

  <rect class="bd-bg" width="400" height="400"/>

  <!-- top label with rule -->
  <line class="bd-rule" x1="40" y1="62" x2="160" y2="62"/>
  <text x="40" y="52" class="bd-meta">State · 00</text>

  <!-- huge NIL italic display, deliberately cropped at bottom -->
  <text x="200" y="290"
        text-anchor="middle"
        class="bd-display"
        font-size="230"
        letter-spacing="-8"
        font-style="italic"
        fill="var(--fg, #0A0A0B)">Nil.</text>

  <!-- accent bar behind, intentional off-grid break -->
  <rect class="bd-accent-fill" x="48" y="214" width="180" height="16" transform="rotate(-2 138 222)"/>

  <!-- bottom-right metadata -->
  <line class="bd-rule" x1="240" y1="356" x2="360" y2="356"/>
  <text x="360" y="348" text-anchor="end" class="bd-meta">No data on file</text>
  <text x="360" y="374" text-anchor="end" class="bd-meta" fill="var(--accent, #C72500)">Yet</text>
</svg>
