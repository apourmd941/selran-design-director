<style>
  .c-vp-login {
    position: relative;
    max-width: 420px;
    margin: 0 auto;
    padding: 44px 36px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg, 20px);
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.1);
    font-family: inherit;
    overflow: hidden;
    isolation: isolate;
  }
  .c-vp-login::before {
    content: '';
    position: absolute;
    top: -60px; left: -40px;
    width: 180px; height: 180px;
    background: var(--p0, var(--accent));
    opacity: 0.18;
    filter: blur(44px);
    z-index: -1;
  }
  .c-vp-login::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -40px;
    width: 200px; height: 200px;
    background: var(--p2, var(--accent));
    opacity: 0.16;
    filter: blur(50px);
    z-index: -1;
  }
  .c-vp-login__mark {
    width: 36px; height: 36px;
    border-radius: var(--radius-md, 12px);
    background: linear-gradient(135deg, var(--p0, var(--accent)) 0%, var(--p1, var(--accent)) 100%);
    display: block;
    margin-bottom: 18px;
    position: relative;
  }
  .c-vp-login__mark::after {
    content: '';
    position: absolute; inset: 9px;
    border-radius: 5px;
    background: var(--bg);
  }
  .c-vp-login__headline {
    font-size: 26px; letter-spacing: -0.02em; font-weight: 700;
    color: var(--fg);
    margin: 0 0 6px;
  }
  .c-vp-login__sub {
    font-size: 15px; color: var(--fg-muted);
    margin: 0 0 28px;
  }
  .c-vp-login__field { margin-bottom: 14px; }
  .c-vp-login__label {
    display: block;
    font-size: 13px; font-weight: 500;
    color: var(--fg);
    margin-bottom: 6px;
  }
  .c-vp-login__row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .c-vp-login__forgot {
    font-size: 13px; font-weight: 500;
    color: var(--accent);
    text-decoration: none;
  }
  .c-vp-login__forgot:hover { text-decoration: underline; text-underline-offset: 3px; }
  .c-vp-login__input {
    width: 100%; box-sizing: border-box;
    padding: 12px 14px;
    font-size: 14px; font-family: inherit; font-weight: 500;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--border-strong, var(--border));
    border-radius: var(--radius-md, 12px);
    outline: none;
    transition: border-color 280ms cubic-bezier(0.34, 1.1, 0.64, 1),
                box-shadow 280ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-login__input::placeholder { color: var(--fg-muted); font-weight: 400; }
  .c-vp-login__input:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 24%, transparent);
  }
  .c-vp-login__btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; box-sizing: border-box;
    padding: 12px 20px;
    margin-top: 8px;
    font-size: 15px; font-weight: 500;
    font-family: inherit;
    background: var(--accent); color: var(--bg);
    border: 0; border-radius: var(--radius-md, 12px);
    cursor: pointer;
    transition: transform 280ms cubic-bezier(0.34, 1.1, 0.64, 1),
                box-shadow 280ms cubic-bezier(0.34, 1.1, 0.64, 1),
                background-color 280ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-login__btn:hover {
    transform: translateY(-1px);
    background: var(--accent-hover, var(--accent));
    box-shadow: 0 10px 24px color-mix(in oklab, var(--accent) 40%, transparent);
  }
  .c-vp-login__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent);
  }
  .c-vp-login__divider {
    display: flex; align-items: center; gap: 12px;
    margin: 26px 0 14px;
    font-size: 12px; font-weight: 500;
    color: var(--fg-muted);
  }
  .c-vp-login__divider::before,
  .c-vp-login__divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .c-vp-login__oauth { display: flex; flex-direction: column; gap: 8px; }
  .c-vp-login__oauth-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 11px 16px;
    font-size: 14px; font-weight: 500;
    font-family: inherit;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--border-strong, var(--border));
    border-radius: var(--radius-md, 12px);
    text-decoration: none;
    cursor: pointer;
    transition: transform 280ms cubic-bezier(0.34, 1.1, 0.64, 1),
                border-color 280ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-login__oauth-btn[data-cat="0"]:hover { border-color: var(--p0, var(--accent)); }
  .c-vp-login__oauth-btn[data-cat="1"]:hover { border-color: var(--p1, var(--accent)); }
  .c-vp-login__oauth-btn:hover { transform: translateY(-1px); }
  .c-vp-login__oauth-btn:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 24%, transparent);
  }
  .c-vp-login__oauth-btn svg { width: 16px; height: 16px; }
  .c-vp-login__foot {
    margin-top: 22px;
    font-size: 14px; color: var(--fg-muted);
    text-align: center;
  }
  .c-vp-login__foot a { color: var(--accent); font-weight: 500; text-decoration: none; }
  .c-vp-login__foot a:hover { text-decoration: underline; text-underline-offset: 3px; }

  @media (max-width: 900px) {
    .c-vp-login { max-width: none; box-shadow: none; padding: 36px 24px; border-radius: 0; border-left: 0; border-right: 0; }
  }
</style>

<form class="c-vp-login" novalidate>
  <span class="c-vp-login__mark" aria-hidden="true"></span>
  <h1 class="c-vp-login__headline">Hey, welcome back.</h1>
  <p class="c-vp-login__sub">Your canvas and teams are one click away.</p>

  <div class="c-vp-login__field">
    <label class="c-vp-login__label" for="vp-email">Email</label>
    <input class="c-vp-login__input" id="vp-email" name="email" type="email" autocomplete="email" placeholder="you@studio.com" required>
  </div>

  <div class="c-vp-login__field">
    <div class="c-vp-login__row">
      <label class="c-vp-login__label" for="vp-password">Password</label>
      <a class="c-vp-login__forgot" href="#forgot">Forgot it?</a>
    </div>
    <input class="c-vp-login__input" id="vp-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
  </div>

  <button class="c-vp-login__btn" type="submit">Sign in to {Brand}</button>

  <div class="c-vp-login__divider">or continue with</div>

  <div class="c-vp-login__oauth">
    <a class="c-vp-login__oauth-btn" href="#google" data-cat="0">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21.35 11.1H12v3.8h5.35c-.23 1.23-1.44 3.6-5.35 3.6-3.22 0-5.85-2.67-5.85-5.95S8.78 6.6 12 6.6c1.83 0 3.06.78 3.77 1.45l2.57-2.48C16.7 4.1 14.55 3.2 12 3.2 7.06 3.2 3 7.25 3 12.2s4.06 9 9 9c5.2 0 8.65-3.65 8.65-8.8 0-.6-.06-1.05-.15-1.5z"/></svg>
      Continue with Google
    </a>
    <a class="c-vp-login__oauth-btn" href="#github" data-cat="1">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48l-.01-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85 0 1.7.11 2.5.33 1.9-1.29 2.74-1.02 2.74-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.33 4.69-4.56 4.94.36.31.68.91.68 1.85l-.01 2.74c0 .27.18.58.69.48A10 10 0 0 0 12 2z"/></svg>
      Continue with GitHub
    </a>
  </div>

  <p class="c-vp-login__foot">No account yet? <a href="#signup">Start free</a></p>
</form>
