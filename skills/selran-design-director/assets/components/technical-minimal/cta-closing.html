<style>
  .c-cta {
    border-top: 1px solid var(--border);
    padding: 100px 0;
  }
  .c-cta__inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: 7fr 5fr;
    gap: 80px;
    align-items: center;
  }
  .c-cta__headline {
    font-size: 40px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.12;
    color: var(--fg);
  }
  .c-cta__right { text-align: left; }
  .c-cta__lead {
    color: var(--fg-muted);
    margin-bottom: 24px;
    font-size: 16px;
    line-height: 1.5;
  }
  .c-cta__actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .c-cta__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-cta__btn--primary { background: var(--accent); color: #fff; }
  .c-cta__btn--primary:hover { filter: brightness(0.92); }
  .c-cta__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .c-cta__btn--ghost:hover { background: var(--bg-2); }

  @media (max-width: 900px) {
    .c-cta { padding: 80px 0; }
    .c-cta__inner { grid-template-columns: 1fr; gap: 40px; }
    .c-cta__headline { font-size: 28px; }
  }
</style>

<section class="c-cta">
  <div class="c-cta__inner">
    <div>
      <h2 class="c-cta__headline">Your books, correct by Monday morning.</h2>
    </div>
    <div class="c-cta__right">
      <p class="c-cta__lead">Join 3,240 operators who stopped waiting for month-end to know where they stand.</p>
      <div class="c-cta__actions">
        <a href="#" class="c-cta__btn c-cta__btn--primary">Open account →</a>
        <a href="#" class="c-cta__btn c-cta__btn--ghost">Book a walkthrough</a>
      </div>
    </div>
  </div>
</section>
