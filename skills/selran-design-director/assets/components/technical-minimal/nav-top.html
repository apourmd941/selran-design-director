<style>
  .c-nav-top {
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .c-nav-top__inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .c-nav-top__brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 16px; letter-spacing: -0.01em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-nav-top__mark {
    width: 20px; height: 20px;
    display: inline-block;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 0, 100% 40%, 60% 40%, 60% 100%, 0 100%);
  }
  .c-nav-top__links {
    display: flex; gap: 28px; align-items: center;
    font-size: 14px; color: var(--fg-muted);
  }
  .c-nav-top__links a {
    color: inherit;
    text-decoration: none;
    transition: color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-nav-top__links a:hover { color: var(--fg); }
  .c-nav-top__btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    font-size: 14px; font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                color 200ms cubic-bezier(0.2, 0, 0, 1),
                border-color 200ms cubic-bezier(0.2, 0, 0, 1);
    cursor: pointer;
    text-decoration: none;
    font-family: inherit;
  }
  .c-nav-top__btn--ghost {
    background: transparent; color: var(--fg);
    border-color: var(--border);
  }
  .c-nav-top__btn--ghost:hover { background: var(--bg-2); }
  .c-nav-top__btn--primary { background: var(--accent); color: #fff; }
  .c-nav-top__btn--primary:hover { filter: brightness(0.92); }

  @media (max-width: 900px) {
    .c-nav-top__links { gap: 16px; }
    .c-nav-top__links a:not(.c-nav-top__btn) { display: none; }
  }
</style>

<nav class="c-nav-top">
  <div class="c-nav-top__inner">
    <a class="c-nav-top__brand" href="#">
      <span class="c-nav-top__mark"></span>{Brand}
    </a>
    <div class="c-nav-top__links">
      <a href="#product">Product</a>
      <a href="#pricing">Pricing</a>
      <a href="#docs">Docs</a>
      <a href="#" class="c-nav-top__btn c-nav-top__btn--ghost">Sign in</a>
      <a href="#" class="c-nav-top__btn c-nav-top__btn--primary">Open account</a>
    </div>
  </div>
</nav>
