<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: editorial
  use: marketing hero, feature section opener
  variables: var(fg) (ink), var(bg) (parchment), var(accent) (oxblood or similar)
  notes: engraving feel via cross-hatch pattern fills; variable stroke weight; classical symmetric composition
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Classical engraving-style illustration">
  <style>
    .ed-ink       { stroke: var(--fg, currentColor); fill: none; stroke-width: 1.25; vector-effect: non-scaling-stroke; }
    .ed-bold      { stroke: var(--fg, currentColor); fill: none; stroke-width: 2.5; vector-effect: non-scaling-stroke; }
    .ed-fine      { stroke: var(--fg, currentColor); fill: none; stroke-width: .75; vector-effect: non-scaling-stroke; opacity: .7; }
    .ed-rule      { stroke: var(--fg, currentColor); fill: none; stroke-width: 1; vector-effect: non-scaling-stroke; }
    .ed-accent    { fill: var(--accent, #7A1F1F); }
    .ed-accent-st { stroke: var(--accent, #7A1F1F); fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
    .ed-metadata  { font-family: "Söhne", "Work Sans", ui-sans-serif, system-ui, sans-serif; font-size: 10px; fill: var(--fg, currentColor); letter-spacing: .22em; text-transform: uppercase; }
    .ed-serif     { font-family: "Fraunces", "EB Garamond", Georgia, "Times New Roman", serif; fill: var(--fg, currentColor); }
  </style>

  <defs>
    <!-- diagonal cross-hatch (two layers, one at 45°, one at -45°) -->
    <pattern id="ed-hatch-dense" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="var(--fg, currentColor)" stroke-width=".75"/>
    </pattern>
    <pattern id="ed-hatch-cross" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="var(--fg, currentColor)" stroke-width=".6"/>
      <line x1="3" y1="0" x2="3" y2="6" stroke="var(--fg, currentColor)" stroke-width=".6" opacity=".5"/>
    </pattern>
    <pattern id="ed-hatch-light" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="var(--fg, currentColor)" stroke-width=".5" opacity=".6"/>
    </pattern>

    <!-- ornamental flourish path for borders -->
    <symbol id="ed-fleuron" viewBox="0 0 24 12">
      <path class="ed-ink" d="M0 6 Q6 -2 12 6 Q18 14 24 6"/>
      <circle cx="12" cy="6" r="1.2" fill="var(--fg, currentColor)"/>
    </symbol>
  </defs>

  <!-- top rule with metadata -->
  <line class="ed-rule" x1="120" y1="70" x2="1080" y2="70"/>
  <text x="120" y="60" class="ed-metadata">Chapter One · Plate I</text>
  <text x="1080" y="60" text-anchor="end" class="ed-metadata">MMXXVI</text>

  <!-- central botanical-vase engraving (symmetric) -->
  <g transform="translate(600 330)">
    <!-- vase body (cross-hatched) -->
    <path fill="url(#ed-hatch-cross)" d="M-70 30 C-85 -20 -65 -60 -40 -70 L40 -70 C65 -60 85 -20 70 30 C60 80 40 110 0 120 C-40 110 -60 80 -70 30 Z"/>
    <path class="ed-bold" d="M-70 30 C-85 -20 -65 -60 -40 -70 L40 -70 C65 -60 85 -20 70 30 C60 80 40 110 0 120 C-40 110 -60 80 -70 30 Z"/>

    <!-- vase neck -->
    <path class="ed-bold" d="M-44 -70 L-44 -100 L-60 -105 L60 -105 L44 -100 L44 -70"/>
    <rect x="-60" y="-108" width="120" height="6" fill="url(#ed-hatch-dense)"/>
    <rect x="-60" y="-108" width="120" height="6" class="ed-ink"/>

    <!-- branches rising from vase -->
    <path class="ed-ink" d="M0 -108 Q-30 -160 -70 -190"/>
    <path class="ed-ink" d="M0 -108 Q 30 -160  70 -190"/>
    <path class="ed-ink" d="M0 -108 Q  0 -180   0 -220"/>
    <path class="ed-ink" d="M0 -108 Q-50 -140 -110 -160"/>
    <path class="ed-ink" d="M0 -108 Q 50 -140 110 -160"/>

    <!-- leaf shapes along branches (hatched) -->
    <g>
      <ellipse cx="-70" cy="-190" rx="14" ry="7" fill="url(#ed-hatch-light)" transform="rotate(-35 -70 -190)"/>
      <ellipse cx="-70" cy="-190" rx="14" ry="7" class="ed-fine" transform="rotate(-35 -70 -190)"/>

      <ellipse cx="70"  cy="-190" rx="14" ry="7" fill="url(#ed-hatch-light)" transform="rotate(35 70 -190)"/>
      <ellipse cx="70"  cy="-190" rx="14" ry="7" class="ed-fine" transform="rotate(35 70 -190)"/>

      <ellipse cx="-110" cy="-160" rx="12" ry="6" fill="url(#ed-hatch-light)" transform="rotate(-20 -110 -160)"/>
      <ellipse cx="-110" cy="-160" rx="12" ry="6" class="ed-fine" transform="rotate(-20 -110 -160)"/>

      <ellipse cx="110" cy="-160" rx="12" ry="6" fill="url(#ed-hatch-light)" transform="rotate(20 110 -160)"/>
      <ellipse cx="110" cy="-160" rx="12" ry="6" class="ed-fine" transform="rotate(20 110 -160)"/>
    </g>

    <!-- central accent bloom (oxblood) -->
    <circle cx="0" cy="-220" r="10" class="ed-accent"/>
    <circle cx="0" cy="-220" r="14" class="ed-accent-st"/>
    <circle cx="0" cy="-220" r="20" class="ed-fine"/>
  </g>

  <!-- pedestal rule -->
  <line class="ed-rule" x1="480" y1="470" x2="720" y2="470"/>
  <line class="ed-fine" x1="480" y1="474" x2="720" y2="474"/>

  <!-- ornamental fleurons -->
  <use href="#ed-fleuron" x="444" y="464" width="24" height="12"/>
  <use href="#ed-fleuron" x="732" y="464" width="24" height="12"/>

  <!-- bottom rule with caption -->
  <line class="ed-rule" x1="120" y1="540" x2="1080" y2="540"/>
  <text x="600" y="565" text-anchor="middle" class="ed-metadata">Engraved · Plate Reference 001 · Selran Editorial Library</text>
</svg>
