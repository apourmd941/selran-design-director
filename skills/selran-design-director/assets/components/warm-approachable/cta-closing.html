<style>
  .c-wa-cta {
    padding: 120px 0;
  }
  .c-wa-cta__inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .c-wa-cta__panel {
    background: var(--bg-2);
    border-radius: var(--radius-lg, 24px);
    padding: 72px 56px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(61, 40, 23, 0.06);
  }
  .c-wa-cta__panel::before,
  .c-wa-cta__panel::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.08;
    pointer-events: none;
  }
  .c-wa-cta__panel::before {
    width: 260px; height: 260px;
    top: -80px; left: -80px;
  }
  .c-wa-cta__panel::after {
    width: 200px; height: 200px;
    bottom: -60px; right: -60px;
  }
  .c-wa-cta__eyebrow {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    color: var(--accent);
    font-size: 17px;
    display: inline-block;
    margin-bottom: 16px;
    position: relative; z-index: 1;
  }
  .c-wa-cta__headline {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 500;
    line-height: 1.12;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin-bottom: 20px;
    position: relative; z-index: 1;
  }
  .c-wa-cta__headline em {
    font-style: italic;
    color: var(--accent);
  }
  .c-wa-cta__lead {
    font-size: 18px;
    line-height: 1.6;
    color: var(--fg-muted);
    max-width: 52ch;
    margin: 0 auto 36px;
    position: relative; z-index: 1;
  }
  .c-wa-cta__actions {
    display: inline-flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative; z-index: 1;
  }
  .c-wa-cta__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 28px;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-lg, 24px);
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-cta__btn--primary { background: var(--accent); color: var(--bg); }
  .c-wa-cta__btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 26px rgba(61, 40, 23, 0.18);
  }
  .c-wa-cta__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border-strong, var(--border));
  }
  .c-wa-cta__btn--ghost:hover { background: var(--bg); }

  @media (max-width: 900px) {
    .c-wa-cta { padding: 72px 0; }
    .c-wa-cta__panel { padding: 56px 28px; }
  }
</style>

<section class="c-wa-cta">
  <div class="c-wa-cta__inner">
    <div class="c-wa-cta__panel">
      <span class="c-wa-cta__eyebrow">A warm invitation</span>
      <h2 class="c-wa-cta__headline">
        The first box arrives <em>next Thursday.</em>
      </h2>
      <p class="c-wa-cta__lead">
        Join 18,000 homes getting one honest, hand-made thing in the mail each month &mdash; and ten years of mending if it ever needs it.
      </p>
      <div class="c-wa-cta__actions">
        <a href="#" class="c-wa-cta__btn c-wa-cta__btn--primary">Become a member</a>
        <a href="#" class="c-wa-cta__btn c-wa-cta__btn--ghost">Send us a letter</a>
      </div>
    </div>
  </div>
</section>
