<style>
  .c-wa-spin {
    font-family: inherit;
    color: var(--fg);
  }

  /* ---- Full-viewport variant ---- */
  .c-wa-spin--full {
    min-height: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 64px 32px;
    background: var(--bg);
    text-align: center;
  }
  .c-wa-spin__halo {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--bg-2);
    display: inline-flex;
    align-items: center; justify-content: center;
    box-shadow: 0 10px 28px rgba(61, 40, 23, 0.10);
  }
  .c-wa-spin__ring {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 3px solid color-mix(in oklab, var(--accent) 22%, var(--bg-3));
    border-top-color: var(--accent);
    animation: c-wa-spin-rot 900ms cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  .c-wa-spin__label {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 18px;
    color: var(--fg);
    margin: 0;
  }
  .c-wa-spin__hint {
    font-size: 14px;
    color: var(--fg-muted);
    margin: 0;
  }

  /* ---- Inline variant ---- */
  .c-wa-spin--inline {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 8px 12px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-size: 14px;
    color: var(--fg-muted);
  }
  .c-wa-spin__ring--sm {
    width: 16px; height: 16px;
    border-width: 2px;
  }
  .c-wa-spin__static {
    display: none;
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 14px;
    color: var(--fg-muted);
  }

  @keyframes c-wa-spin-rot {
    to { transform: rotate(360deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-spin__ring { animation: none; border-top-color: color-mix(in oklab, var(--accent) 22%, var(--bg-3)); display: none; }
    .c-wa-spin__halo { display: none; }
    .c-wa-spin__static { display: inline; }
    .c-wa-spin--full .c-wa-spin__static { display: block; }
  }
</style>

<!-- Full-viewport variant -->
<section class="c-wa-spin c-wa-spin--full" role="status" aria-live="polite">
  <span class="c-wa-spin__halo" aria-hidden="true">
    <span class="c-wa-spin__ring"></span>
  </span>
  <p class="c-wa-spin__label">Just a moment…</p>
  <p class="c-wa-spin__hint">Gathering your journal entries.</p>
  <p class="c-wa-spin__static">Loading your journal entries.</p>
</section>

<!-- Inline variant (use anywhere in a row, toolbar, button context) -->
<span class="c-wa-spin c-wa-spin--inline" role="status" aria-live="polite">
  <span class="c-wa-spin__ring c-wa-spin__ring--sm" aria-hidden="true"></span>
  <span>Saving your note…</span>
  <span class="c-wa-spin__static">Saving…</span>
</span>
