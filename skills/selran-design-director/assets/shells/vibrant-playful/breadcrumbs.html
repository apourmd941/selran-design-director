<style>
  .c-vp-crumb {
    --ease: cubic-bezier(0.34, 1.1, 0.64, 1);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    font-family: inherit;
    font-size: 13px;
    color: var(--fg-muted);
  }
  .c-vp-crumb__list {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .c-vp-crumb__item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .c-vp-crumb__link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    font-weight: 500;
    color: var(--fg-muted);
    background: transparent;
    border-radius: 9999px;
    text-decoration: none;
    transition: background-color 220ms var(--ease),
                color 220ms var(--ease);
  }
  .c-vp-crumb__link:hover {
    background: var(--bg-2);
    color: var(--fg);
  }
  .c-vp-crumb__link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-vp-crumb__link svg { width: 14px; height: 14px; }

  .c-vp-crumb__item[aria-current="page"] .c-vp-crumb__link {
    background: color-mix(in oklab, var(--cat, var(--accent)) 16%, var(--bg));
    color: var(--cat, var(--accent));
    font-weight: 500;
    pointer-events: none;
  }
  .c-vp-crumb__item[data-cat="1"] { --cat: var(--p1, var(--accent)); }
  .c-vp-crumb__item[data-cat="2"] { --cat: var(--p2, var(--accent)); }
  .c-vp-crumb__item[data-cat="3"] { --cat: var(--p3, var(--accent)); }
  .c-vp-crumb__item[data-cat="4"] { --cat: var(--p4, var(--accent)); }
  .c-vp-crumb__item[data-cat="5"] { --cat: var(--p5, var(--accent)); }

  .c-vp-crumb__sep {
    color: var(--fg-muted);
    font-size: 14px;
    opacity: 0.6;
    user-select: none;
    padding: 0 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-crumb__link { transition: none; }
  }

  @media (max-width: 900px) {
    .c-vp-crumb__item--middle { display: none; }
    .c-vp-crumb__item--middle + .c-vp-crumb__sep { display: none; }
    .c-vp-crumb__list::after {
      content: "&hellip;";
      color: var(--fg-muted);
      padding: 0 6px;
    }
  }
</style>

<nav class="c-vp-crumb" aria-label="Breadcrumb">
  <ol class="c-vp-crumb__list">
    <li class="c-vp-crumb__item">
      <a class="c-vp-crumb__link" href="#">
        <svg viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 6l5-4 5 4v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Workspace
      </a>
    </li>
    <li class="c-vp-crumb__sep" aria-hidden="true">&rsaquo;</li>
    <li class="c-vp-crumb__item c-vp-crumb__item--middle">
      <a class="c-vp-crumb__link" href="#">Third Draft Studio</a>
    </li>
    <li class="c-vp-crumb__sep" aria-hidden="true">&rsaquo;</li>
    <li class="c-vp-crumb__item c-vp-crumb__item--middle">
      <a class="c-vp-crumb__link" href="#">Spring campaign</a>
    </li>
    <li class="c-vp-crumb__sep" aria-hidden="true">&rsaquo;</li>
    <li class="c-vp-crumb__item" aria-current="page" data-cat="1">
      <span class="c-vp-crumb__link">Hero storyboard &mdash; v3</span>
    </li>
  </ol>
</nav>
