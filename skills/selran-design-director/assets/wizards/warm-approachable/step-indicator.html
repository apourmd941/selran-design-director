<style>
  .c-wa-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-family: inherit;
    box-shadow: 0 4px 14px rgba(61, 40, 23, 0.06);
    list-style: none;
    margin: 0;
    max-width: max-content;
    box-sizing: border-box;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .c-wa-step::-webkit-scrollbar { display: none; }

  .c-wa-step__item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .c-wa-step__pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    min-height: 36px;
    border-radius: 9999px;
    background: transparent;
    color: var(--fg-muted);
    font-size: 14px;
    font-family: inherit;
    white-space: nowrap;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
  }
  .c-wa-step__item[data-state="done"] .c-wa-step__pill {
    color: var(--fg);
  }
  .c-wa-step__item[aria-current="step"] .c-wa-step__pill {
    background: var(--accent);
    color: var(--bg);
    font-weight: 500;
    box-shadow: 0 6px 16px rgba(61, 40, 23, 0.18);
  }
  .c-wa-step__mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--fg-muted);
    border: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-weight: 500;
    flex-shrink: 0;
  }
  .c-wa-step__item[data-state="done"] .c-wa-step__mark {
    background: color-mix(in oklab, var(--accent) 18%, var(--bg));
    color: var(--accent);
    border-color: transparent;
  }
  .c-wa-step__item[aria-current="step"] .c-wa-step__mark {
    background: rgba(255, 255, 255, 0.22);
    color: var(--bg);
    border-color: transparent;
  }
  .c-wa-step__dot {
    display: inline-flex;
    align-items: center;
    color: var(--fg-muted);
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    padding: 0 2px;
    opacity: 0.55;
  }
  .c-wa-step__item[data-state="done"] + .c-wa-step__dot { opacity: 0.9; color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-step__pill { transition: none; }
  }

  @media (max-width: 900px) {
    .c-wa-step { max-width: 100%; padding: 6px; }
    .c-wa-step__pill { padding: 8px 14px; font-size: 13px; }
  }
</style>

<ol class="c-wa-step" role="list" aria-label="Sign-up progress">
  <li class="c-wa-step__item" data-state="done">
    <span class="c-wa-step__pill">
      <span class="c-wa-step__mark" aria-hidden="true">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span>Basics</span>
      <span class="sr-only">, complete</span>
    </span>
  </li>
  <li class="c-wa-step__dot" aria-hidden="true">·</li>
  <li class="c-wa-step__item" aria-current="step">
    <span class="c-wa-step__pill">
      <span class="c-wa-step__mark" aria-hidden="true">2</span>
      <span>Team</span>
    </span>
  </li>
  <li class="c-wa-step__dot" aria-hidden="true">·</li>
  <li class="c-wa-step__item" data-state="todo">
    <span class="c-wa-step__pill">
      <span class="c-wa-step__mark" aria-hidden="true">3</span>
      <span>Review</span>
    </span>
  </li>
  <li class="c-wa-step__dot" aria-hidden="true">·</li>
  <li class="c-wa-step__item" data-state="todo">
    <span class="c-wa-step__pill">
      <span class="c-wa-step__mark" aria-hidden="true">4</span>
      <span>Done</span>
    </span>
  </li>
</ol>
