<style>
  .c-br-tour {
    font-family: var(--ff-mono, 'Space Mono', 'Courier New', ui-monospace, monospace);
    color: var(--fg);
  }

  /* Layout frame to demonstrate anchor — host can drop the dialog anywhere */
  .c-br-tour__stage {
    position: relative;
    min-height: 280px;
    padding: 32px 20px;
    background: var(--bg);
    border: 2px solid var(--border, var(--fg));
  }
  .c-br-tour__target {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--bg);
    color: var(--fg);
    border: 2px solid var(--border, var(--fg));
    outline: 4px solid var(--accent);
    outline-offset: 2px;
  }

  /* Tooltip dialog — no rounding, no arrow, clean edge pointer */
  .c-br-tour__dialog {
    position: absolute;
    top: 80px;
    left: 20px;
    width: 320px;
    max-width: calc(100% - 40px);
    background: var(--bg);
    color: var(--fg);
    border: 2px solid var(--border, var(--fg));
    z-index: 5;
  }
  /* Edge pointer — a flat bar extending from the dialog edge back toward the target */
  .c-br-tour__dialog::before {
    content: "";
    position: absolute;
    left: 24px;
    top: -24px;
    width: 2px;
    height: 24px;
    background: var(--fg);
  }
  .c-br-tour__dialog::after {
    content: "";
    position: absolute;
    left: 16px;
    top: -26px;
    width: 18px;
    height: 2px;
    background: var(--fg);
  }

  .c-br-tour__head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 12px;
    background: var(--fg);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    border-bottom: 2px solid var(--border, var(--fg));
  }
  .c-br-tour__close {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    background: transparent;
    color: var(--bg);
    border: 0;
    padding: 0 4px;
    cursor: pointer;
  }
  .c-br-tour__close:hover { background: var(--bg); color: var(--fg); }
  .c-br-tour__close:focus-visible { outline: 4px solid var(--accent); outline-offset: 2px; }

  .c-br-tour__body { padding: 14px 14px 12px; }
  .c-br-tour__title {
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 0 0 6px;
  }
  .c-br-tour__copy {
    font-size: 13px;
    line-height: 1.5;
    margin: 0 0 12px;
    color: var(--fg);
  }

  .c-br-tour__progress {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--fg-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .c-br-tour__progress-bar {
    display: inline-block;
    margin-left: 6px;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--fg);
  }

  .c-br-tour__actions {
    display: flex;
    border-top: 2px solid var(--border, var(--fg));
  }
  .c-br-tour__btn {
    flex: 1;
    padding: 11px 10px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--bg);
    color: var(--fg);
    border: 0;
    border-right: 2px solid var(--border, var(--fg));
    cursor: pointer;
    text-decoration: none;
    text-align: center;
  }
  .c-br-tour__btn:last-child { border-right: 0; }
  .c-br-tour__btn:hover { background: var(--fg); color: var(--bg); }
  .c-br-tour__btn:focus-visible { outline: 4px solid var(--accent); outline-offset: -4px; }
  .c-br-tour__btn--primary { background: var(--accent); color: var(--bg); }
  .c-br-tour__btn--primary:hover { background: var(--fg); color: var(--accent); }
  .c-br-tour__btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .c-br-tour__btn:disabled:hover { background: var(--bg); color: var(--fg); }

  @media (max-width: 900px) {
    .c-br-tour__dialog {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      top: auto;
      width: auto;
      max-width: none;
    }
    .c-br-tour__dialog::before,
    .c-br-tour__dialog::after { display: none; }
  }
</style>

<div class="c-br-tour">
  <div class="c-br-tour__stage">
    <!-- Target element (highlighted with outline) -->
    <button class="c-br-tour__target" type="button">
      <span aria-hidden="true">[+]</span>
      <span>NEW RELEASE</span>
    </button>

    <!-- Tooltip dialog, anchored to target -->
    <div class="c-br-tour__dialog"
         role="dialog"
         aria-modal="false"
         aria-labelledby="c-br-tour-title"
         aria-describedby="c-br-tour-body">
      <div class="c-br-tour__head">
        <span>[ TIP 2 / 5 ]</span>
        <button class="c-br-tour__close" type="button" aria-label="Close tour (Esc)" data-dismiss>[&times;]</button>
      </div>

      <div class="c-br-tour__body">
        <div class="c-br-tour__progress" aria-hidden="true">
          PROGRESS
          <span class="c-br-tour__progress-bar">[&#x25A0;&#x25A0;&#x25A1;&#x25A1;&#x25A1;]</span>
        </div>
        <h2 class="c-br-tour__title" id="c-br-tour-title">FILE A RELEASE</h2>
        <p class="c-br-tour__copy" id="c-br-tour-body">
          Hit this button to start a new intake. Four short steps. Cat number, pressing details, ship-to, commit. Draft saves on every field.
        </p>
      </div>

      <div class="c-br-tour__actions">
        <button class="c-br-tour__btn" type="button" data-action="skip">[SKIP]</button>
        <button class="c-br-tour__btn" type="button" data-action="prev">[PREV]</button>
        <button class="c-br-tour__btn c-br-tour__btn--primary" type="button" data-action="next" autofocus>[NEXT]</button>
      </div>
    </div>
  </div>
</div>
