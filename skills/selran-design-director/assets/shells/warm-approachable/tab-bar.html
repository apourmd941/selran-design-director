<style>
  .c-wa-tabs {
    display: flex;
    gap: 4px;
    padding: 6px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 9999px;
    overflow-x: auto;
    scrollbar-width: none;
    font-family: inherit;
    box-sizing: border-box;
    max-width: max-content;
  }
  .c-wa-tabs::-webkit-scrollbar { display: none; }

  .c-wa-tabs__tab {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px;
    min-height: 36px;
    font-size: 14px;
    font-family: inherit;
    color: var(--fg-muted);
    background: transparent;
    border: 0;
    border-radius: 9999px;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
  }
  .c-wa-tabs__tab:hover {
    background: var(--bg);
    color: var(--fg);
  }
  .c-wa-tabs__tab[aria-selected="true"],
  .c-wa-tabs__tab[aria-current="page"] {
    background: var(--bg);
    color: var(--fg);
    font-weight: 500;
    box-shadow: 0 4px 12px rgba(61, 40, 23, 0.08),
                0 0 0 1px var(--border) inset;
  }
  .c-wa-tabs__tab:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg-2), 0 0 0 4px var(--accent);
  }

  .c-wa-tabs__count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 22px;
    padding: 0 8px;
    font-size: 12px;
    color: var(--fg-muted);
    background: var(--bg-3);
    border-radius: 9999px;
    font-variant-numeric: tabular-nums;
  }
  .c-wa-tabs__tab[aria-selected="true"] .c-wa-tabs__count,
  .c-wa-tabs__tab[aria-current="page"] .c-wa-tabs__count {
    background: var(--accent);
    color: var(--bg);
  }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-tabs__tab { transition: none; }
  }

  @media (max-width: 900px) {
    .c-wa-tabs { max-width: 100%; border-radius: 9999px; }
    .c-wa-tabs__tab { padding: 8px 14px; font-size: 13px; }
  }
</style>

<div class="c-wa-tabs" role="tablist" aria-label="Journal views">
  <button class="c-wa-tabs__tab" type="button" role="tab" aria-selected="true" aria-controls="wa-panel-all">
    All entries
    <span class="c-wa-tabs__count" aria-label="28 entries">28</span>
  </button>
  <button class="c-wa-tabs__tab" type="button" role="tab" aria-selected="false" aria-controls="wa-panel-mood">
    Mood
  </button>
  <button class="c-wa-tabs__tab" type="button" role="tab" aria-selected="false" aria-controls="wa-panel-gratitude">
    Gratitude
    <span class="c-wa-tabs__count" aria-label="7 entries">7</span>
  </button>
  <button class="c-wa-tabs__tab" type="button" role="tab" aria-selected="false" aria-controls="wa-panel-sleep">
    Sleep
  </button>
  <button class="c-wa-tabs__tab" type="button" role="tab" aria-selected="false" aria-controls="wa-panel-archive">
    Tucked away
  </button>
</div>
