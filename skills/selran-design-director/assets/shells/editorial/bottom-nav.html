<style>
  .c-ed-bnav { display: none; }

  @media (max-width: 768px) {
    .c-ed-bnav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0));
      z-index: 40;
      font-family: inherit;
    }
    .c-ed-bnav__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px;
      min-height: 48px;
      text-decoration: none;
      color: var(--fg-muted);
      background: transparent;
      border: 0;
      cursor: pointer;
      font-family: inherit;
      transition: color 250ms ease;
    }
    .c-ed-bnav__item:hover { color: var(--fg); }
    .c-ed-bnav__item[aria-current="page"] {
      color: var(--accent);
    }
    .c-ed-bnav__item[aria-current="page"] .c-ed-bnav__label {
      font-style: italic;
    }
    .c-ed-bnav__item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      border-radius: 2px;
    }
    .c-ed-bnav__glyph { color: currentColor; }
    .c-ed-bnav__label {
      font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
      font-size: 12px;
      line-height: 1.2;
      color: currentColor;
    }
  }
</style>

<nav class="c-ed-bnav" aria-label="Primary" role="navigation">
  <a class="c-ed-bnav__item" href="#" aria-current="page">
    <svg class="c-ed-bnav__glyph" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M3 3h12v12H3z" stroke="currentColor" stroke-width="1"/>
      <path d="M6 6h6M6 9h6M6 12h4" stroke="currentColor" stroke-width="1"/>
    </svg>
    <span class="c-ed-bnav__label">Today</span>
  </a>
  <a class="c-ed-bnav__item" href="#">
    <svg class="c-ed-bnav__glyph" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M4 3h10v12H4z" stroke="currentColor" stroke-width="1"/>
      <path d="M4 3l5 5 5-5" stroke="currentColor" stroke-width="1"/>
    </svg>
    <span class="c-ed-bnav__label">Queue</span>
  </a>
  <a class="c-ed-bnav__item" href="#">
    <svg class="c-ed-bnav__glyph" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M4 2v14l5-3 5 3V2z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
    </svg>
    <span class="c-ed-bnav__label">Saved</span>
  </a>
  <a class="c-ed-bnav__item" href="#">
    <svg class="c-ed-bnav__glyph" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <circle cx="9" cy="7" r="3" stroke="currentColor" stroke-width="1"/>
      <path d="M3 16c1-3 3.5-4.5 6-4.5s5 1.5 6 4.5" stroke="currentColor" stroke-width="1"/>
    </svg>
    <span class="c-ed-bnav__label">Profile</span>
  </a>
</nav>
