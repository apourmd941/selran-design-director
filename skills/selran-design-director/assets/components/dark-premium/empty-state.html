<style>
  .c-dp-empty {
    max-width: 560px;
    margin: 0 auto;
    padding: 120px 32px;
    text-align: center;
    position: relative;
    isolation: isolate;
  }
  .c-dp-empty::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(
      40% 40% at 50% 30%,
      color-mix(in oklab, var(--accent) 18%, transparent) 0%,
      transparent 70%
    );
    z-index: -1;
    pointer-events: none;
  }
  .c-dp-empty__glyph {
    width: 64px;
    height: 64px;
    margin: 0 auto 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 28px;
    font-weight: 500;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    box-shadow:
      0 0 0 1px color-mix(in oklab, var(--accent) 20%, transparent),
      0 0 40px color-mix(in oklab, var(--accent) 25%, transparent);
  }
  .c-dp-empty__eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-muted);
    margin-bottom: 18px;
  }
  .c-dp-empty__headline {
    font-size: clamp(26px, 3vw, 34px);
    line-height: 1.2;
    letter-spacing: -0.015em;
    font-weight: 500;
    color: var(--fg);
    margin: 0 0 14px;
  }
  .c-dp-empty__headline em {
    font-style: normal;
    color: var(--accent);
  }
  .c-dp-empty__body {
    font-size: 16px;
    line-height: 1.65;
    color: var(--fg-muted);
    margin: 0 auto 36px;
    max-width: 48ch;
  }
  .c-dp-empty__cta {
    display: inline-flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .c-dp-empty__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 300ms cubic-bezier(0.19, 1, 0.22, 1),
                box-shadow 300ms cubic-bezier(0.19, 1, 0.22, 1),
                background-color 300ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-empty__btn--primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .c-dp-empty__btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 30px -8px color-mix(in oklab, var(--accent) 50%, transparent);
  }
  .c-dp-empty__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .c-dp-empty__btn--ghost:hover {
    background: var(--bg-2);
    border-color: var(--accent);
  }

  @media (max-width: 900px) {
    .c-dp-empty { padding: 80px 24px; }
  }
</style>

<section class="c-dp-empty">
  <div class="c-dp-empty__glyph" aria-hidden="true">&#x25C7;</div>
  <div class="c-dp-empty__eyebrow">Portfolio &middot; Empty</div>
  <h2 class="c-dp-empty__headline">No positions on record <em>yet.</em></h2>
  <p class="c-dp-empty__body">Your first allocation unlocks the rest of the dashboard &mdash; risk bands, yield curves, and the long view. Take a moment; you don't have to rush it.</p>
  <div class="c-dp-empty__cta">
    <a href="#" class="c-dp-empty__btn c-dp-empty__btn--primary">Fund your first position &rarr;</a>
    <a href="#" class="c-dp-empty__btn c-dp-empty__btn--ghost">Talk to an advisor</a>
  </div>
</section>
