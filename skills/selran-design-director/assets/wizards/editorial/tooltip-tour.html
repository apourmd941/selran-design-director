<style>
  .c-ed-tour {
    position: relative;
    max-width: 380px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 24px 24px 18px;
    font-family: inherit;
    color: var(--fg);
    box-sizing: border-box;
  }
  .c-ed-tour::before {
    content: '';
    position: absolute;
    top: -7px;
    left: 32px;
    width: 12px;
    height: 12px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    transform: rotate(45deg);
  }

  .c-ed-tour__close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 26px;
    height: 26px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg-muted);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: color 250ms ease, border-color 250ms ease;
  }
  .c-ed-tour__close:hover { color: var(--fg); border-color: var(--fg); }
  .c-ed-tour__close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .c-ed-tour__eyebrow {
    display: block;
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .c-ed-tour__headline {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-size: 20px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    font-weight: 500;
    margin: 0 0 10px;
    color: var(--fg);
    padding-right: 28px;
  }
  .c-ed-tour__headline em { font-style: italic; color: var(--accent); }
  .c-ed-tour__body {
    font-size: 14px;
    line-height: 1.6;
    color: var(--fg-muted);
    margin: 0 0 20px;
  }

  .c-ed-tour__foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .c-ed-tour__count {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 13px;
    color: var(--fg-muted);
  }
  .c-ed-tour__actions {
    display: flex;
    gap: 16px;
    align-items: baseline;
  }
  .c-ed-tour__link {
    background: transparent;
    border: 0;
    padding: 4px 0;
    font-family: inherit;
    font-size: 14px;
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 4px;
    cursor: pointer;
    transition: color 250ms ease;
  }
  .c-ed-tour__link:hover { color: var(--accent); }
  .c-ed-tour__link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }
  .c-ed-tour__link--skip {
    color: var(--fg-muted);
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    text-decoration: none;
  }
  .c-ed-tour__link--skip:hover { color: var(--fg); text-decoration: underline; }
  .c-ed-tour__link--next {
    color: var(--accent);
    font-weight: 500;
  }
  .c-ed-tour__link--prev {
    color: var(--fg-muted);
  }

  @media (max-width: 900px) {
    .c-ed-tour {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      max-width: none;
      border-radius: 4px;
      z-index: 70;
    }
    .c-ed-tour::before { display: none; }
  }
</style>

<div class="c-ed-tour" role="dialog" aria-modal="false" aria-labelledby="c-ed-tour-title" aria-describedby="c-ed-tour-desc" tabindex="-1">
  <button class="c-ed-tour__close" type="button" aria-label="Close tour">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
      <path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1"/>
    </svg>
  </button>

  <span class="c-ed-tour__eyebrow">— A note from the editors</span>
  <h3 id="c-ed-tour-title" class="c-ed-tour__headline">Your <em>reading list</em> lives here.</h3>
  <p id="c-ed-tour-desc" class="c-ed-tour__body">Anything you save, highlight, or queue appears on the left — newest first, always. Drag essays between collections to organize them later.</p>

  <div class="c-ed-tour__foot">
    <span class="c-ed-tour__count">II of V</span>
    <div class="c-ed-tour__actions">
      <button class="c-ed-tour__link c-ed-tour__link--skip" type="button">Skip the tour</button>
      <button class="c-ed-tour__link c-ed-tour__link--prev" type="button">Prev</button>
      <button class="c-ed-tour__link c-ed-tour__link--next" type="button" autofocus>Next →</button>
    </div>
  </div>
</div>
