# Imagery Query Pack
#
# Curated Unsplash/Pexels search strings per aesthetic direction.
# Consumers (the skill at build time) should:
#   - Pick one query per use-case (random or first — first is more reproducible)
#   - Prefer specific over generic queries
#   - Fall back to asking the user if no category fits the artifact
#
# Each direction has:
#   photography.<use_case>: 3-6 search strings that actually return on-brand images
#   illustration: 2-4 style keywords for illustration search/generation
#   notes: one-line "avoid" guidance
#
# Use-cases are consistent across directions where possible, but some directions
# swap in direction-specific categories (e.g., brutalist has "street_raw" instead
# of "team_portrait").

technical-minimal:
  photography:
    hero:
      - "swiss modernist architecture grid minimal"
      - "architectural photography concrete geometry overcast"
      - "macro abstract industrial detail neutral background"
      - "clean studio still life monochrome"
      - "Apple product photography white seamless"
    product_context:
      - "laptop on concrete desk overhead neutral"
      - "close-up hardware macro studio light"
      - "minimal workspace matte surface"
      - "keyboard macro shallow depth neutral"
      - "circuit board macro abstract"
    team_portrait:
      - "editorial headshot neutral gray backdrop"
      - "portrait studio softbox muted"
      - "founder portrait minimal wall background"
      - "candid professional portrait natural window light"
    texture_abstract:
      - "paper texture seamless white"
      - "brushed aluminum surface macro"
      - "concrete wall grayscale"
      - "grid pattern architectural detail"
      - "fog minimalist landscape fine art"
  illustration:
    - "isometric line diagram monochrome"
    - "hairline geometric technical drawing"
    - "minimal vector schematic single-weight"
    - "wireframe axonometric illustration"
  ai_prompts:
    hero:
      - "brutalist concrete stairwell shot from below, single geometric form against overcast sky, Swiss modernist composition, matte neutral palette of bone white and graphite, shot on Hasselblad 80mm, diffuse overcast lighting, sharp focus edge-to-edge, architectural photography --ar 16:9 --no text, --no logos, --no lens flare"
      - "close-up of a matte anodized aluminum device on seamless white cyclorama, perfectly even softbox lighting, Apple-campaign aesthetic, cool neutral grays, shot on Phase One 100mm macro, hyper-sharp product photography --ar 4:3 --no reflections, --no props, --no gradients"
      - "minimalist still life of three identical matte cylinders on paper surface, top-down view, Dieter Rams industrial-design sensibility, cool gray and ivory palette, diffuse north-window light, medium format 80mm --ar 1:1 --no text, --no hands"
      - "empty modernist interior, single concrete column, polished floor reflecting flat overcast sky, Swiss grid composition, muted neutrals, 35mm architectural lens, tripod long exposure --ar 3:2 --no people, --no clutter"
    product_context:
      - "laptop and single notebook on matte concrete desk, overhead flat-lay, even overcast daylight, neutral gray palette, shot on 50mm at f/8, Stripe-documentation aesthetic --ar 4:3 --no warm tones, --no lifestyle props"
      - "macro detail of mechanical keyboard keys, single hard-edge shadow, studio softbox, desaturated near-neutral palette, Sigma 105mm macro --ar 16:9 --no color casts, --no logos"
      - "precision caliper measuring a metal component on white seamless, technical-catalog framing, cool LED lighting, Phase One 120mm macro --ar 3:2 --no hands visible, --no text"
    team_portrait:
      - "editorial headshot of a designer against seamless light gray backdrop, Rembrandt lighting softened, restrained expression, muted neutral wardrobe, medium format 80mm, shallow but not shallow DOF --ar 4:5 --no teeth smile, --no colored backdrop"
      - "environmental portrait of an engineer at a spotless concrete workbench, north-facing window light, neutral palette, Leica 50mm at f/4, considered pose --ar 4:5 --no golden hour, --no props"
      - "three-quarter portrait on matte paper backdrop, single large softbox, desaturated skin tones, 85mm portrait lens, editorial-magazine calm --ar 4:5 --no laughter, --no casual crossed arms pose"
    texture_abstract:
      - "seamless fine paper texture, raking overcast light, cool off-white, macro 100mm, fiber detail visible --ar 1:1 --no color tint, --no marks"
      - "brushed aluminum surface filling frame, even diffuse light, cool gray metallic, macro lens --ar 16:9 --no reflections of objects, --no logos"
      - "poured concrete wall, subtle aggregate visible, flat overcast illumination, neutral gray, 50mm at f/8 --ar 3:2 --no graffiti, --no text"
      - "dense fog over minimalist landscape, single horizon line, monochrome neutral, medium format long exposure --ar 16:9 --no figures, --no saturation"
  notes: "Avoid warm filters, people smiling at camera, golden hour, anything with a 'lifestyle vibe', cluttered backgrounds, lens flare."

