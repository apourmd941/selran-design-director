<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{DIRECTION}} — thumbnail</title>

  {{FONT_LINKS}}

  <style>
    :root {
      --bg:        {{color.bg_primary}};
      --bg-2:      {{color.bg_secondary}};
      --fg:        {{color.fg_primary}};
      --fg-2:      {{color.fg_secondary}};
      --fg-muted:  {{color.fg_muted}};
      --accent:    {{color.accent}};
      --border:    {{color.border}};
      --border-strong: {{color.border_strong}};

      --font-display: "{{type.display}}", Georgia, serif;
      --font-body:    "{{type.body}}", system-ui, sans-serif;
      --font-mono:    "{{type.mono}}", ui-monospace, monospace;

      --radius-md: {{spacing.radius.md}}px;
      --tracking-display: {{type.tracking.display}}em;
      --tracking-caps:    {{type.tracking.caps}}em;
      --leading-display:  {{type.leading.display}};
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 480px;
      height: 320px;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-feature-settings: "ss01";
      -webkit-font-smoothing: antialiased;
    }

    .tile {
      width: 100%;
      height: 100%;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    /* Top: mono/caps label — the "dateline" */
    .label {
      font-family: var(--font-mono, var(--font-body));
      font-size: 10px;
      font-weight: 500;
      letter-spacing: var(--tracking-caps);
      text-transform: uppercase;
      color: var(--fg-muted);
    }

    /* Middle: display heading — shows the type voice */
    .headline {
      font-family: var(--font-display);
      font-size: 44px;
      font-weight: 600;
      line-height: var(--leading-display);
      letter-spacing: var(--tracking-display);
      color: var(--fg);
      margin-top: 8px;
    }

    .body {
      font-size: 13px;
      line-height: 1.5;
      color: var(--fg-2);
      margin-top: 12px;
      max-width: 360px;
    }

    /* Bottom row: divider + CTA pill + swatch strip */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .cta {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      letter-spacing: 0;
    }

    .swatches {
      display: flex;
      gap: 6px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid var(--border-strong);
    }
    .swatch.bg2     { background: var(--bg-2); }
    .swatch.fg      { background: var(--fg); }
    .swatch.accent  { background: var(--accent); }
  </style>
</head>
<body>
  <div class="tile">
    <div>
      <div class="label">{{DIRECTION}} / v{{meta.version}}</div>
      <div class="headline">{{HEADLINE}}</div>
      <div class="body">{{SUBLINE}}</div>
    </div>

    <div class="bottom">
      <button class="cta">Start with this</button>
      <div class="swatches">
        <div class="swatch bg2"></div>
        <div class="swatch fg"></div>
        <div class="swatch accent"></div>
      </div>
    </div>
  </div>
</body>
</html>
