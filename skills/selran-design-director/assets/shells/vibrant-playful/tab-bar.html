<style>
  .c-vp-tabs {
    --ease: cubic-bezier(0.34, 1.1, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-family: inherit;
    width: fit-content;
    max-width: 100%;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .c-vp-tabs::-webkit-scrollbar { display: none; }

  .c-vp-tabs__tab {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    color: var(--fg-muted);
    background: transparent;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
    transition: color 220ms var(--ease),
                background-color 220ms var(--ease),
                transform 220ms var(--ease);
  }
  .c-vp-tabs__tab:hover {
    color: var(--fg);
    background: color-mix(in oklab, var(--cat, var(--accent)) 10%, transparent);
  }
  .c-vp-tabs__tab:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--cat, var(--accent));
  }
  .c-vp-tabs__tab[data-cat="1"] { --cat: var(--p1, var(--accent)); }
  .c-vp-tabs__tab[data-cat="2"] { --cat: var(--p2, var(--accent)); }
  .c-vp-tabs__tab[data-cat="3"] { --cat: var(--p3, var(--accent)); }
  .c-vp-tabs__tab[data-cat="4"] { --cat: var(--p4, var(--accent)); }
  .c-vp-tabs__tab[data-cat="5"] { --cat: var(--p5, var(--accent)); }

  .c-vp-tabs__tab[aria-selected="true"] {
    background: var(--bg);
    color: var(--cat, var(--accent));
    box-shadow: 0 2px 8px -2px rgba(0,0,0,0.12);
    font-weight: 500;
  }
  .c-vp-tabs__tab[aria-selected="true"]::after {
    content: "";
    position: absolute;
    left: 14px; right: 14px;
    bottom: 4px;
    height: 2px;
    border-radius: 2px;
    background: var(--cat, var(--accent));
  }

  .c-vp-tabs__count {
    font-size: 11px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 9999px;
    background: color-mix(in oklab, var(--cat, var(--accent)) 16%, var(--bg));
    color: var(--cat, var(--accent));
    font-variant-numeric: tabular-nums;
  }
  .c-vp-tabs__tab[aria-selected="false"] .c-vp-tabs__count {
    background: var(--bg-3, var(--bg));
    color: var(--fg-muted);
  }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-tabs__tab { transition: none; }
  }

  @media (max-width: 900px) {
    .c-vp-tabs { border-radius: 12px; }
    .c-vp-tabs__tab { padding: 7px 12px; font-size: 12px; }
  }
</style>

<nav class="c-vp-tabs" role="tablist" aria-label="Project views">
  <button class="c-vp-tabs__tab" role="tab" aria-selected="true" data-cat="1" type="button">
    Drafts
    <span class="c-vp-tabs__count">24</span>
  </button>
  <button class="c-vp-tabs__tab" role="tab" aria-selected="false" data-cat="2" type="button">
    Shared
    <span class="c-vp-tabs__count">8</span>
  </button>
  <button class="c-vp-tabs__tab" role="tab" aria-selected="false" data-cat="3" type="button">
    Templates
  </button>
  <button class="c-vp-tabs__tab" role="tab" aria-selected="false" data-cat="4" type="button">
    Archived
    <span class="c-vp-tabs__count">28</span>
  </button>
  <button class="c-vp-tabs__tab" role="tab" aria-selected="false" data-cat="5" type="button">
    Community
  </button>
</nav>
