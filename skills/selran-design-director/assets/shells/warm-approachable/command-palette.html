<style>
  .c-wa-cmd {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12vh 16px 16px;
    background: color-mix(in oklab, #2D1B0F 36%, transparent);
    backdrop-filter: blur(8px) saturate(1.1);
    -webkit-backdrop-filter: blur(8px) saturate(1.1);
    z-index: 60;
    font-family: inherit;
    box-sizing: border-box;
  }

  .c-wa-cmd__panel {
    width: 100%;
    max-width: 620px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 30px 80px rgba(61, 40, 23, 0.28),
                0 8px 24px rgba(61, 40, 23, 0.14);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 70vh;
  }

  .c-wa-cmd__search {
    position: relative;
    display: flex; align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .c-wa-cmd__icon {
    flex: 0 0 auto;
    color: var(--fg-muted);
    margin-right: 12px;
  }
  .c-wa-cmd__input {
    flex: 1 1 auto;
    font-size: 17px;
    font-family: inherit;
    color: var(--fg);
    background: transparent;
    border: 0;
    outline: 0;
    padding: 4px 0;
  }
  .c-wa-cmd__input::placeholder { color: var(--fg-muted); }
  .c-wa-cmd__esc {
    padding: 4px 10px;
    font-size: 12px;
    color: var(--fg-muted);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 9999px;
  }

  .c-wa-cmd__hint {
    padding: 14px 22px;
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 14px;
    color: var(--fg-muted);
    border-bottom: 1px solid var(--border);
  }

  .c-wa-cmd__body {
    overflow-y: auto;
    padding: 10px 12px 14px;
  }

  .c-wa-cmd__group {
    padding: 10px 0 4px;
  }
  .c-wa-cmd__group-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--fg-muted);
    padding: 6px 12px;
    margin: 0;
    letter-spacing: 0.02em;
  }

  .c-wa-cmd__list { list-style: none; margin: 0; padding: 0; display: grid; gap: 2px; }

  .c-wa-cmd__item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 14px;
    font-size: 14px;
    color: var(--fg);
    background: transparent;
    border: 0;
    cursor: pointer;
    width: 100%;
    text-align: left;
    text-decoration: none;
    font-family: inherit;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
  }
  .c-wa-cmd__item:hover,
  .c-wa-cmd__item[aria-selected="true"] {
    background: var(--bg-2);
  }
  .c-wa-cmd__item:focus-visible {
    outline: none;
    background: var(--bg-2);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-wa-cmd__item-icon {
    flex: 0 0 auto;
    width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border-radius: 50%;
    color: var(--accent);
  }
  .c-wa-cmd__item[aria-selected="true"] .c-wa-cmd__item-icon {
    background: var(--accent);
    color: var(--bg);
  }
  .c-wa-cmd__item-text { flex: 1 1 auto; min-width: 0; }
  .c-wa-cmd__item-title {
    font-weight: 500;
    color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .c-wa-cmd__item-sub {
    font-size: 12px;
    color: var(--fg-muted);
    margin-top: 1px;
  }
  .c-wa-cmd__item-kbd {
    flex: 0 0 auto;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--fg-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
  }

  .c-wa-cmd__foot {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-2);
    font-size: 12px;
    color: var(--fg-muted);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .c-wa-cmd__foot-key {
    font-variant-numeric: tabular-nums;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .c-wa-cmd__foot-key span {
    padding: 2px 7px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
  }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-cmd__item { transition: none; }
  }

  @media (max-width: 900px) {
    .c-wa-cmd { padding: 8vh 12px 12px; }
    .c-wa-cmd__panel { border-radius: 20px; max-height: 82vh; }
    .c-wa-cmd__esc { display: none; }
  }
</style>

<div class="c-wa-cmd" role="dialog" aria-modal="true" aria-labelledby="wa-cmd-title">
  <div class="c-wa-cmd__panel">
    <div class="c-wa-cmd__search">
      <svg class="c-wa-cmd__icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M12 12l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input class="c-wa-cmd__input" id="wa-cmd-title" type="search" placeholder="Where to, friend?" aria-label="Search commands" autofocus>
      <span class="c-wa-cmd__esc" aria-hidden="true">Esc</span>
    </div>

    <p class="c-wa-cmd__hint">Try searching for a journal entry, a donation, or a place to go.</p>

    <div class="c-wa-cmd__body" role="listbox">
      <div class="c-wa-cmd__group" role="group" aria-labelledby="wa-cmd-g-goto">
        <p class="c-wa-cmd__group-label" id="wa-cmd-g-goto">Go to</p>
        <ul class="c-wa-cmd__list">
          <li><button class="c-wa-cmd__item" role="option" aria-selected="true" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8l6-5 6 5v5.5a1 1 0 0 1-1 1h-2.5V11h-3v3.5H3a1 1 0 0 1-1-1V8z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">Today</span>
              <span class="c-wa-cmd__item-sub">Your mood, sleep, and habits at a glance</span>
            </span>
            <span class="c-wa-cmd__item-kbd" aria-hidden="true">G T</span>
          </button></li>
          <li><button class="c-wa-cmd__item" role="option" aria-selected="false" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M4 8h8M5 12h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">Habit journal</span>
              <span class="c-wa-cmd__item-sub">Four small habits, tracked this week</span>
            </span>
            <span class="c-wa-cmd__item-kbd" aria-hidden="true">G J</span>
          </button></li>
          <li><button class="c-wa-cmd__item" role="option" aria-selected="false" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 14s-6-3.5-6-8.5A3.5 3.5 0 0 1 8 4a3.5 3.5 0 0 1 6 1.5C14 10.5 8 14 8 14z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">Donations</span>
              <span class="c-wa-cmd__item-sub">Three causes, ongoing this year</span>
            </span>
          </button></li>
        </ul>
      </div>

      <div class="c-wa-cmd__group" role="group" aria-labelledby="wa-cmd-g-do">
        <p class="c-wa-cmd__group-label" id="wa-cmd-g-do">Do something</p>
        <ul class="c-wa-cmd__list">
          <li><button class="c-wa-cmd__item" role="option" aria-selected="false" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">Write a new journal entry</span>
              <span class="c-wa-cmd__item-sub">A soft prompt to start you off</span>
            </span>
            <span class="c-wa-cmd__item-kbd" aria-hidden="true">N</span>
          </button></li>
          <li><button class="c-wa-cmd__item" role="option" aria-selected="false" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M8 6v2l1.5 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">Check in on your mood</span>
              <span class="c-wa-cmd__item-sub">Takes about 30 seconds</span>
            </span>
          </button></li>
          <li><button class="c-wa-cmd__item" role="option" aria-selected="false" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2.5" y="4" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 7h11" stroke="currentColor" stroke-width="1.4"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">Log a donation</span>
              <span class="c-wa-cmd__item-sub">Round up, recurring, or one-off</span>
            </span>
          </button></li>
        </ul>
      </div>

      <div class="c-wa-cmd__group" role="group" aria-labelledby="wa-cmd-g-recent">
        <p class="c-wa-cmd__group-label" id="wa-cmd-g-recent">Recent</p>
        <ul class="c-wa-cmd__list">
          <li><button class="c-wa-cmd__item" role="option" aria-selected="false" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 13V4l4-2 2 1 4-2v9l-4 2-2-1-4 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">Sunday long walk — notes</span>
              <span class="c-wa-cmd__item-sub">Tuesday, 9:14 pm</span>
            </span>
          </button></li>
          <li><button class="c-wa-cmd__item" role="option" aria-selected="false" type="button">
            <span class="c-wa-cmd__item-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 12l4-5 3 3 5-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span class="c-wa-cmd__item-text">
              <span class="c-wa-cmd__item-title">April savings — gentle review</span>
              <span class="c-wa-cmd__item-sub">You put aside $312 this month</span>
            </span>
          </button></li>
        </ul>
      </div>
    </div>

    <div class="c-wa-cmd__foot">
      <span class="c-wa-cmd__foot-key"><span aria-hidden="true">↑</span><span aria-hidden="true">↓</span>&nbsp;to move</span>
      <span class="c-wa-cmd__foot-key"><span aria-hidden="true">↵</span>&nbsp;to open</span>
      <span class="c-wa-cmd__foot-key"><span aria-hidden="true">Esc</span>&nbsp;to close</span>
    </div>
  </div>
</div>
