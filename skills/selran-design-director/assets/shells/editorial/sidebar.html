<style>
  .c-ed-sidebar {
    width: 260px;
    min-height: 100vh;
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 40px 28px 32px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 36px;
    font-family: inherit;
    color: var(--fg);
  }
  .c-ed-sidebar[data-collapsed="true"] { width: 72px; padding: 40px 14px 32px; }
  .c-ed-sidebar[data-collapsed="true"] .c-ed-sidebar__wordmark,
  .c-ed-sidebar[data-collapsed="true"] .c-ed-sidebar__section-title,
  .c-ed-sidebar[data-collapsed="true"] .c-ed-sidebar__link-label,
  .c-ed-sidebar[data-collapsed="true"] .c-ed-sidebar__meta { display: none; }
  .c-ed-sidebar[data-collapsed="true"] .c-ed-sidebar__link { justify-content: center; padding: 10px 0; }

  .c-ed-sidebar__header {
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .c-ed-sidebar__wordmark {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--fg);
  }
  .c-ed-sidebar__wordmark em { font-style: italic; color: var(--accent); }
  .c-ed-sidebar__toggle {
    appearance: none;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 9999px;
    width: 26px; height: 26px;
    display: grid;
    place-items: center;
    cursor: pointer;
    color: var(--fg-muted);
    transition: color 250ms ease, border-color 250ms ease;
  }
  .c-ed-sidebar__toggle:hover { color: var(--fg); border-color: var(--fg); }
  .c-ed-sidebar__toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .c-ed-sidebar__section { display: flex; flex-direction: column; gap: 4px; }
  .c-ed-sidebar__section + .c-ed-sidebar__section {
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
  .c-ed-sidebar__section-title {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-size: 14px;
    font-style: italic;
    color: var(--fg-muted);
    margin: 0 0 12px;
    font-weight: 400;
  }
  .c-ed-sidebar__nav { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  .c-ed-sidebar__link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 3px;
    color: var(--fg);
    text-decoration: none;
    font-size: 15px;
    line-height: 1.5;
    transition: background-color 250ms ease, color 250ms ease;
  }
  .c-ed-sidebar__link:hover { background: var(--bg-2); }
  .c-ed-sidebar__link[aria-current="page"] {
    color: var(--accent);
    font-style: italic;
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
  }
  .c-ed-sidebar__link[aria-current="page"] .c-ed-sidebar__glyph { color: var(--accent); }
  .c-ed-sidebar__link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .c-ed-sidebar__glyph {
    width: 14px; height: 14px;
    color: var(--fg-muted);
    flex: none;
  }
  .c-ed-sidebar__link-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--fg-muted);
  }

  .c-ed-sidebar__footer {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .c-ed-sidebar__meta {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-muted);
    display: block;
    margin-bottom: 6px;
  }
  .c-ed-sidebar__meta-value {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 14px;
    color: var(--fg);
  }

  @media (max-width: 900px) {
    .c-ed-sidebar { width: 100%; min-height: 0; border-right: 0; border-bottom: 1px solid var(--border); padding: 24px; }
  }
</style>

  <div class="c-ed-sidebar__footer">

</aside>
