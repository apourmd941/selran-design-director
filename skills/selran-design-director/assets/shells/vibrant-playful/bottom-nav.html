<style>

  .c-vp-bnav__link:focus-visible {

  .c-vp-bnav__link[data-cat="1"] { --cat: var(--p1, var(--accent)); }

    color: var(--cat, var(--accent));

  .c-vp-bnav__link[aria-current="page"] .c-vp-bnav__icon-wrap {

                transform 280ms var(--ease);
  }
  .c-vp-bnav__icon-wrap svg { width: 18px; height: 18px; }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-bnav__link, .c-vp-bnav__icon-wrap { transition: none; }
    .c-vp-bnav__link[aria-current="page"] .c-vp-bnav__icon-wrap { transform: none; }
  }

  @media (max-width: 768px) {
    .c-vp-bnav { display: block; }
  }
</style>
