<style>
  .c-vp-cmd {
    --ease: cubic-bezier(0.34, 1.56, 0.64, 1);
    position: fixed;
    inset: 0;
    z-index: 60;
    display: grid;
    place-items: start center;
    padding-top: 14vh;
    background: color-mix(in oklab, var(--fg) 28%, transparent);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    font-family: inherit;
  }
  .c-vp-cmd__panel {
    width: min(640px, calc(100vw - 32px));
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.28);
    overflow: hidden;
    animation: c-vp-cmd-in 300ms var(--ease);
  }
  @keyframes c-vp-cmd-in {
    from { opacity: 0; transform: translateY(-8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .c-vp-cmd__search {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .c-vp-cmd__search svg { width: 18px; height: 18px; color: var(--fg-muted); flex: 0 0 auto; }
  .c-vp-cmd__input {
    flex: 1 1 auto;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    color: var(--fg);
    background: transparent;
    border: none;
    outline: none;
  }
  .c-vp-cmd__input::placeholder { color: var(--fg-muted); }
  .c-vp-cmd__esc {
    font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
    font-size: 11px;
    color: var(--fg-muted);
    padding: 3px 8px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .c-vp-cmd__body {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 10px 10px 12px;
  }
  .c-vp-cmd__group { margin-bottom: 10px; }
  .c-vp-cmd__group:last-child { margin-bottom: 0; }
  .c-vp-cmd__group[data-cat="1"] { --cat: var(--p1, var(--accent)); }
  .c-vp-cmd__group[data-cat="2"] { --cat: var(--p2, var(--accent)); }
  .c-vp-cmd__group[data-cat="3"] { --cat: var(--p3, var(--accent)); }

  .c-vp-cmd__group-label {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cat, var(--fg-muted));
    padding: 8px 12px 6px;
    font-weight: 500;
    margin: 0;
  }
  .c-vp-cmd__group-label::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 9999px;
    background: var(--cat, var(--accent));
  }

  .c-vp-cmd__list { list-style: none; margin: 0; padding: 0; }
  .c-vp-cmd__item {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    color: var(--fg);
    background: transparent;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    transition: background-color 180ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-cmd__item:hover,
  .c-vp-cmd__item[aria-selected="true"] {
    background: color-mix(in oklab, var(--cat, var(--accent)) 12%, var(--bg));
    color: var(--fg);
  }
  .c-vp-cmd__item:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--cat, var(--accent));
  }

  .c-vp-cmd__icon {
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 10px;
    background: color-mix(in oklab, var(--cat, var(--accent)) 16%, var(--bg));
    color: var(--cat, var(--accent));
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .c-vp-cmd__icon svg { width: 15px; height: 15px; }

  .c-vp-cmd__meta {
    display: flex;
    flex-direction: column;
    min-width: 0;
    flex: 1 1 auto;
  }
  .c-vp-cmd__title { line-height: 1.25; }
  .c-vp-cmd__hint { font-size: 12px; color: var(--fg-muted); font-weight: 400; }

  .c-vp-cmd__kbd {
    margin-left: auto;
    font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
    font-size: 11px;
    color: var(--fg-muted);
    padding: 2px 7px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .c-vp-cmd__foot {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-2);
    font-size: 12px;
    color: var(--fg-muted);
  }
  .c-vp-cmd__foot-hint { font-weight: 500; }
  .c-vp-cmd__foot-keys { display: inline-flex; gap: 10px; }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-cmd__panel { animation: none; }
    .c-vp-cmd__item { transition: none; }
  }

  @media (max-width: 900px) {
    .c-vp-cmd { padding-top: 8vh; }
    .c-vp-cmd__panel { border-radius: 16px; }
    .c-vp-cmd__foot { display: none; }
  }
</style>
