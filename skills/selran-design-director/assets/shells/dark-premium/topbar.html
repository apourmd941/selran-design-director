<style>
  .c-dp-topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    height: 64px;
    padding: 0 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
    box-sizing: border-box;
    position: relative;
  }
  .c-dp-topbar__workspace {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 6px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg-2);
    cursor: pointer;
    font-family: inherit;
    color: var(--fg);
    font-size: 13px;
    transition: border-color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                background-color 220ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-topbar__workspace:hover { border-color: var(--accent); }
  .c-dp-topbar__workspace:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .c-dp-topbar__ws-mark {
    width: 22px; height: 22px; border-radius: 6px;
    background: linear-gradient(135deg,
      var(--accent) 0%,
      color-mix(in oklab, var(--accent) 60%, var(--bg)) 100%);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 600;
    color: var(--bg);
    box-shadow: 0 0 10px -2px color-mix(in oklab, var(--accent) 60%, transparent);
  }
  .c-dp-topbar__ws-name { font-weight: 500; letter-spacing: -0.005em; }
  .c-dp-topbar__ws-chev { color: var(--fg-muted); }

  .c-dp-topbar__search {
    flex: 1 1 auto;
    max-width: 560px;
    position: relative;
  }
  .c-dp-topbar__search-input {
    width: 100%;
    box-sizing: border-box;
    padding: 9px 14px 9px 38px;
    font-size: 13px;
    font-family: inherit;
    color: var(--fg);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                box-shadow 220ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-topbar__search-input::placeholder { color: var(--fg-muted); }
  .c-dp-topbar__search-input:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent),
                0 0 22px -4px color-mix(in oklab, var(--accent) 50%, transparent);
  }
  .c-dp-topbar__search-icon {
    position: absolute;
    left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--fg-muted);
    pointer-events: none;
  }
  .c-dp-topbar__kbd {
    position: absolute;
    right: 10px; top: 50%; transform: translateY(-50%);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    color: var(--fg-muted);
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    letter-spacing: 0.08em;
  }

  .c-dp-topbar__tools {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .c-dp-topbar__icon-btn {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg-muted);
    cursor: pointer;
    transition: background-color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                border-color 220ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-topbar__icon-btn:hover { background: var(--bg-2); color: var(--fg); border-color: var(--border); }
  .c-dp-topbar__icon-btn:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .c-dp-topbar__dot {
    position: absolute;
    top: 8px; right: 9px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px color-mix(in oklab, var(--accent) 80%, transparent);
  }

  .c-dp-topbar__avatar {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 4px 12px 4px 4px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg-2);
    cursor: pointer;
    font-family: inherit;
    color: var(--fg);
    font-size: 13px;
    transition: border-color 220ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-topbar__avatar:hover { border-color: var(--accent); }
  .c-dp-topbar__avatar:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .c-dp-topbar__avatar-img {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg,
      color-mix(in oklab, var(--accent) 70%, var(--bg)) 0%,
      var(--bg-3) 100%);
    color: var(--fg);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; font-weight: 600;
  }
  .c-dp-topbar__avatar-name { letter-spacing: -0.005em; }

  @media (max-width: 900px) {
    .c-dp-topbar { height: 56px; padding: 0 14px; gap: 10px; }
    .c-dp-topbar__ws-name,
    .c-dp-topbar__avatar-name,
    .c-dp-topbar__kbd { display: none; }
    .c-dp-topbar__search { max-width: none; }
    .c-dp-topbar__workspace { padding: 4px; }
    .c-dp-topbar__avatar { padding: 2px; }
  }
</style>

<header class="c-dp-topbar" role="banner">
  <button class="c-dp-topbar__workspace" type="button" aria-haspopup="menu">
    <span class="c-dp-topbar__ws-mark" aria-hidden="true">M</span>
    <span class="c-dp-topbar__ws-name">Meridian Capital</span>
    <svg class="c-dp-topbar__ws-chev" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="c-dp-topbar__search" role="search">
    <svg class="c-dp-topbar__search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    <input class="c-dp-topbar__search-input" type="search" placeholder="Search vaults, transactions, reports..." aria-label="Search">
    <span class="c-dp-topbar__kbd" aria-hidden="true">&#8984;K</span>
  </div>

  <div class="c-dp-topbar__tools">
    <button class="c-dp-topbar__icon-btn" type="button" aria-label="Notifications (3 unread)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 11V7.5a4 4 0 018 0V11l1 1.5H3L4 11z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M6.5 14a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.3"/></svg>
      <span class="c-dp-topbar__dot" aria-hidden="true"></span>
    </button>
    <button class="c-dp-topbar__icon-btn" type="button" aria-label="Help">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 11.5v-.5M6.5 6.5a1.5 1.5 0 112.5 1.3c-.5.3-1 .7-1 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button>
  </div>

  <button class="c-dp-topbar__avatar" type="button" aria-haspopup="menu" aria-label="Account menu">
    <span class="c-dp-topbar__avatar-img" aria-hidden="true">AP</span>
    <span class="c-dp-topbar__avatar-name">A. Pourmohammadi</span>
  </button>
</header>
