<style>
  .c-vp-topbar {
    --ease: cubic-bezier(0.34, 1.1, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 16px;
    height: 68px;
    padding: 0 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
    box-sizing: border-box;
  }

  .c-vp-topbar__workspace {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 10px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    cursor: pointer;
    font-family: inherit;
    transition: background-color 220ms var(--ease),
                transform 220ms var(--ease);
  }
  .c-vp-topbar__workspace:hover { background: var(--bg-3); transform: translateY(-1px); }
  .c-vp-topbar__workspace:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-vp-topbar__ws-dot {
    width: 22px; height: 22px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--p1, var(--accent)) 0%, var(--p4, var(--accent)) 100%);
    flex: 0 0 auto;
    box-shadow: 0 4px 10px -4px color-mix(in oklab, var(--p1, var(--accent)) 50%, transparent);
  }
  .c-vp-topbar__ws-name { line-height: 1.2; }
  .c-vp-topbar__ws-caret { width: 12px; height: 12px; color: var(--fg-muted); }

  .c-vp-topbar__search {
    flex: 1 1 auto;
    max-width: 520px;
    position: relative;
  }
  .c-vp-topbar__search-input {
    width: 100%;
    height: 40px;
    padding: 0 16px 0 40px;
    font-size: 14px;
    font-family: inherit;
    color: var(--fg);
    background: var(--bg-2);
    border: 1px solid transparent;
    border-radius: 12px;
    box-sizing: border-box;
    outline: none;
    transition: border-color 220ms var(--ease),
                box-shadow 220ms var(--ease),
                background-color 220ms var(--ease);
  }
  .c-vp-topbar__search-input:focus-visible {
    background: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 20%, transparent);
  }
  .c-vp-topbar__search-input::placeholder { color: var(--fg-muted); }
  .c-vp-topbar__search-icon {
    position: absolute;
    top: 50%; left: 14px;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--fg-muted);
    pointer-events: none;
  }
  .c-vp-topbar__search-kbd {
    position: absolute;
    top: 50%; right: 10px;
    transform: translateY(-50%);
    display: inline-flex; align-items: center; gap: 2px;
    font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
    font-size: 11px;
    color: var(--fg-muted);
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .c-vp-topbar__actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .c-vp-topbar__btn {
    position: relative;
    width: 40px; height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 12px;
    color: var(--fg-muted);
    cursor: pointer;
    transition: background-color 220ms var(--ease),
                color 220ms var(--ease),
                transform 220ms var(--ease);
  }
  .c-vp-topbar__btn:hover { background: var(--bg-2); color: var(--fg); transform: translateY(-1px); }
  .c-vp-topbar__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-vp-topbar__btn svg { width: 18px; height: 18px; }
  .c-vp-topbar__btn-dot {
    position: absolute;
    top: 8px; right: 8px;
    width: 8px; height: 8px;
    border-radius: 9999px;
    background: var(--p1, var(--accent));
    box-shadow: 0 0 0 2px var(--bg);
  }

  .c-vp-topbar__new {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 14px;
    height: 40px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 220ms var(--ease),
                box-shadow 220ms var(--ease);
  }
  .c-vp-topbar__new:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 24px color-mix(in oklab, var(--accent) 40%, transparent);
  }
  .c-vp-topbar__new:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-vp-topbar__new svg { width: 14px; height: 14px; }

  .c-vp-topbar__me {
    width: 36px; height: 36px;
    border-radius: 9999px;
    background: linear-gradient(135deg, var(--p3, var(--accent)), var(--p4, var(--accent)));
    color: var(--bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border);
    transition: transform 220ms var(--ease);
  }
  .c-vp-topbar__me:hover { transform: scale(1.05); }

  @media (prefers-reduced-motion: reduce) {
    .c-vp-topbar__workspace, .c-vp-topbar__btn, .c-vp-topbar__new, .c-vp-topbar__me, .c-vp-topbar__search-input {
      transition: none;
    }
  }

  @media (max-width: 900px) {
    .c-vp-topbar { height: 60px; padding: 0 16px; gap: 10px; }
    .c-vp-topbar__ws-name { display: none; }
    .c-vp-topbar__ws-caret { display: none; }
    .c-vp-topbar__workspace { padding: 6px; }
    .c-vp-topbar__search-kbd { display: none; }
    .c-vp-topbar__new-label { display: none; }
    .c-vp-topbar__new { width: 40px; padding: 0; }
  }
</style>

<header class="c-vp-topbar" role="banner">
  <button class="c-vp-topbar__workspace" type="button" aria-haspopup="listbox" aria-expanded="false">
    <span class="c-vp-topbar__ws-dot" aria-hidden="true"></span>
    <span class="c-vp-topbar__ws-name">Third Draft Studio</span>
    <svg class="c-vp-topbar__ws-caret" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="c-vp-topbar__search" role="search">
    <svg class="c-vp-topbar__search-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input class="c-vp-topbar__search-input" type="search" placeholder="Search canvases, templates, people&hellip;" aria-label="Search">
    <kbd class="c-vp-topbar__search-kbd">&#8984;K</kbd>
  </div>

  <div class="c-vp-topbar__actions">
    <button class="c-vp-topbar__btn" type="button" aria-label="Inbox">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M3 4.5v7A1.5 1.5 0 0 0 4.5 13h9a1.5 1.5 0 0 0 1.5-1.5v-7m-12 0h12m-12 0L9 9.5l6-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="c-vp-topbar__btn" type="button" aria-label="3 new notifications">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M4 8a5 5 0 0 1 10 0v2l1.5 2.5h-13L4 10V8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 13.5a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="c-vp-topbar__btn-dot" aria-hidden="true"></span>
    </button>
    <button class="c-vp-topbar__new" type="button">
      <svg viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="c-vp-topbar__new-label">New canvas</span>
    </button>
    <button class="c-vp-topbar__me" type="button" aria-label="Account menu">JO</button>
  </div>
</header>
