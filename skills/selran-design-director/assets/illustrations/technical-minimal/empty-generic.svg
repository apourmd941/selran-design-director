<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: technical-minimal
  use: empty state (no data yet)
  variables: var(fg), var(accent)
  notes: single elegant line-drawing of an empty container; accent dashed line suggests "data will appear here"
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Empty container">
  <style>
    .tm-stroke { stroke: var(--fg, currentColor); fill: none; stroke-width: 1.25; vector-effect: non-scaling-stroke; }
    .tm-thin   { stroke: var(--fg, currentColor); fill: none; stroke-width: 1; opacity: .3; vector-effect: non-scaling-stroke; }
    .tm-accent-dash { stroke: var(--accent, #0A7A5C); fill: none; stroke-width: 1.25; stroke-dasharray: 4 4; vector-effect: non-scaling-stroke; }
    .tm-accent { fill: var(--accent, #0A7A5C); opacity: .2; }
    .tm-label  { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; fill: var(--fg, currentColor); opacity: .55; letter-spacing: .08em; text-anchor: middle; }
  </style>

  <!-- faint grid reference -->
  <g class="tm-thin">
    <line x1="200" y1="60" x2="200" y2="340"/>
    <line x1="60" y1="200" x2="340" y2="200"/>
  </g>

  <!-- isometric empty tray -->
  <g transform="translate(200 210)">
    <!-- outer frame -->
    <path class="tm-stroke" d="M-120 0 L0 -70 L120 0 L0 70 Z"/>
    <!-- inner rim -->
    <path class="tm-stroke" d="M-90 0 L0 -52 L90 0 L0 52 Z"/>
    <!-- vertical rise (thickness) -->
    <line class="tm-stroke" x1="-120" y1="0"  x2="-120" y2="24"/>
    <line class="tm-stroke" x1="120"  y1="0"  x2="120"  y2="24"/>
    <line class="tm-stroke" x1="0"    y1="70" x2="0"    y2="94"/>
    <path class="tm-stroke" d="M-120 24 L0 94 L120 24"/>
  </g>

  <!-- dashed accent insert cue -->
  <g transform="translate(200 158)">
    <path class="tm-accent-dash" d="M-40 0 L0 -22 L40 0 L0 22 Z"/>
    <circle cx="0" cy="0" r="2" class="tm-accent"/>
  </g>

  <text x="200" y="360" class="tm-label">NO DATA · AWAITING INPUT</text>
</svg>
