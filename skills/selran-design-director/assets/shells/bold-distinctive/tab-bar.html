<style>
  .c-bd-tabs {
    width: 100%;
    box-sizing: border-box;
    border-bottom: 2px solid var(--fg);
    background: var(--bg);
    font-family: inherit;
    color: var(--fg);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .c-bd-tabs::-webkit-scrollbar { display: none; }

  .c-bd-tabs__list {
    list-style: none;
    margin: 0;
    padding: 0 40px;
    display: flex;
    gap: 8px;
    min-width: max-content;
  }

  .c-bd-tabs__tab {
    appearance: none;
    background: transparent;
    border: 0;
    padding: 22px 20px 20px;
    font-family: inherit;
    font-size: 16px;
    color: var(--fg-muted);
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
    position: relative;
    transition: color 220ms ease;
  }
  .c-bd-tabs__tab:hover { color: var(--fg); }
  .c-bd-tabs__tab:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -4px;
  }

  .c-bd-tabs__num {
    font-family: var(--ff-display, 'PP Editorial New', 'Fraunces', Georgia, serif);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    color: inherit;
    opacity: 0.7;
    letter-spacing: -0.01em;
  }
  .c-bd-tabs__label {
    font-family: var(--ff-display, 'PP Editorial New', 'Fraunces', Georgia, serif);
    font-size: 18px;
    font-style: italic;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .c-bd-tabs__count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-muted);
    padding: 2px 6px;
    border: 1px solid currentColor;
  }

  .c-bd-tabs__tab[aria-current="page"],
  .c-bd-tabs__tab[aria-selected="true"] {
    color: var(--fg);
  }
  .c-bd-tabs__tab[aria-current="page"] .c-bd-tabs__num,
  .c-bd-tabs__tab[aria-selected="true"] .c-bd-tabs__num {
    color: var(--accent);
    opacity: 1;
  }
  .c-bd-tabs__tab[aria-current="page"]::after,
  .c-bd-tabs__tab[aria-selected="true"]::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    bottom: -2px;
    height: 8px;
    background: var(--accent);
  }

  @media (max-width: 900px) {
    .c-bd-tabs__list { padding: 0 20px; gap: 4px; }
    .c-bd-tabs__tab { padding: 18px 12px 16px; font-size: 14px; }
    .c-bd-tabs__label { font-size: 16px; }
    .c-bd-tabs__count { display: none; }
  }
</style>

<nav class="c-bd-tabs" aria-label="Section views">
  <ul class="c-bd-tabs__list" role="tablist">
    <li role="presentation">
      <a class="c-bd-tabs__tab" href="#overview" role="tab" aria-current="page" aria-selected="true">
        <span class="c-bd-tabs__num">01</span>
        <span class="c-bd-tabs__label">Overview</span>
      </a>
    </li>
    <li role="presentation">
      <a class="c-bd-tabs__tab" href="#essays" role="tab" aria-selected="false">
        <span class="c-bd-tabs__num">02</span>
        <span class="c-bd-tabs__label">Essays</span>
        <span class="c-bd-tabs__count">32</span>
      </a>
    </li>
    <li role="presentation">
      <a class="c-bd-tabs__tab" href="#contributors" role="tab" aria-selected="false">
        <span class="c-bd-tabs__num">03</span>
        <span class="c-bd-tabs__label">Contributors</span>
        <span class="c-bd-tabs__count">18</span>
      </a>
    </li>
    <li role="presentation">
      <a class="c-bd-tabs__tab" href="#annotations" role="tab" aria-selected="false">
        <span class="c-bd-tabs__num">04</span>
        <span class="c-bd-tabs__label">Annotations</span>
      </a>
    </li>
    <li role="presentation">
      <a class="c-bd-tabs__tab" href="#settings" role="tab" aria-selected="false">
        <span class="c-bd-tabs__num">05</span>
        <span class="c-bd-tabs__label">Settings</span>
      </a>
    </li>
  </ul>
</nav>
