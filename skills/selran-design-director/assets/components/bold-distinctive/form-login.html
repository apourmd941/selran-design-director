<style>
  .c-bd-login {
    max-width: 440px;
    margin: 0 auto;
    padding: 44px 36px;
    background: var(--bg);
    border: 2px solid var(--fg);
    font-family: inherit;
    position: relative;
  }
  .c-bd-login__meta {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 14px;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--fg);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-secondary, var(--fg));
  }
  .c-bd-login__headline {
    font-family: var(--ff-display, 'PP Editorial New', 'Fraunces', Georgia, serif);
    font-size: 48px;
    line-height: 0.95;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--fg);
    margin: 0 0 10px;
  }
  .c-bd-login__headline em {
    font-style: italic;
    color: var(--accent);
  }
  .c-bd-login__sub {
    font-size: 14px; line-height: 1.5;
    color: var(--fg-secondary, var(--fg));
    margin: 0 0 28px;
    max-width: 32ch;
  }
  .c-bd-login__field { margin-bottom: 18px; }
  .c-bd-login__label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-secondary, var(--fg));
    margin-bottom: 8px;
  }
  .c-bd-login__row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .c-bd-login__forgot {
    font-family: var(--ff-display, 'PP Editorial New', Georgia, serif);
    font-style: italic;
    font-size: 14px;
    color: var(--accent);
    text-decoration: none;
  }
  .c-bd-login__forgot:hover { text-decoration: underline; text-underline-offset: 3px; }
  .c-bd-login__input {
    width: 100%; box-sizing: border-box;
    padding: 13px 14px;
    font-size: 18px;
    font-family: inherit;
    color: var(--fg);
    background: var(--bg);
    border: 2px solid var(--fg);
    border-radius: 0;
    outline: none;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-bd-login__input::placeholder { color: var(--fg-muted, var(--fg-secondary, var(--fg))); }
  .c-bd-login__input:focus-visible {
    background: var(--bg-2);
    box-shadow: 6px 6px 0 var(--accent);
  }
  .c-bd-login__btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 100%; box-sizing: border-box;
    padding: 18px 24px;
    margin-top: 10px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    background: var(--fg);
    color: var(--bg);
    border: 2px solid var(--fg);
    cursor: pointer;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-bd-login__btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .c-bd-login__btn:focus-visible {
    outline: none;
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    box-shadow: 6px 6px 0 var(--fg);
  }
  .c-bd-login__divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 16px;
    font-family: var(--ff-display, 'PP Editorial New', Georgia, serif);
    font-style: italic;
    font-size: 14px;
    color: var(--fg-secondary, var(--fg));
  }
  .c-bd-login__divider::before,
  .c-bd-login__divider::after { content: ''; flex: 1; height: 2px; background: var(--fg); }
  .c-bd-login__oauth { display: flex; flex-direction: column; gap: 10px; }
  .c-bd-login__oauth-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg);
    background: var(--bg);
    border: 2px solid var(--fg);
    text-decoration: none;
    cursor: pointer;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-bd-login__oauth-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .c-bd-login__oauth-btn:focus-visible {
    outline: none;
    box-shadow: 4px 4px 0 var(--accent);
  }
  .c-bd-login__oauth-btn svg { width: 14px; height: 14px; }
  .c-bd-login__foot {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 2px solid var(--fg);
    font-size: 14px;
    color: var(--fg-secondary, var(--fg));
    text-align: center;
    font-family: var(--ff-display, 'PP Editorial New', Georgia, serif);
    font-style: italic;
  }
  .c-bd-login__foot a {
    color: var(--accent);
    text-decoration: none;
    font-style: italic;
  }
  .c-bd-login__foot a:hover { text-decoration: underline; text-underline-offset: 3px; }

  @media (max-width: 900px) {
    .c-bd-login { max-width: none; padding: 36px 24px; border-left: 0; border-right: 0; }
    .c-bd-login__headline { font-size: 40px; }
  }
</style>

<form class="c-bd-login" novalidate>
  <div class="c-bd-login__meta">
    <span>Issue No. 07</span>
    <span>Members Entrance</span>
  </div>

  <h1 class="c-bd-login__headline">Welcome <em>back.</em></h1>
  <p class="c-bd-login__sub">Your reading list, your pull-quotes, your unfinished essays — waiting.</p>

  <div class="c-bd-login__field">
    <label class="c-bd-login__label" for="bd-email">Email</label>
    <input class="c-bd-login__input" id="bd-email" name="email" type="email" autocomplete="email" placeholder="reader@inbox.com" required>
  </div>

  <div class="c-bd-login__field">
    <div class="c-bd-login__row">
      <label class="c-bd-login__label" for="bd-password">Password</label>
      <a class="c-bd-login__forgot" href="#forgot">Forgotten?</a>
    </div>
    <input class="c-bd-login__input" id="bd-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
  </div>

  <button class="c-bd-login__btn" type="submit">Sign in</button>

  <div class="c-bd-login__divider">or continue with</div>

  <div class="c-bd-login__oauth">
    <a class="c-bd-login__oauth-btn" href="#google">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21.35 11.1H12v3.8h5.35c-.23 1.23-1.44 3.6-5.35 3.6-3.22 0-5.85-2.67-5.85-5.95S8.78 6.6 12 6.6c1.83 0 3.06.78 3.77 1.45l2.57-2.48C16.7 4.1 14.55 3.2 12 3.2 7.06 3.2 3 7.25 3 12.2s4.06 9 9 9c5.2 0 8.65-3.65 8.65-8.8 0-.6-.06-1.05-.15-1.5z"/></svg>
      Google
    </a>
    <a class="c-bd-login__oauth-btn" href="#github">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48l-.01-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85 0 1.7.11 2.5.33 1.9-1.29 2.74-1.02 2.74-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.33 4.69-4.56 4.94.36.31.68.91.68 1.85l-.01 2.74c0 .27.18.58.69.48A10 10 0 0 0 12 2z"/></svg>
      GitHub
    </a>
  </div>

  <p class="c-bd-login__foot">First time here? <a href="#subscribe">Subscribe to {Bra<em>nd</em>}</a></p>
</form>
