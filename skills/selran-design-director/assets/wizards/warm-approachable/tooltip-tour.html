<style>
  .c-wa-tour {
    position: relative;
    display: inline-block;
    max-width: 340px;
    padding: 20px 22px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 18px 48px rgba(61, 40, 23, 0.22),
                0 4px 12px rgba(61, 40, 23, 0.08);
    font-family: inherit;
    color: var(--fg);
    z-index: 70;
    box-sizing: border-box;
  }

  .c-wa-tour::before {
    content: "";
    position: absolute;
    top: -8px;
    left: 32px;
    width: 14px; height: 14px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
    border-radius: 2px 0 0 0;
    transform: rotate(45deg);
  }
  .c-wa-tour[data-placement="bottom"]::before {
    top: auto; bottom: -8px;
    left: 32px;
    transform: rotate(225deg);
  }
  .c-wa-tour[data-placement="right"]::before {
    top: 28px; left: -8px;
    transform: rotate(-45deg);
  }
  .c-wa-tour[data-placement="left"]::before {
    top: 28px; left: auto; right: -8px;
    transform: rotate(135deg);
  }

  .c-wa-tour__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .c-wa-tour__count {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    margin: 0;
  }
  .c-wa-tour__close {
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center; justify-content: center;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--fg-muted);
    border-radius: 9999px;
    cursor: pointer;
    transition: color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                background-color 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-tour__close:hover {
    color: var(--fg);
    background: var(--bg-3);
  }
  .c-wa-tour__close:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  .c-wa-tour__title {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--fg);
    margin: 0 0 6px;
  }
  .c-wa-tour__body {
    font-size: 14px;
    line-height: 1.55;
    color: var(--fg-muted);
    margin: 0 0 16px;
  }
  .c-wa-tour__body em {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    color: var(--fg);
  }

  .c-wa-tour__progress {
    display: flex;
    gap: 5px;
    margin-bottom: 14px;
  }
  .c-wa-tour__progress-dot {
    width: 18px; height: 4px;
    border-radius: 9999px;
    background: var(--bg-3);
  }
  .c-wa-tour__progress-dot[data-state="done"] { background: var(--accent); opacity: 0.7; }
  .c-wa-tour__progress-dot[data-state="active"] { background: var(--accent); }

  .c-wa-tour__foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .c-wa-tour__skip {
    font-family: inherit;
    font-size: 13px;
    color: var(--fg-muted);
    background: transparent;
    border: 0;
    padding: 6px 12px;
    border-radius: 9999px;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    text-decoration-color: var(--border);
    transition: color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                text-decoration-color 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-tour__skip:hover { color: var(--fg); text-decoration-color: var(--fg-muted); }
  .c-wa-tour__skip:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  .c-wa-tour__nav {
    display: inline-flex;
    gap: 6px;
  }
  .c-wa-tour__btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    border: 1px solid transparent;
    border-radius: 9999px;
    cursor: pointer;
    transition: transform 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-tour__btn--ghost {
    background: var(--bg-2);
    color: var(--fg);
    border-color: var(--border);
  }
  .c-wa-tour__btn--ghost:hover {
    box-shadow: 0 4px 10px rgba(61, 40, 23, 0.08);
  }
  .c-wa-tour__btn--primary {
    background: var(--accent);
    color: var(--bg);
  }
  .c-wa-tour__btn--primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(61, 40, 23, 0.18);
  }
  .c-wa-tour__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-tour__btn,
    .c-wa-tour__skip,
    .c-wa-tour__close { transition: none; }
    .c-wa-tour__btn:hover { transform: none; }
  }

  @media (max-width: 900px) {
    .c-wa-tour { max-width: calc(100vw - 32px); padding: 18px 18px 14px; border-radius: 16px; }
    .c-wa-tour__title { font-size: 17px; }
  }
</style>

<div class="c-wa-tour"
     role="dialog"
     aria-modal="false"
     aria-labelledby="wa-tour-title"
     aria-describedby="wa-tour-body"
     data-placement="top">
  <div class="c-wa-tour__head">
    <p class="c-wa-tour__count">Tip 2 of 5</p>
    <button class="c-wa-tour__close" type="button" aria-label="Close this tip">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
  </div>

  <h3 class="c-wa-tour__title" id="wa-tour-title">This is where you'll check in.</h3>
  <p class="c-wa-tour__body" id="wa-tour-body">A soft prompt each morning — <em>one word for your mood, one word for the weather inside.</em> It takes thirty seconds and builds a gentle picture over time.</p>

  <div class="c-wa-tour__progress" aria-hidden="true">
    <span class="c-wa-tour__progress-dot" data-state="done"></span>
    <span class="c-wa-tour__progress-dot" data-state="active"></span>
    <span class="c-wa-tour__progress-dot"></span>
    <span class="c-wa-tour__progress-dot"></span>
    <span class="c-wa-tour__progress-dot"></span>
  </div>

  <div class="c-wa-tour__foot">
    <button class="c-wa-tour__skip" type="button">Skip the tour</button>
    <div class="c-wa-tour__nav">
      <button class="c-wa-tour__btn c-wa-tour__btn--ghost" type="button" aria-label="Previous tip">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M7.5 3L4 6l3.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Prev</span>
      </button>
      <button class="c-wa-tour__btn c-wa-tour__btn--primary" type="button" aria-label="Next tip">
        <span>Next</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M4.5 3L8 6l-3.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
</div>
