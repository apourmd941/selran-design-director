<style>
  .c-vp-404 {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    position: relative;
    overflow: hidden;
  }
  .c-vp-404::before,
  .c-vp-404::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.4;
    pointer-events: none;
  }
  .c-vp-404::before {
    width: 360px; height: 360px;
    background: var(--p2, var(--accent));
    top: -120px; right: -80px;
  }
  .c-vp-404::after {
    width: 300px; height: 300px;
    background: var(--p3, var(--accent));
    bottom: -100px; left: -60px;
  }
  .c-vp-404__inner {
    max-width: 640px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .c-vp-404__mark {
    width: 160px;
    height: 160px;
    margin: 0 auto 24px;
    border-radius: 36px;
    background: linear-gradient(
      135deg,
      var(--p0, var(--accent)) 0%,
      var(--p1, var(--accent)) 50%,
      var(--p4, var(--accent)) 100%
    );
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg);
    font-size: 104px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.04em;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
    transform: rotate(-6deg);
  }
  .c-vp-404__chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 9999px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: 20px;
  }
  .c-vp-404__chip::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--p4, var(--accent));
  }
  .c-vp-404__headline {
    font-size: clamp(30px, 4.2vw, 48px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-weight: 700;
    color: var(--fg);
    margin: 0 0 14px;
  }
  .c-vp-404__headline em {
    font-style: normal;
    background: linear-gradient(120deg, var(--p0, var(--accent)) 0%, var(--p1, var(--accent)) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .c-vp-404__body {
    font-size: 17px;
    line-height: 1.6;
    color: var(--fg-muted);
    margin: 0 auto 36px;
    max-width: 52ch;
  }
  .c-vp-404__cta {
    display: inline-flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .c-vp-404__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 500;
    border-radius: var(--radius-md, 12px);
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 280ms cubic-bezier(0.34, 1.1, 0.64, 1),
                box-shadow 280ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-404__btn--primary {
    background: var(--accent); color: var(--bg);
  }
  .c-vp-404__btn--primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
  }
  .c-vp-404__btn--ghost {
    background: var(--bg);
    color: var(--fg);
    border-color: var(--border-strong, var(--border));
  }
  .c-vp-404__btn--ghost:hover { background: var(--bg-2); }

  @media (max-width: 900px) {
    .c-vp-404__mark { width: 120px; height: 120px; font-size: 76px; border-radius: 28px; }
  }
</style>

<main class="c-vp-404">
  <div class="c-vp-404__inner">
    <div class="c-vp-404__mark" aria-hidden="true">?</div>
    <span class="c-vp-404__chip">404 &middot; Lost in the canvas</span>
    <h1 class="c-vp-404__headline">That page took a <em>wrong turn.</em></h1>
    <p class="c-vp-404__body">We couldn't find what you were after &mdash; it may have been moved, renamed, or shipped to a different board. Let's get you back on canvas.</p>
    <div class="c-vp-404__cta">
      <a href="/" class="c-vp-404__btn c-vp-404__btn--primary">Back to home &rarr;</a>
      <a href="/search" class="c-vp-404__btn c-vp-404__btn--ghost">Search your work</a>
    </div>
  </div>
</main>
