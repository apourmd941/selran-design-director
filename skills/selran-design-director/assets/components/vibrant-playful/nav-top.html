<style>
  .c-vp-nav {
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .c-vp-nav__inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
  }
  .c-vp-nav__brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-vp-nav__mark {
    width: 28px; height: 28px;
    border-radius: var(--radius-md, 12px);
    background: linear-gradient(135deg, var(--p0, var(--accent)) 0%, var(--p1, var(--accent)) 100%);
    display: inline-block;
    position: relative;
  }
  .c-vp-nav__mark::after {
    content: '';
    position: absolute;
    inset: 7px;
    border-radius: 4px;
    background: var(--bg);
  }
  .c-vp-nav__links {
    display: flex; gap: 28px; align-items: center;
    font-size: 15px; font-weight: 500;
    color: var(--fg);
  }
  .c-vp-nav__links a {
    color: inherit;
    text-decoration: none;
    padding: 6px 4px;
    position: relative;
    transition: color 280ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-nav__links a::after {
    content: '';
    position: absolute;
    left: 4px; right: 4px; bottom: -2px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 280ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-nav__links a:hover::after { transform: scaleX(1); }
  .c-vp-nav__links a[data-cat="0"]::after { background: var(--p0, var(--accent)); }
  .c-vp-nav__links a[data-cat="1"]::after { background: var(--p1, var(--accent)); }
  .c-vp-nav__links a[data-cat="2"]::after { background: var(--p2, var(--accent)); }
  .c-vp-nav__links a[data-cat="3"]::after { background: var(--p3, var(--accent)); }

  .c-vp-nav__btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 20px;
    font-size: 15px; font-weight: 500;
    border-radius: var(--radius-md, 12px);
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 280ms cubic-bezier(0.34, 1.1, 0.64, 1),
                background-color 280ms cubic-bezier(0.34, 1.1, 0.64, 1),
                box-shadow 280ms cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .c-vp-nav__btn--ghost {
    color: var(--fg);
    border-color: var(--border-strong, var(--border));
  }
  .c-vp-nav__btn--ghost:hover {
    background: var(--bg-2);
  }
  .c-vp-nav__btn--primary {
    background: var(--accent);
    color: var(--bg);
  }
  .c-vp-nav__btn--primary:hover {
    background: var(--accent-hover, var(--accent));
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }

  @media (max-width: 900px) {
    .c-vp-nav__links { gap: 16px; font-size: 14px; }
    .c-vp-nav__links a:not(.c-vp-nav__btn) { display: none; }
  }
</style>

<nav class="c-vp-nav">
  <div class="c-vp-nav__inner">
    <a class="c-vp-nav__brand" href="#">
      <span class="c-vp-nav__mark"></span>{Brand}
    </a>
    <div class="c-vp-nav__links">
      <a href="#canvas" data-cat="0">Canvas</a>
      <a href="#community" data-cat="1">Community</a>
      <a href="#templates" data-cat="2">Templates</a>
      <a href="#pricing" data-cat="3">Pricing</a>
      <a href="#" class="c-vp-nav__btn c-vp-nav__btn--ghost">Sign in</a>
      <a href="#" class="c-vp-nav__btn c-vp-nav__btn--primary">Start free</a>
    </div>
  </div>
</nav>
