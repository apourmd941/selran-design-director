<style>
  .c-dp-sidebar {
    --sb-w: 256px;
    --sb-w-collapsed: 64px;
    width: var(--sb-w);
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-right: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
    transition: width 220ms cubic-bezier(0.19, 1, 0.22, 1);
    box-sizing: border-box;
    position: relative;
    isolation: isolate;
  }
  .c-dp-sidebar::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 180px;
    background: radial-gradient(80% 100% at 50% 0%,
      color-mix(in oklab, var(--accent) 10%, transparent) 0%,
      transparent 70%);
    z-index: -1;
    pointer-events: none;
  }
  .c-dp-sidebar[data-mode="collapsed"] { width: var(--sb-w-collapsed); }
  .c-dp-sidebar__brand {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 20px;
    height: 68px;
    box-sizing: border-box;
    border-bottom: 1px solid var(--border);
    font-weight: 500; font-size: 15px;
    letter-spacing: -0.015em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-dp-sidebar__mark {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border-radius: 6px;
    background: linear-gradient(135deg,
      var(--accent) 0%,
      color-mix(in oklab, var(--accent) 60%, var(--bg)) 100%);
    box-shadow: 0 0 20px -4px color-mix(in oklab, var(--accent) 50%, transparent);
  }
  .c-dp-sidebar__brand-label { transition: opacity 220ms cubic-bezier(0.19, 1, 0.22, 1); }
  .c-dp-sidebar[data-mode="collapsed"] .c-dp-sidebar__brand-label { opacity: 0; pointer-events: none; }

  .c-dp-sidebar__nav {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 20px 12px;
  }
  .c-dp-sidebar__section { margin-bottom: 26px; }
  .c-dp-sidebar__section:last-child { margin-bottom: 0; }
  .c-dp-sidebar__section-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-muted);
    padding: 0 12px 10px;
    margin: 0;
  }
  .c-dp-sidebar[data-mode="collapsed"] .c-dp-sidebar__section-label { opacity: 0; height: 0; padding: 0; overflow: hidden; }

  .c-dp-sidebar__list { list-style: none; margin: 0; padding: 0; display: grid; gap: 2px; }
  .c-dp-sidebar__link {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px;
    min-height: 38px;
    font-size: 14px;
    color: var(--fg-muted);
    text-decoration: none;
    border-radius: 6px;
    position: relative;
    transition: background-color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                color 220ms cubic-bezier(0.19, 1, 0.22, 1);
    box-sizing: border-box;
  }
  .c-dp-sidebar__link:hover { background: var(--bg-2); color: var(--fg); }
  .c-dp-sidebar__link[aria-current="page"] {
    color: var(--fg);
    font-weight: 500;
    background: color-mix(in oklab, var(--accent) 8%, transparent);
  }
  .c-dp-sidebar__link[aria-current="page"]::before {
    content: "";
    position: absolute;
    left: -12px; top: 6px; bottom: 6px;
    width: 4px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
    box-shadow: 0 0 16px -2px color-mix(in oklab, var(--accent) 70%, transparent);
  }
  .c-dp-sidebar__link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-dp-sidebar__icon {
    flex: 0 0 auto;
    width: 16px; height: 16px;
    display: inline-flex;
    color: inherit;
  }
  .c-dp-sidebar__label { transition: opacity 180ms cubic-bezier(0.19, 1, 0.22, 1); white-space: nowrap; }
  .c-dp-sidebar[data-mode="collapsed"] .c-dp-sidebar__label { opacity: 0; pointer-events: none; }
  .c-dp-sidebar__badge {
    margin-left: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    color: var(--fg-muted);
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-variant-numeric: tabular-nums;
    background: var(--bg);
  }
  .c-dp-sidebar__badge--accent {
    color: var(--accent);
    border-color: color-mix(in oklab, var(--accent) 40%, var(--border));
  }
  .c-dp-sidebar[data-mode="collapsed"] .c-dp-sidebar__badge { display: none; }

  .c-dp-sidebar__foot {
    flex: 0 0 auto;
    border-top: 1px solid var(--border);
    padding: 14px;
  }
  .c-dp-sidebar__collapse {
    display: inline-flex; align-items: center; gap: 8px; justify-content: center;
    padding: 9px 12px;
    width: 100%;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    box-sizing: border-box;
    transition: background-color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                border-color 220ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-sidebar__collapse:hover { background: var(--bg-2); color: var(--fg); border-color: var(--accent); }
  .c-dp-sidebar__collapse:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-dp-sidebar__collapse svg { transition: transform 220ms cubic-bezier(0.19, 1, 0.22, 1); }
  .c-dp-sidebar[data-mode="collapsed"] .c-dp-sidebar__collapse svg { transform: rotate(180deg); }
  .c-dp-sidebar[data-mode="collapsed"] .c-dp-sidebar__collapse-label { display: none; }

  @media (max-width: 1100px) {
    .c-dp-sidebar { width: var(--sb-w-collapsed); }
    .c-dp-sidebar .c-dp-sidebar__brand-label,
    .c-dp-sidebar .c-dp-sidebar__section-label,
    .c-dp-sidebar .c-dp-sidebar__label,
    .c-dp-sidebar .c-dp-sidebar__badge,
    .c-dp-sidebar .c-dp-sidebar__collapse-label { opacity: 0; pointer-events: none; }
  }
  @media (max-width: 900px) {
    .c-dp-sidebar {
      position: fixed; inset: 0 auto 0 0;
      width: 280px;
      z-index: 40;
      transform: translateX(-100%);
      transition: transform 220ms cubic-bezier(0.19, 1, 0.22, 1);
    }
    .c-dp-sidebar[data-mode="drawer-open"] { transform: translateX(0); }
    .c-dp-sidebar .c-dp-sidebar__brand-label,
    .c-dp-sidebar .c-dp-sidebar__section-label,
    .c-dp-sidebar .c-dp-sidebar__label,
    .c-dp-sidebar .c-dp-sidebar__badge,
    .c-dp-sidebar .c-dp-sidebar__collapse-label { opacity: 1; pointer-events: auto; }
  }
</style>

  <nav class="c-dp-sidebar__nav" aria-label="Main navigation">
    <div class="c-dp-sidebar__section">
      <p class="c-dp-sidebar__section-label">Treasury</p>
      <ul class="c-dp-sidebar__list">
        <li><a class="c-dp-sidebar__link" href="#" aria-current="page">

          <span class="c-dp-sidebar__label">Overview</span>

        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="2" y="3.5" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M2 7h12" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="c-dp-sidebar__label">Vaults</span>
          <span class="c-dp-sidebar__badge c-dp-sidebar__badge--accent">7</span>
        </a></li>
        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span class="c-dp-sidebar__label">Transactions</span>
          <span class="c-dp-sidebar__badge">248</span>
        </a></li>
        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 11l3-3 2 2 3-4 4 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="c-dp-sidebar__label">Allocations</span>

    <div class="c-dp-sidebar__section">
      <p class="c-dp-sidebar__section-label">Intelligence</p>
      <ul class="c-dp-sidebar__list">
        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="2.5" y="5" width="2" height="8" stroke="currentColor" stroke-width="1.3"/><rect x="7" y="2.5" width="2" height="10.5" stroke="currentColor" stroke-width="1.3"/><rect x="11.5" y="8" width="2" height="5" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="c-dp-sidebar__label">Analytics</span>
        </a></li>
        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2.5 12h11M2.5 3.5l3 3 3-2 5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span class="c-dp-sidebar__label">Signals</span>
          <span class="c-dp-sidebar__badge c-dp-sidebar__badge--accent">3</span>
        </a></li>
        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 3h10v10H3z" stroke="currentColor" stroke-width="1.3"/><path d="M6 3v10M3 6h10" stroke="currentColor" stroke-width="1.3"/></svg>
          <span class="c-dp-sidebar__label">Reports</span>
        </a></li>
      </ul>
    </div>

    <div class="c-dp-sidebar__section">
      <p class="c-dp-sidebar__section-label">Workspace</p>
      <ul class="c-dp-sidebar__list">
        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="6" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 13c.8-2.4 2.8-3.5 5-3.5s4.2 1.1 5 3.5" stroke="currentColor" stroke-width="1.3"/></svg>

        <li><a class="c-dp-sidebar__link" href="#">
          <svg class="c-dp-sidebar__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M8 2v1.5M8 12.5V14M14 8h-1.5M3.5 8H2M12.2 3.8l-1 1M4.8 11.2l-1 1M12.2 12.2l-1-1M4.8 4.8l-1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span class="c-dp-sidebar__label">Settings</span>

  </nav>

  <div class="c-dp-sidebar__foot">
    <button class="c-dp-sidebar__collapse" type="button" aria-expanded="true" aria-label="Collapse sidebar">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="c-dp-sidebar__collapse-label">Collapse</span>
    </button>
  </div>
</aside>
