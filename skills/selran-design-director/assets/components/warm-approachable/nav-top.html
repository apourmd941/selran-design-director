<style>
  .c-wa-nav {
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
    padding: 14px 0;
  }
  .c-wa-nav__inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
  }
  .c-wa-nav__brand {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-wa-nav__mark {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    position: relative;
  }
  .c-wa-nav__mark::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: var(--bg);
  }
  .c-wa-nav__links {
    display: flex; gap: 32px; align-items: center;
    font-size: 15px; color: var(--fg-muted);
  }
  .c-wa-nav__links a {
    color: inherit;
    text-decoration: none;
    transition: color 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-nav__links a:hover { color: var(--fg); }
  .c-wa-nav__btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    font-size: 15px; font-weight: 500;
    border-radius: var(--radius-lg, 24px);
    border: 1px solid transparent;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1),
                background-color 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-nav__btn--primary {
    background: var(--accent);
    color: var(--bg);
  }
  .c-wa-nav__btn--primary:hover {
    background: var(--accent-hover, var(--accent));
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(61, 40, 23, 0.12);
  }

  @media (max-width: 900px) {
    .c-wa-nav__links { gap: 18px; font-size: 14px; }
    .c-wa-nav__links a:not(.c-wa-nav__btn) { display: none; }
  }
</style>

<nav class="c-wa-nav">
  <div class="c-wa-nav__inner">
    <a class="c-wa-nav__brand" href="#">
      <span class="c-wa-nav__mark"></span>{Brand}
    </a>
    <div class="c-wa-nav__links">
      <a href="#shop">Shop</a>
      <a href="#journal">Journal</a>
      <a href="#our-story">Our story</a>
      <a href="#visit">Visit us</a>
      <a href="#" class="c-wa-nav__btn c-wa-nav__btn--primary">Become a member</a>
    </div>
  </div>
</nav>
