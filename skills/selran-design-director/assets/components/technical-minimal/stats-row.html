<style>
  .c-stats {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .c-stats__inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }
  .c-stats__item {
    padding: 32px 0;
    border-right: 1px solid var(--border);
    padding-right: 32px;
  }
  .c-stats__item:first-child { padding-right: 32px; }
  .c-stats__item:not(:first-child) { padding-left: 32px; }
  .c-stats__item:last-child { border-right: none; }
  .c-stats__item .mono {
    color: var(--fg-muted);
    margin-bottom: 8px;
    display: block;
  }
  .c-stats__num {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
  }
  .c-stats__delta {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--accent);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .c-stats__delta--muted { color: var(--fg-muted); }

  @media (max-width: 900px) {
    .c-stats__inner { grid-template-columns: 1fr; }
    .c-stats__item {
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 24px 0 !important;
    }
    .c-stats__item:last-child { border-bottom: none; }
  }
</style>

<div class="c-stats">
  <div class="c-stats__inner">
    <div class="c-stats__item">
      <div class="mono">Avg. close time</div>
      <div class="c-stats__num">2.1 days</div>
      <div class="c-stats__delta">↓ 4.8 days vs. industry</div>
    </div>
    <div class="c-stats__item">
      <div class="mono">Active teams</div>
      <div class="c-stats__num">3,240</div>
      <div class="c-stats__delta">↑ 612 this quarter</div>
    </div>
    <div class="c-stats__item">
      <div class="mono">Uptime (90d)</div>
      <div class="c-stats__num">99.99%</div>
      <div class="c-stats__delta c-stats__delta--muted">0 incidents, 90 days</div>
    </div>
  </div>
</div>
