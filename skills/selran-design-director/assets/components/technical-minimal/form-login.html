<style>
  .c-tm-login {
    max-width: 400px;
    margin: 0 auto;
    padding: 40px 32px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
  }
  .c-tm-login__mark {
    width: 20px; height: 20px;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 0, 100% 40%, 60% 40%, 60% 100%, 0 100%);
    display: inline-block;
    margin-bottom: 20px;
  }
  .c-tm-login__headline {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin: 0 0 6px;
  }
  .c-tm-login__sub {
    font-size: 14px;
    color: var(--fg-muted);
    margin: 0 0 28px;
  }
  .c-tm-login__field { margin-bottom: 16px; }
  .c-tm-login__label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: 6px;
  }
  .c-tm-login__row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .c-tm-login__forgot {
    font-size: 12px;
    color: var(--fg-muted);
    text-decoration: none;
    transition: color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-login__forgot:hover { color: var(--accent); }
  .c-tm-login__input {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 200ms cubic-bezier(0.2, 0, 0, 1),
                box-shadow 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-login__input::placeholder { color: var(--fg-muted); }
  .c-tm-login__input:hover { border-color: var(--fg-muted); }
  .c-tm-login__input:focus-visible {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 30%, transparent);
  }
  .c-tm-login__btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 100%;
    padding: 11px 16px;
    font-size: 14px; font-weight: 500;
    font-family: inherit;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    transition: filter 200ms cubic-bezier(0.2, 0, 0, 1),
                box-shadow 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-login__btn:hover { filter: brightness(0.92); }
  .c-tm-login__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-tm-login__divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 16px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
  }
  .c-tm-login__divider::before,
  .c-tm-login__divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .c-tm-login__oauth {
    display: flex; flex-direction: column; gap: 8px;
  }
  .c-tm-login__oauth-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    width: 100%; box-sizing: border-box;
    padding: 10px 16px;
    font-size: 14px; font-weight: 500;
    font-family: inherit;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                border-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-login__oauth-btn:hover { background: var(--bg-2); border-color: var(--fg-muted); }
  .c-tm-login__oauth-btn:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 30%, transparent);
  }
  .c-tm-login__oauth-btn svg { width: 16px; height: 16px; }
  .c-tm-login__foot {
    margin-top: 24px;
    font-size: 13px;
    color: var(--fg-muted);
    text-align: center;
  }
  .c-tm-login__foot a { color: var(--fg); text-decoration: none; border-bottom: 1px solid var(--border); }
  .c-tm-login__foot a:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 900px) {
    .c-tm-login { max-width: none; border: none; padding: 32px 20px; border-radius: 0; }
  }
</style>

<form class="c-tm-login" novalidate>
  <span class="c-tm-login__mark" aria-hidden="true"></span>
  <h1 class="c-tm-login__headline">Sign in to {Brand}</h1>
  <p class="c-tm-login__sub">Welcome back. Use your work email to continue.</p>

  <div class="c-tm-login__field">
    <label class="c-tm-login__label" for="tm-email">Email</label>
    <input class="c-tm-login__input" id="tm-email" name="email" type="email" autocomplete="email" placeholder="you@company.com" required>
  </div>

  <div class="c-tm-login__field">
    <div class="c-tm-login__row">
      <label class="c-tm-login__label" for="tm-password">Password</label>
      <a class="c-tm-login__forgot" href="#forgot">Forgot password?</a>
    </div>
    <input class="c-tm-login__input" id="tm-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
  </div>

  <button class="c-tm-login__btn" type="submit">Sign in</button>

  <div class="c-tm-login__divider">or continue with</div>

  <div class="c-tm-login__oauth">
    <a class="c-tm-login__oauth-btn" href="#google">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21.35 11.1H12v3.8h5.35c-.23 1.23-1.44 3.6-5.35 3.6-3.22 0-5.85-2.67-5.85-5.95S8.78 6.6 12 6.6c1.83 0 3.06.78 3.77 1.45l2.57-2.48C16.7 4.1 14.55 3.2 12 3.2 7.06 3.2 3 7.25 3 12.2s4.06 9 9 9c5.2 0 8.65-3.65 8.65-8.8 0-.6-.06-1.05-.15-1.5z"/></svg>
      Continue with Google
    </a>
    <a class="c-tm-login__oauth-btn" href="#github">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48l-.01-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85 0 1.7.11 2.5.33 1.9-1.29 2.74-1.02 2.74-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.33 4.69-4.56 4.94.36.31.68.91.68 1.85l-.01 2.74c0 .27.18.58.69.48A10 10 0 0 0 12 2z"/></svg>
      Continue with GitHub
    </a>
  </div>

  <p class="c-tm-login__foot">New to {Brand}? <a href="#signup">Create an account</a></p>
</form>
