<style>
  .c-wa-sidebar {
    --sb-w: 272px;
    --sb-w-collapsed: 76px;
    width: var(--sb-w);
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
    transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
  }
  .c-wa-sidebar[data-mode="collapsed"] { width: var(--sb-w-collapsed); }
  .c-wa-sidebar__brand {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 22px;
    height: 72px;
    box-sizing: border-box;
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-weight: 500;
    font-size: 20px;
    letter-spacing: -0.01em;
    color: var(--fg);
    text-decoration: none;
  }
  .c-wa-sidebar__mark {
    flex: 0 0 auto;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    position: relative;
  }
  .c-wa-sidebar__mark::after {
    content: '';
    position: absolute;
    inset: 7px;
    border-radius: 50%;
    background: var(--bg-2);
  }
  .c-wa-sidebar__brand-label {
    transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }
  .c-wa-sidebar[data-mode="collapsed"] .c-wa-sidebar__brand-label { opacity: 0; pointer-events: none; }

  .c-wa-sidebar__nav {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 12px 14px 20px;
  }
  .c-wa-sidebar__section { margin-bottom: 22px; }
  .c-wa-sidebar__section:last-child { margin-bottom: 0; }
  .c-wa-sidebar__section-label {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 13px;
    color: var(--fg-muted);
    padding: 10px 14px 8px;
    margin: 0;
  }
  .c-wa-sidebar[data-mode="collapsed"] .c-wa-sidebar__section-label { opacity: 0; height: 0; padding: 0; overflow: hidden; }

  .c-wa-sidebar__list { list-style: none; margin: 0; padding: 0; display: grid; gap: 4px; }
  .c-wa-sidebar__link {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    min-height: 40px;
    font-size: 15px;
    color: var(--fg-muted);
    text-decoration: none;
    border-radius: 9999px;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
  }
  .c-wa-sidebar__link:hover {
    background: var(--bg);
    color: var(--fg);
    box-shadow: 0 4px 12px rgba(61, 40, 23, 0.06);
  }
  .c-wa-sidebar__link[aria-current="page"] {
    background: var(--accent);
    color: var(--bg);
    font-weight: 500;
    box-shadow: 0 6px 16px rgba(61, 40, 23, 0.18);
  }
  .c-wa-sidebar__link[aria-current="page"] .c-wa-sidebar__badge {
    background: rgba(255, 255, 255, 0.22);
    color: var(--bg);
    border-color: transparent;
  }
  .c-wa-sidebar__link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--bg-2), 0 0 0 5px var(--accent);
  }
  .c-wa-sidebar__icon {
    flex: 0 0 auto;
    width: 18px; height: 18px;
    display: inline-flex;
    color: inherit;
  }
  .c-wa-sidebar__label {
    transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }
  .c-wa-sidebar[data-mode="collapsed"] .c-wa-sidebar__label { opacity: 0; pointer-events: none; }
  .c-wa-sidebar__badge {
    margin-left: auto;
    font-size: 12px;
    color: var(--fg-muted);
    padding: 2px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-variant-numeric: tabular-nums;
  }
  .c-wa-sidebar[data-mode="collapsed"] .c-wa-sidebar__badge { display: none; }

  .c-wa-sidebar__foot {
    flex: 0 0 auto;
    padding: 14px;
  }
  .c-wa-sidebar__collapse {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    color: var(--fg-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
    cursor: pointer;
    box-sizing: border-box;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-sidebar__collapse:hover {
    color: var(--fg);
    box-shadow: 0 4px 12px rgba(61, 40, 23, 0.08);
  }
  .c-wa-sidebar__collapse:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--bg-2), 0 0 0 5px var(--accent);
  }
  .c-wa-sidebar__collapse svg { transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1); }
  .c-wa-sidebar[data-mode="collapsed"] .c-wa-sidebar__collapse svg { transform: rotate(180deg); }
  .c-wa-sidebar[data-mode="collapsed"] .c-wa-sidebar__collapse-label { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-sidebar,
    .c-wa-sidebar__link,
    .c-wa-sidebar__collapse,
    .c-wa-sidebar__collapse svg,
    .c-wa-sidebar__label,
    .c-wa-sidebar__brand-label { transition: none; }
  }

  @media (max-width: 1100px) {
    .c-wa-sidebar { width: var(--sb-w-collapsed); }
    .c-wa-sidebar .c-wa-sidebar__brand-label,
    .c-wa-sidebar .c-wa-sidebar__section-label,
    .c-wa-sidebar .c-wa-sidebar__label,
    .c-wa-sidebar .c-wa-sidebar__badge,
    .c-wa-sidebar .c-wa-sidebar__collapse-label { opacity: 0; pointer-events: none; }
  }
  @media (max-width: 900px) {
    .c-wa-sidebar {
      position: fixed; inset: 0 auto 0 0;
      width: 288px;
      z-index: 40;
      transform: translateX(-100%);
      box-shadow: 0 20px 60px rgba(61, 40, 23, 0.18);
      transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .c-wa-sidebar[data-mode="drawer-open"] { transform: translateX(0); }
    .c-wa-sidebar .c-wa-sidebar__brand-label,
    .c-wa-sidebar .c-wa-sidebar__section-label,
    .c-wa-sidebar .c-wa-sidebar__label,
    .c-wa-sidebar .c-wa-sidebar__badge,
    .c-wa-sidebar .c-wa-sidebar__collapse-label { opacity: 1; pointer-events: auto; }
  }
</style>

  <nav class="c-wa-sidebar__nav" aria-label="Main navigation">

        <li><a class="c-wa-sidebar__link" href="#">
          <svg class="c-wa-sidebar__icon" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M3 5h12M5 9h8M7 13h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span class="c-wa-sidebar__label">Habit journal</span>
          <span class="c-wa-sidebar__badge">4</span>
        </a></li>
        <li><a class="c-wa-sidebar__link" href="#">
          <svg class="c-wa-sidebar__icon" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.4"/></svg>
          <span class="c-wa-sidebar__label">Mood check-ins</span>
        </a></li>
      </ul>
    </div>

    <div class="c-wa-sidebar__section">
      <p class="c-wa-sidebar__section-label">Your money</p>
      <ul class="c-wa-sidebar__list">
        <li><a class="c-wa-sidebar__link" href="#">
          <svg class="c-wa-sidebar__icon" viewBox="0 0 18 18" fill="none" aria-hidden="true"><rect x="2.5" y="4.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M2.5 8h13" stroke="currentColor" stroke-width="1.4"/></svg>

          <svg class="c-wa-sidebar__icon" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 2.5c3.6 0 6.5 2.9 6.5 6.5S12.6 15.5 9 15.5 2.5 12.6 2.5 9 5.4 2.5 9 2.5zM9 5v4l2.5 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="c-wa-sidebar__label">Donations</span>
          <span class="c-wa-sidebar__badge">12</span>
        </a></li>
        <li><a class="c-wa-sidebar__link" href="#">
          <svg class="c-wa-sidebar__icon" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M3 13l4-5 3 3 5-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="c-wa-sidebar__label">Savings</span>
        </a></li>
      </ul>
    </div>

    <div class="c-wa-sidebar__section">
      <p class="c-wa-sidebar__section-label">Account</p>
      <ul class="c-wa-sidebar__list">
        <li><a class="c-wa-sidebar__link" href="#">
          <svg class="c-wa-sidebar__icon" viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="7" r="2.75" stroke="currentColor" stroke-width="1.4"/><path d="M3.5 14.5c1-2.5 3-3.75 5.5-3.75s4.5 1.25 5.5 3.75" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span class="c-wa-sidebar__label">Profile</span>

        <li><a class="c-wa-sidebar__link" href="#">
          <svg class="c-wa-sidebar__icon" viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.4"/><path d="M9 2v2M9 14v2M16 9h-2M4 9H2M13.95 4.05l-1.4 1.4M5.45 12.55l-1.4 1.4M13.95 13.95l-1.4-1.4M5.45 5.45l-1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span class="c-wa-sidebar__label">Settings</span>
        </a></li>
      </ul>

  </nav>

  <div class="c-wa-sidebar__foot">
    <button class="c-wa-sidebar__collapse" type="button" aria-expanded="true" aria-label="Collapse sidebar">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="c-wa-sidebar__collapse-label">Tuck away</span>
    </button>
  </div>
</aside>
