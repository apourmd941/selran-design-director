<style>
  .c-ed-topbar {
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 18px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
  }
  .c-ed-topbar__wordmark {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--fg);
    letter-spacing: -0.01em;
    text-decoration: none;
    white-space: nowrap;
  }
  .c-ed-topbar__wordmark em { font-style: italic; color: var(--accent); }

  .c-ed-topbar__divider {
    width: 1px;
    height: 22px;
    background: var(--border);
  }

  .c-ed-topbar__section {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 11px;
    color: var(--fg-muted);
    white-space: nowrap;
  }
  .c-ed-topbar__section em {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
    font-size: 14px;
    color: var(--fg);
    margin-left: 10px;
  }

  .c-ed-topbar__search {
    flex: 1;
    max-width: 420px;
    position: relative;
  }
  .c-ed-topbar__search-input {
    width: 100%;
    box-sizing: border-box;
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--border);
    padding: 8px 0 8px 22px;
    font-size: 15px;
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    color: var(--fg);
    outline: none;
    transition: border-color 250ms ease;
  }
  .c-ed-topbar__search-input::placeholder { color: var(--fg-muted); font-style: italic; }
  .c-ed-topbar__search-input:focus-visible { border-bottom-color: var(--accent); }
  .c-ed-topbar__search-icon {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted);
  }
  .c-ed-topbar__kbd {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--fg-muted);
  }

  .c-ed-topbar__actions {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-left: auto;
  }
  .c-ed-topbar__link {
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 15px;
    color: var(--fg);
    text-decoration: none;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 250ms ease, color 250ms ease;
  }
  .c-ed-topbar__link:hover { border-bottom-color: var(--fg); }
  .c-ed-topbar__link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .c-ed-topbar__user {
    width: 34px; height: 34px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    font-family: var(--ff-display, 'Fraunces', 'Instrument Serif', Georgia, serif);
    font-style: italic;
    font-size: 14px;
    transition: border-color 250ms ease, color 250ms ease;
  }
  .c-ed-topbar__user:hover { border-color: var(--fg); }
  .c-ed-topbar__user:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (max-width: 900px) {
    .c-ed-topbar { padding: 14px 20px; gap: 16px; }
    .c-ed-topbar__section, .c-ed-topbar__divider, .c-ed-topbar__link { display: none; }
    .c-ed-topbar__search { max-width: none; }
  }
</style>

<header class="c-ed-topbar" role="banner">
  <a class="c-ed-topbar__wordmark" href="#">{Brand}<em>.</em></a>
  <span class="c-ed-topbar__divider" aria-hidden="true"></span>
  <span class="c-ed-topbar__section">Issue<em>Spring 2026</em></span>

  <label class="c-ed-topbar__search">
    <span class="visually-hidden" style="position:absolute;clip:rect(0 0 0 0);clip-path:inset(50%);overflow:hidden;width:1px;height:1px;">Search the archive</span>
    <svg class="c-ed-topbar__search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1"/>
      <path d="M9 9l3 3" stroke="currentColor" stroke-width="1"/>
    </svg>
    <input class="c-ed-topbar__search-input" type="search" placeholder="Search essays, notes, authors…">
    <span class="c-ed-topbar__kbd" aria-hidden="true">⌘K</span>
  </label>

  <nav class="c-ed-topbar__actions" aria-label="Account">
    <a class="c-ed-topbar__link" href="#">Archive</a>
    <a class="c-ed-topbar__link" href="#">Notes</a>
    <button class="c-ed-topbar__user" type="button" aria-label="Account menu — Iris Park" aria-haspopup="menu">I</button>
  </nav>
</header>
