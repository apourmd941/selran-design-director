<style>
  .c-wa-crumb {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 2px;
    padding: 8px 4px;
    font-family: inherit;
    font-size: 14px;
    color: var(--fg-muted);
  }
  .c-wa-crumb__list {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 2px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .c-wa-crumb__item {
    display: inline-flex;
    align-items: center;
    gap: 2px;
  }
  .c-wa-crumb__link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 9999px;
    color: var(--fg-muted);
    text-decoration: none;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                color 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-crumb__link:hover {
    background: var(--bg-2);
    color: var(--fg);
  }
  .c-wa-crumb__link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-wa-crumb__item[aria-current="page"] .c-wa-crumb__link,
  .c-wa-crumb__current {
    background: var(--bg-2);
    color: var(--fg);
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .c-wa-crumb__sep {
    display: inline-flex;
    align-items: center;
    color: var(--fg-muted);
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    padding: 0 2px;
    opacity: 0.7;
  }
  .c-wa-crumb__home {
    width: 14px; height: 14px;
    display: inline-flex;
  }
  .c-wa-crumb__ellipsis {
    display: inline-flex;
    padding: 6px 10px;
    border-radius: 9999px;
    border: 0;
    background: transparent;
    color: var(--fg-muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-crumb__ellipsis:hover { background: var(--bg-2); color: var(--fg); }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-crumb__link,
    .c-wa-crumb__ellipsis { transition: none; }
  }

  @media (max-width: 900px) {
    .c-wa-crumb { font-size: 13px; }
    .c-wa-crumb__item--hide-mobile { display: none; }
    .c-wa-crumb__ellipsis--mobile { display: inline-flex; }
  }
  @media (min-width: 901px) {
    .c-wa-crumb__ellipsis--mobile { display: none; }
  }
</style>

<nav class="c-wa-crumb" aria-label="Breadcrumb">
  <ol class="c-wa-crumb__list">
    <li class="c-wa-crumb__item">
      <a class="c-wa-crumb__link" href="#" aria-label="Home">
        <svg class="c-wa-crumb__home" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 7l5-4 5 4v5a.5.5 0 0 1-.5.5H9V9H5v3.5H2.5A.5.5 0 0 1 2 12V7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        <span>Home</span>
      </a>
    </li>
    <li class="c-wa-crumb__sep" aria-hidden="true">›</li>
    <li class="c-wa-crumb__item c-wa-crumb__item--hide-mobile">
      <a class="c-wa-crumb__link" href="#">Case files</a>
    </li>
    <li class="c-wa-crumb__sep c-wa-crumb__item--hide-mobile" aria-hidden="true">›</li>
    <li>
      <button class="c-wa-crumb__ellipsis c-wa-crumb__ellipsis--mobile" type="button" aria-label="Show hidden path">…</button>
    </li>
    <li class="c-wa-crumb__sep c-wa-crumb__ellipsis--mobile" aria-hidden="true">›</li>
    <li class="c-wa-crumb__item c-wa-crumb__item--hide-mobile">
      <a class="c-wa-crumb__link" href="#">Harbor Outreach</a>
    </li>
    <li class="c-wa-crumb__sep c-wa-crumb__item--hide-mobile" aria-hidden="true">›</li>
    <li class="c-wa-crumb__item" aria-current="page">
      <span class="c-wa-crumb__current">
        Family intake, April 18
      </span>
    </li>
  </ol>
</nav>
