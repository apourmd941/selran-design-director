<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: technical-minimal
  use: marketing hero, onboarding cover
  variables: var(fg) (stroke), var(bg) (panel), var(accent) (single highlight)
  notes: isometric wireframe, 1-1.5px strokes, no fills except single accent at 20% opacity
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Isometric wireframe system">
  <style>
    .tm-stroke { stroke: var(--fg, currentColor); fill: none; stroke-width: 1; vector-effect: non-scaling-stroke; }
    .tm-thin   { stroke: var(--fg, currentColor); fill: none; stroke-width: 1; opacity: .35; vector-effect: non-scaling-stroke; }
    .tm-dash   { stroke: var(--fg, currentColor); fill: none; stroke-width: 1; stroke-dasharray: 4 4; opacity: .5; vector-effect: non-scaling-stroke; }
    .tm-accent { fill: var(--accent, #0A7A5C); opacity: .2; }
    .tm-accent-stroke { stroke: var(--accent, #0A7A5C); fill: none; stroke-width: 1.25; vector-effect: non-scaling-stroke; }
    .tm-label  { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; fill: var(--fg, currentColor); opacity: .55; letter-spacing: .08em; }
    .tm-dot    { fill: var(--fg, currentColor); opacity: .35; }
  </style>

  <defs>
    <pattern id="tm-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" class="tm-thin" stroke-width=".5" opacity=".18"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#tm-grid)"/>

  <!-- center isometric stack: three layered planes -->
  <g transform="translate(600 300)">
    <!-- base plane -->
    <path class="tm-stroke" d="M0 120 L180 30 L360 120 L180 210 Z"/>
    <!-- mid plane (raised) -->
    <path class="tm-stroke" d="M40 70 L200 -10 L360 70 L200 150 Z" transform="translate(-20 -30)"/>
    <!-- top plane (accent fill) -->
    <path class="tm-accent"        d="M60 10 L200 -60 L340 10 L200 80 Z" transform="translate(-20 -80)"/>
    <path class="tm-accent-stroke" d="M60 10 L200 -60 L340 10 L200 80 Z" transform="translate(-20 -80)"/>

    <!-- vertical pillars connecting planes -->
    <line class="tm-stroke" x1="0" y1="120" x2="0" y2="40"/>
    <line class="tm-stroke" x1="360" y1="120" x2="360" y2="40"/>
    <line class="tm-stroke" x1="180" y1="210" x2="180" y2="130"/>
    <line class="tm-stroke" x1="180" y1="30" x2="180" y2="-50"/>
  </g>

  <!-- annotation: dashed accent callouts -->
  <g transform="translate(600 300)">
    <line class="tm-dash" x1="340" y1="-70" x2="480" y2="-140"/>
    <circle cx="340" cy="-70" r="3" class="tm-dot"/>
    <circle cx="480" cy="-140" r="3" class="tm-dot"/>
    <text x="492" y="-144" class="tm-label">SURFACE.TOP</text>

    <line class="tm-dash" x1="-180" y1="120" x2="-320" y2="180"/>
    <circle cx="-180" cy="120" r="3" class="tm-dot"/>
    <circle cx="-320" cy="180" r="3" class="tm-dot"/>
    <text x="-460" y="184" class="tm-label">BASE.PLANE</text>
  </g>

  <!-- left column: dimension markers -->
  <g transform="translate(80 180)">
    <line class="tm-thin" x1="0" y1="0" x2="0" y2="240"/>
    <line class="tm-thin" x1="-4" y1="0" x2="4" y2="0"/>
    <line class="tm-thin" x1="-4" y1="240" x2="4" y2="240"/>
    <text x="10" y="125" class="tm-label">Y · 240</text>
  </g>

  <!-- bottom: tick scale -->
  <g transform="translate(80 520)">
    <line class="tm-thin" x1="0" y1="0" x2="1040" y2="0"/>
    <g class="tm-thin">
      <line x1="0"    y1="-4" x2="0"    y2="4"/>
      <line x1="130"  y1="-4" x2="130"  y2="4"/>
      <line x1="260"  y1="-4" x2="260"  y2="4"/>
      <line x1="390"  y1="-4" x2="390"  y2="4"/>
      <line x1="520"  y1="-4" x2="520"  y2="4"/>
      <line x1="650"  y1="-4" x2="650"  y2="4"/>
      <line x1="780"  y1="-4" x2="780"  y2="4"/>
      <line x1="910"  y1="-4" x2="910"  y2="4"/>
      <line x1="1040" y1="-4" x2="1040" y2="4"/>
    </g>
    <text x="0"    y="20" class="tm-label">00</text>
    <text x="500" y="20" class="tm-label">GRID · 8PX</text>
    <text x="1012" y="20" class="tm-label">08</text>
  </g>

  <!-- top-left label chip -->
  <g transform="translate(80 80)">
    <text x="0"  y="0"  class="tm-label">SYSTEM / v1.0</text>
    <line class="tm-stroke" x1="0" y1="8" x2="120" y2="8"/>
  </g>
</svg>
