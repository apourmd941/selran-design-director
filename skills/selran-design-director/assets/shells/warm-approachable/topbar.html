<style>
  .c-wa-topbar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    color: var(--fg);
    box-sizing: border-box;
    position: sticky; top: 0; z-index: 20;
  }
  .c-wa-topbar__workspace {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 8px 14px 8px 10px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-size: 14px;
    color: var(--fg);
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-topbar__workspace:hover {
    background: var(--bg-3);
    box-shadow: 0 4px 12px rgba(61, 40, 23, 0.08);
  }
  .c-wa-topbar__ws-mark {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-weight: 500; font-size: 13px;
  }
  .c-wa-topbar__ws-name { font-weight: 500; }
  .c-wa-topbar__ws-hint {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-style: italic;
    color: var(--fg-muted);
    font-size: 13px;
  }
  .c-wa-topbar__ws-caret { color: var(--fg-muted); margin-left: 2px; }

  .c-wa-topbar__search {
    flex: 1 1 auto;
    max-width: 440px;
    position: relative;
  }
  .c-wa-topbar__search-input {
    width: 100%; box-sizing: border-box;
    padding: 10px 14px 10px 40px;
    font-size: 14px;
    font-family: inherit;
    color: var(--fg);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 9999px;
    outline: none;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                border-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-topbar__search-input::placeholder { color: var(--fg-muted); }
  .c-wa-topbar__search-input:focus-visible {
    background: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(61, 40, 23, 0.1),
                0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent);
  }
  .c-wa-topbar__search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted);
    pointer-events: none;
  }
  .c-wa-topbar__kbd {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    padding: 2px 8px;
    font-size: 11px;
    color: var(--fg-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
  }

  .c-wa-topbar__spacer { flex: 1 1 auto; }

  .c-wa-topbar__actions { display: inline-flex; align-items: center; gap: 8px; }
  .c-wa-topbar__btn {
    position: relative;
    width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    color: var(--fg-muted);
    border: 1px solid var(--border);
    border-radius: 9999px;
    cursor: pointer;
    transition: background-color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                color 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-topbar__btn:hover {
    background: var(--bg-3);
    color: var(--fg);
    box-shadow: 0 4px 12px rgba(61, 40, 23, 0.08);
  }
  .c-wa-topbar__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent);
  }
  .c-wa-topbar__dot {
    position: absolute;
    top: 10px; right: 10px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }

  .c-wa-topbar__avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg-3);
    color: var(--fg);
    border: 1px solid var(--border);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: 14px;
    font-weight: 500;
    transition: box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-topbar__avatar:hover { box-shadow: 0 4px 12px rgba(61, 40, 23, 0.10); }
  .c-wa-topbar__avatar:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-topbar *,
    .c-wa-topbar *::before,
    .c-wa-topbar *::after { transition: none !important; }
  }

  @media (max-width: 900px) {
    .c-wa-topbar { padding: 12px 16px; gap: 10px; }
    .c-wa-topbar__ws-name,
    .c-wa-topbar__ws-hint { display: none; }
    .c-wa-topbar__workspace { padding: 6px; }
    .c-wa-topbar__search { display: none; }
    .c-wa-topbar__kbd { display: none; }
  }
</style>

<header class="c-wa-topbar" role="banner">
  <button class="c-wa-topbar__workspace" type="button" aria-haspopup="menu" aria-label="Switch workspace">
    <span class="c-wa-topbar__ws-mark" aria-hidden="true">G</span>
    <span>
      <span class="c-wa-topbar__ws-name">Goodhart Fund</span>
      <span class="c-wa-topbar__ws-hint"> — your workspace</span>
    </span>
    <svg class="c-wa-topbar__ws-caret" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="c-wa-topbar__search" role="search">
    <svg class="c-wa-topbar__search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 10.5L13.5 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    <input class="c-wa-topbar__search-input" type="search" placeholder="Search across journals, donations, people…" aria-label="Search">
    <span class="c-wa-topbar__kbd" aria-hidden="true">⌘ K</span>
  </div>

  <span class="c-wa-topbar__spacer"></span>

  <div class="c-wa-topbar__actions">
    <button class="c-wa-topbar__btn" type="button" aria-label="Help and feedback" title="Help & feedback">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M7 7a2 2 0 1 1 2.8 1.8c-.7.3-1.3.8-1.3 1.7M9 13v-.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button class="c-wa-topbar__btn" type="button" aria-label="Notifications (2 new)" title="Notifications">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M4 12.5V8.5a5 5 0 0 1 10 0v4l1 1.5H3l1-1.5zM7 15a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="c-wa-topbar__dot" aria-hidden="true"></span>
    </button>
    <button class="c-wa-topbar__avatar" type="button" aria-label="Your account" aria-haspopup="menu">LH</button>
  </div>
</header>
