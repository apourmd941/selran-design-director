<?xml version="1.0" encoding="UTF-8"?>
<!--
  direction: brutalist
  use: success / completion moment
  variables: var(fg), var(bg), var(accent)
  notes: a stamped "OK" block — halftone frame, hard edges, accent rectangle, no softness
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="OK success">
  <style>
    .br-fg-fill  { fill: var(--fg, #000000); }
    .br-fg-stroke{ stroke: var(--fg, #000000); fill: none; stroke-width: 3; vector-effect: non-scaling-stroke; }
    .br-accent-fill { fill: var(--accent, #B84400); }
    .br-mono     { font-family: "Space Mono", "JetBrains Mono", "Courier New", ui-monospace, monospace; }
  </style>

  <defs>
    <pattern id="brs-halftone" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="1.4" fill="var(--fg, #000000)"/>
    </pattern>
  </defs>

  <!-- heavy outer border -->
  <rect class="br-fg-stroke" stroke-width="5" x="26" y="26" width="348" height="348"/>

  <!-- halftone diagonal band crossing center -->
  <polygon fill="url(#brs-halftone)" points="26,110 374,26 374,190 26,274"/>

  <!-- intentionally offset accent rectangle (the "stamp") -->
  <rect x="70" y="140" width="260" height="140" class="br-accent-fill"/>
  <rect x="60" y="132" width="260" height="140" class="br-fg-stroke" stroke-width="3"/>

  <!-- big mono OK (the approval mark) -->
  <text x="200" y="240"
        text-anchor="middle"
        class="br-mono"
        font-size="96"
        font-weight="700"
        letter-spacing="8"
        fill="var(--fg, #000000)">OK</text>

  <!-- top mono header -->
  <rect class="br-fg-fill" x="26" y="26" width="348" height="28"/>
  <text x="40" y="45" class="br-mono" font-size="11" letter-spacing="0.18em" fill="var(--bg, #FFFFFF)">STATUS/200</text>
  <text x="360" y="45" text-anchor="end" class="br-mono" font-size="11" letter-spacing="0.18em" fill="var(--bg, #FFFFFF)">ACCEPTED</text>

  <!-- bottom mono footer strip -->
  <rect class="br-fg-fill" x="26" y="346" width="348" height="28"/>
  <text x="200" y="365" text-anchor="middle" class="br-mono" font-size="12" letter-spacing="0.3em" fill="var(--bg, #FFFFFF)">TRANSACTION&#160;COMPLETE</text>
</svg>
