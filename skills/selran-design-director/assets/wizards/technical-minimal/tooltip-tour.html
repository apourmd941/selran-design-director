<style>
  .c-tm-tour-wrap {
    position: relative;
    padding: 80px 32px;
    min-height: 360px;
    font-family: inherit;
    background: var(--bg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .c-tm-tour__target {
    width: 220px;
    height: 64px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    background: var(--bg-2);
    position: relative;
  }
  .c-tm-tour__target::after {
    content: "";
    position: absolute;
    inset: -4px;
    border: 1px solid var(--accent);
    border-radius: 10px;
    pointer-events: none;
  }

  .c-tm-tour {
    position: absolute;
    top: 170px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    z-index: 30;
    font-family: inherit;
    color: var(--fg);
  }
  .c-tm-tour::before {
    content: "";
    position: absolute;
    top: -7px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 12px;
    height: 12px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .c-tm-tour__head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .c-tm-tour__pos {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
  }
  .c-tm-tour__close {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 4px;
    color: var(--fg-muted);
    cursor: pointer;
    margin: -4px -4px -4px 0;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-tour__close:hover { background: var(--bg-2); color: var(--fg); }
  .c-tm-tour__close:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-tm-tour__title {
    font-size: 15px;
    font-weight: 600;
    color: var(--fg);
    margin: 0 0 6px;
    letter-spacing: -0.005em;
    line-height: 1.3;
  }
  .c-tm-tour__body {
    font-size: 13px;
    color: var(--fg-muted);
    line-height: 1.5;
    margin: 0 0 14px;
  }
  .c-tm-tour__dots {
    display: inline-flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .c-tm-tour__dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-tour__dot[data-state="done"] { background: color-mix(in oklab, var(--accent) 60%, var(--border)); }
  .c-tm-tour__dot[data-state="active"] {
    background: var(--accent);
    width: 16px;
    border-radius: 3px;
  }
  .c-tm-tour__foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .c-tm-tour__skip {
    font-size: 12px;
    color: var(--fg-muted);
    text-decoration: none;
    background: transparent;
    border: none;
    padding: 4px 2px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 4px;
    transition: color 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-tour__skip:hover { color: var(--fg); }
  .c-tm-tour__skip:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .c-tm-tour__controls {
    display: inline-flex;
    gap: 6px;
  }
  .c-tm-tour__btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background-color 200ms cubic-bezier(0.2, 0, 0, 1),
                filter 200ms cubic-bezier(0.2, 0, 0, 1);
  }
  .c-tm-tour__btn--ghost {
    background: var(--bg);
    color: var(--fg);
    border-color: var(--border);
  }
  .c-tm-tour__btn--ghost:hover { background: var(--bg-2); }
  .c-tm-tour__btn--primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .c-tm-tour__btn--primary:hover { filter: brightness(0.92); }
  .c-tm-tour__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  @media (max-width: 900px) {
    .c-tm-tour {
      width: calc(100% - 32px);
      left: 16px;
      right: 16px;
      transform: none;
      max-width: 360px;
    }
    .c-tm-tour::before { left: 50%; }
  }
</style>

<div class="c-tm-tour-wrap">
  <div class="c-tm-tour__target" aria-hidden="true">Workspace switcher</div>

  <div class="c-tm-tour" role="dialog" aria-modal="false" aria-labelledby="c-tm-tour-title" aria-describedby="c-tm-tour-body">
    <div class="c-tm-tour__head">
      <span class="c-tm-tour__pos">Step 2 of 5</span>
      <button class="c-tm-tour__close" type="button" aria-label="Close tour">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M2.5 2.5l5 5M7.5 2.5l-5 5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
      </button>
    </div>
    <h3 id="c-tm-tour-title" class="c-tm-tour__title">Switch workspaces anytime.</h3>
    <p id="c-tm-tour-body" class="c-tm-tour__body">Your account can hold multiple workspaces — one per entity or client. Jump between them here; members and ledgers stay scoped to each.</p>
    <div class="c-tm-tour__dots" aria-hidden="true">
      <span class="c-tm-tour__dot" data-state="done"></span>
      <span class="c-tm-tour__dot" data-state="active"></span>
      <span class="c-tm-tour__dot" data-state="pending"></span>
      <span class="c-tm-tour__dot" data-state="pending"></span>
      <span class="c-tm-tour__dot" data-state="pending"></span>
    </div>
    <div class="c-tm-tour__foot">
      <button class="c-tm-tour__skip" type="button">Skip tour</button>
      <div class="c-tm-tour__controls">
        <button class="c-tm-tour__btn c-tm-tour__btn--ghost" type="button">Prev</button>
        <button class="c-tm-tour__btn c-tm-tour__btn--primary" type="button">Next →</button>
      </div>
    </div>
  </div>
</div>
