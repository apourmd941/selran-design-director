<style>
  .c-wa-errin {
    display: flex;
    gap: 16px;
    padding: 18px 20px;
    background: color-mix(in oklab, #B07420 12%, var(--bg-2));
    border: 1px solid color-mix(in oklab, #B07420 28%, var(--border));
    border-radius: 20px;
    box-shadow: 0 6px 18px rgba(176, 116, 32, 0.12);
    font-family: inherit;
    color: var(--fg);
    align-items: flex-start;
  }
  .c-wa-errin__icon {
    flex: 0 0 auto;
    width: 40px; height: 40px;
    display: inline-flex;
    align-items: center; justify-content: center;
    background: color-mix(in oklab, #B07420 22%, var(--bg));
    color: #8E5A14;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(176, 116, 32, 0.16);
  }
  .c-wa-errin__body { flex: 1 1 auto; min-width: 0; }
  .c-wa-errin__title {
    font-family: var(--ff-display, 'Fraunces', Georgia, serif);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.005em;
    color: var(--fg);
    margin: 0 0 4px;
  }
  .c-wa-errin__text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--fg-muted);
    margin: 0;
  }
  .c-wa-errin__detail {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--fg-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-variant-numeric: tabular-nums;
  }
  .c-wa-errin__actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .c-wa-errin__btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    border: 1px solid transparent;
    border-radius: 9999px;
    cursor: pointer;
    background: var(--accent);
    color: var(--bg);
    transition: transform 200ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .c-wa-errin__btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(61, 40, 23, 0.18);
  }
  .c-wa-errin__btn--ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .c-wa-errin__btn--ghost:hover {
    background: var(--bg);
    box-shadow: 0 4px 12px rgba(61, 40, 23, 0.08);
  }
  .c-wa-errin__btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--bg-2), 0 0 0 5px var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    .c-wa-errin__btn { transition: none; }
    .c-wa-errin__btn:hover { transform: none; }
  }

  @media (max-width: 900px) {
    .c-wa-errin { padding: 14px 16px; border-radius: 16px; gap: 12px; }
    .c-wa-errin__icon { width: 36px; height: 36px; }
    .c-wa-errin__title { font-size: 16px; }
  }
</style>

<div class="c-wa-errin" role="alert" aria-live="assertive">
  <span class="c-wa-errin__icon" aria-hidden="true">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4.5v6M10 13.5v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/></svg>
  </span>
  <div class="c-wa-errin__body">
    <h3 class="c-wa-errin__title">Something's not quite right.</h3>
    <p class="c-wa-errin__text">We couldn't save your journal entry just now — it's probably the connection. Your words are safe; try once more in a moment.</p>
    <span class="c-wa-errin__detail">Ref · 2026-04-21 · journal.save</span>
    <div class="c-wa-errin__actions">
      <button class="c-wa-errin__btn" type="button">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2.5 7a4.5 4.5 0 0 1 8-2.8M11.5 7a4.5 4.5 0 0 1-8 2.8M10.5 1.5V4.5h-3M3.5 12.5V9.5h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Try again
      </button>
      <button class="c-wa-errin__btn c-wa-errin__btn--ghost" type="button">Let us know</button>
    </div>
  </div>
</div>
