<style>
  .c-dp-steps {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 24px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-family: inherit;
    color: var(--fg);
    max-width: 720px;
    margin: 0 auto;
  }
  .c-dp-steps__label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-muted);
    margin-right: 12px;
    white-space: nowrap;
  }
  .c-dp-steps__label strong {
    color: var(--fg);
    font-weight: 500;
  }

  .c-dp-steps__list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1 1 auto;
  }

  .c-dp-steps__item {
    display: flex;
    align-items: center;
    flex: 1 1 auto;
    min-width: 0;
  }
  .c-dp-steps__item:last-child { flex: 0 0 auto; }

  .c-dp-steps__dot {
    position: relative;
    flex: 0 0 auto;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    transition: background-color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                border-color 220ms cubic-bezier(0.19, 1, 0.22, 1),
                box-shadow 220ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-steps__item[data-state="done"] .c-dp-steps__dot {
    background: var(--accent);
    border-color: var(--accent);
  }
  .c-dp-steps__item[data-state="active"] .c-dp-steps__dot,
  .c-dp-steps__item[aria-current="step"] .c-dp-steps__dot {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow:
      0 0 0 4px color-mix(in oklab, var(--accent) 15%, transparent),
      0 0 18px -2px color-mix(in oklab, var(--accent) 70%, transparent);
  }
  .c-dp-steps__item[data-state="active"] .c-dp-steps__dot::before,
  .c-dp-steps__item[aria-current="step"] .c-dp-steps__dot::before {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--bg);
  }

  .c-dp-steps__caption {
    margin-left: 10px;
    font-size: 12px;
    color: var(--fg-muted);
    letter-spacing: -0.005em;
    white-space: nowrap;
    transition: color 220ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-steps__item[data-state="done"] .c-dp-steps__caption { color: var(--fg); }
  .c-dp-steps__item[data-state="active"] .c-dp-steps__caption,
  .c-dp-steps__item[aria-current="step"] .c-dp-steps__caption {
    color: var(--fg);
    font-weight: 500;
  }
  .c-dp-steps__num {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    color: var(--fg-muted);
    letter-spacing: 0.08em;
    margin-right: 6px;
  }
  .c-dp-steps__item[data-state="active"] .c-dp-steps__num,
  .c-dp-steps__item[aria-current="step"] .c-dp-steps__num {
    color: var(--accent);
  }

  .c-dp-steps__bar {
    flex: 1 1 auto;
    height: 1px;
    margin: 0 14px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .c-dp-steps__bar::after {
    content: '';
    position: absolute;
    inset: 0 100% 0 0;
    background: var(--accent);
    transition: right 400ms cubic-bezier(0.19, 1, 0.22, 1);
  }
  .c-dp-steps__item[data-state="done"] .c-dp-steps__bar::after { inset: 0 0 0 0; }
  .c-dp-steps__item[data-state="active"] .c-dp-steps__bar::after,
  .c-dp-steps__item[aria-current="step"] .c-dp-steps__bar::after {
    inset: 0 60% 0 0;
  }

  @media (max-width: 900px) {
    .c-dp-steps { padding: 14px 16px; gap: 10px; border-radius: 10px; }
    .c-dp-steps__caption { display: none; }
    .c-dp-steps__label { margin-right: 8px; }
    .c-dp-steps__bar { margin: 0 8px; }
  }
</style>

<nav class="c-dp-steps" aria-label="Onboarding progress">
  <span class="c-dp-steps__label">STEP <strong>02</strong> / 04</span>
  <ol class="c-dp-steps__list" role="list">
    <li class="c-dp-steps__item" data-state="done">
      <span class="c-dp-steps__dot" aria-hidden="true"></span>
      <span class="c-dp-steps__caption">
        <span class="c-dp-steps__num">01</span>Identity
      </span>
      <span class="c-dp-steps__bar" aria-hidden="true"></span>
    </li>
    <li class="c-dp-steps__item" data-state="active" aria-current="step">
      <span class="c-dp-steps__dot" aria-hidden="true"></span>
      <span class="c-dp-steps__caption">
        <span class="c-dp-steps__num">02</span>Custody
      </span>
      <span class="c-dp-steps__bar" aria-hidden="true"></span>
    </li>
    <li class="c-dp-steps__item" data-state="upcoming">
      <span class="c-dp-steps__dot" aria-hidden="true"></span>
      <span class="c-dp-steps__caption">
        <span class="c-dp-steps__num">03</span>Allocations
      </span>
      <span class="c-dp-steps__bar" aria-hidden="true"></span>
    </li>
    <li class="c-dp-steps__item" data-state="upcoming">
      <span class="c-dp-steps__dot" aria-hidden="true"></span>
      <span class="c-dp-steps__caption">
        <span class="c-dp-steps__num">04</span>Review
      </span>
    </li>
  </ol>
</nav>
