# --- Overlay: {{BASE_DIRECTION}} --------------------------------
# Users opt in via `direction: {{BASE_DIRECTION}}+{{PACK_NAME}}` in their
# design-system.md. Only override tokens that GENUINELY differ from the
# core {{BASE_DIRECTION}} starter. If a value would equal the core's value,
# delete the line.
pack_overrides:
  {{BASE_DIRECTION}}:
    color:
      accent: "#333333"            # REPLACE with your accent
      accent_hover: "#1a1a1a"      # REPLACE with your hover
    personality:
      - "describe one signature gesture in a single sentence"
      - "add a second if the pack has two signature moves"

