<style>
  .c-bd-steps {
    padding: 24px 40px;
    background: var(--bg);
    border-top: 2px solid var(--fg);
    border-bottom: 2px solid var(--fg);
    font-family: inherit;
    color: var(--fg);
  }
  .c-bd-steps__meta {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 20px;
  }
  .c-bd-steps__meta-current {
    color: var(--accent);
    font-weight: 500;
  }

  .c-bd-steps__list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .c-bd-steps__item {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 2px solid color-mix(in oklab, var(--fg) 25%, transparent);
    transition: border-color 220ms cubic-bezier(0.2, 0, 0, 1);
    color: var(--fg-muted);
  }
  .c-bd-steps__item[data-state="complete"] {
    border-bottom-color: var(--fg);
    color: var(--fg);
  }
  .c-bd-steps__item[aria-current="step"] {
    border-bottom-color: var(--accent);
    border-bottom-width: 6px;
    padding-bottom: 8px;
    color: var(--fg);
  }

  .c-bd-steps__num {
    font-family: var(--ff-display, 'PP Editorial New', 'Fraunces', Georgia, serif);
    font-size: clamp(48px, 5.5vw, 80px);
    line-height: 0.9;
    letter-spacing: -0.03em;
    font-weight: 500;
    color: inherit;
    font-variant-numeric: tabular-nums;
  }
  .c-bd-steps__item[aria-current="step"] .c-bd-steps__num {
    color: var(--accent);
    font-style: italic;
  }
  .c-bd-steps__item[data-state="complete"] .c-bd-steps__num {
    color: var(--fg);
  }

  .c-bd-steps__label {
    font-family: var(--ff-display, 'PP Editorial New', 'Fraunces', Georgia, serif);
    font-size: 18px;
    font-style: italic;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .c-bd-steps__hint {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  @media (max-width: 900px) {
    .c-bd-steps { padding: 20px 20px; }
    .c-bd-steps__list { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .c-bd-steps__num { font-size: 40px; }
    .c-bd-steps__label { font-size: 16px; }
  }
</style>

<nav class="c-bd-steps" aria-label="Subscription flow progress">
  <div class="c-bd-steps__meta">
    <span>Subscribe &middot; {Brand}</span>
    <span><span class="c-bd-steps__meta-current">Step 02 of 04</span> &middot; Workspace</span>
  </div>
  <ol class="c-bd-steps__list" role="list">
    <li class="c-bd-steps__item" data-state="complete">
      <span class="c-bd-steps__num">01</span>
      <span class="c-bd-steps__label">Reader</span>
      <span class="c-bd-steps__hint">Complete</span>
    </li>
    <li class="c-bd-steps__item" aria-current="step">
      <span class="c-bd-steps__num">02</span>
      <span class="c-bd-steps__label">Workspace</span>
      <span class="c-bd-steps__hint">In progress</span>
    </li>
    <li class="c-bd-steps__item" data-state="upcoming">
      <span class="c-bd-steps__num">03</span>
      <span class="c-bd-steps__label">Delivery</span>
      <span class="c-bd-steps__hint">Next</span>
    </li>
    <li class="c-bd-steps__item" data-state="upcoming">
      <span class="c-bd-steps__num">04</span>
      <span class="c-bd-steps__label">Confirm</span>
      <span class="c-bd-steps__hint">Review &amp; send</span>
    </li>
  </ol>
</nav>
